{"n":"端午扒龙船","py":"Tuann-ngóo pâ-liông-tsûn（海陆丰话）","c":"🎉 岁时节庆","sc":"端午节 / 龙舟竞渡","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历五月初五端午节（有时延至初七「散龙船」）","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"汕尾端午龙舟竞渡（本地称「扒龙船」）历史悠久，各村备有专属龙舟，于端午节前后在河道或海湾竞渡。除竞速外，还有「采青」「祭龙」「送龙船」等仪式性活动，整个端午成为水上节庆与宗族竞技的综合活动。","items":"龙舟（长20-30米，配有龙头、龙尾）、划桨、鼓、锣、彩旗、粽子、艾草、菖蒲、黄酒、三牲（祭龙头用）、雄黄粉","steps":"1. 端午节前，各村「起龙船」——将存放于龙船棚（或水底）的龙舟取出，清洗、修缮，并请道士或庙祝「点睛」（为龙头开光）。\n2. 初四或初五清晨，举行「祭龙」仪式：以三牲祭拜龙头，点香烧纸，祈求竞渡平安；将供品中的鸡血涂于龙头（「开光」）。\n3. 「采青」：龙舟于河道上行驶，至河边青草丛或树枝处，由桨手折取绿枝插于船头，象征「采纳生气」。\n4. 正式竞渡：各村龙舟以锣鼓为信号起跑，全力竞速，岸边观众燃放鞭炮助威。\n5. 竞渡结束，获胜村庄燃放鞭炮庆祝，村民共享粽子、黄酒。\n6. 初七「散龙船」：龙船退役，举行「谢龙」仪式，再次祭拜龙头，将龙舟重新沉入水中或存入龙船棚保存。","taboo":"龙头开光后，任何人不可用手触摸龙头眼部；女性不可登上龙舟参与竞渡（传统习俗，现代已有改变）；竞渡期间若有人落水，须立即救起，否则视为「龙船不吉」；落水者不可由对方船只救起，须由本村人救援；「散龙船」前不可擅自拆解龙舟。","story":"汕尾龙舟竞渡既有纪念屈原的文化含义，又深嵌于渔村对龙神的崇拜——龙是海洋的主宰，与渔业生产密切相关。汕尾各村对龙舟的重视程度极高，龙舟优劣关乎村庄荣誉，部分大村长期供养专职龙舟队员。「采青」习俗源于古代竞渡前的「采药」行为（端午采草药习俗），与汕尾「避邪」信仰融合后演化为采绿枝以纳生气。","diff":"汕尾市区（品清湖）龙舟赛规模最大，现为官方组织的文化体育活动，参与村庄达数十支；海丰县城附近赤石河道龙舟竞渡历史最悠久，保留「祭龙」最完整仪式；陆丰甲子港因为海港，龙舟在海湾竞渡，场面更为壮观；陆丰螺河流域各村龙舟多于河道上下行来回比速，与汕尾式并排竞速有所不同。"},
{"n":"元宵节闹花灯","py":"Guân-siâu-tseh nāu-hue-ting（海陆丰话）","c":"🎉 岁时节庆","sc":"春节延伸 / 灯节游乐","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历正月十五元宵节，部分地区延至正月十八","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"汕尾元宵节以「闹花灯」为核心活动，家家户户悬挂花灯，街道灯市绵延数里，并举行猜灯谜、舞龙舞狮、游花灯等活动。传统上，「上灯」（为新生男丁挂灯）是元宵节最重要的宗族仪式，代表男丁正式进入宗谱。","items":"花灯（手工竹篾纸糊灯或现代彩灯）、蜡烛或LED灯芯、灯谜卷轴、龙狮道具、锣鼓、鞭炮、汤圆（元宵夜食用）、「上灯」专用花灯（通常为红色鱼形或莲花形）","steps":"1. 元宵节前数日，各家购买或制作花灯，悬挂于门前、厅堂；商铺沿街拉起花灯串，营造灯海氛围。\n2. 元宵日下午，「上灯」仪式：上一年内添有男丁的各家，须在宗祠或庙宇专设「灯棚」处悬挂新灯（花灯数量与男丁数对应），并向宗族报告新丁降生，交「灯脚钱」（入谱费）。\n3. 入夜后，全家点亮花灯，提灯出行，孩童手持「兔儿灯」「鱼儿灯」在街上游走。\n4. 各庙宇广场举行猜灯谜活动，猜中者可领取小奖品。\n5. 大型舞龙舞狮表演从各庙宇出发，沿街巡游，每到一商铺，商铺主人须给「利是」（红包）。\n6. 元宵夜全家共食汤圆，年长者须「吃得圆」（食完所有汤圆），寓意新年诸事圆满。","taboo":"「上灯」挂的花灯须保持点亮至灯节结束，中途不可熄灭；灯不可倒挂；提灯游行时，若灯火熄灭须重新点燃，不可弃灯离去；元宵夜不可早睡（须守岁至深夜，俗称「守元宵」）；花灯不可借给他人，否则「福气外流」。","story":"元宵「上灯」习俗将「添丁」与「点灯」谐音融为一体（「灯」谐「丁」），是闽南宗族文化的重要体现。汕尾海陆丰地区宗族观念浓厚，男丁须于元宵正式「上灯入谱」方算宗族成员，享有祠堂分猪肉的权利。随社会发展，女丁亦逐渐被纳入「上灯」行列，但男丁传统仍更为正式。","diff":"海丰县城「上灯」仪式最为隆重，需于祠堂举行，由族长主持；陆丰碣石镇元宵花灯以海洋主题灯笼著名（制作鱼、虾、龙舟形花灯）；汕尾市区元宵活动结合现代灯光艺术展，传统竹篾花灯逐渐减少；陆丰甲子镇「上灯」完毕后有「烧花炮」习俗（抢花炮），竞争激烈，往往全村出动。"},
{"n":"城隍爷巡城","py":"Siânn-hông-iâ sûn-siânn（海陆丰话）","c":"🙏 民间信仰","sc":"司法神祇 / 城隍崇拜","lv":"L3 汕尾市专属","rg":["海丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历五月十一（城隍诞辰）；农历七月初一「鬼门开」","src":"[书A] 第五章·民间信仰；[书D] 第六章·城隍信仰","intro":"城隍爷是阴间司法神，掌管地方亡魂与人间善恶记录。海丰县城城隍庙历史悠久，每逢城隍诞辰举行「城隍巡城」游神，城隍神像乘坐大轿巡视全城，象征「阴间审判官」巡查人间善恶，使恶人知惧、善人安心。农历七月城隍开鬼门、十五日关鬼门，对应中元节普渡仪式。","items":"城隍爷神像（含文武判官像）、大型神轿、「日夜游神」牌（引路用）、锁链（象征拿问恶鬼）、彩旗、香烛、鞭炮、三牲五果","steps":"1. 城隍诞辰前，庙理事会预备游神路线，通知沿路各户备好香案迎接。\n2. 诞辰当日，庙祝为城隍爷神像「换新衣」「戴官帽」，将文武判官像置于左右。\n3. 游神队伍由「日夜游神」牌打头阵，其后依序为彩旗队、锣鼓队、城隍轿，最后为跟轿信众。\n4. 城隍轿每至一处，主人须上香、献三牲，并可向城隍「投诉」（在纸上写下冤情，投入随行的「告状箱」）。\n5. 游神路线须经过全城主要街道，象征城隍「巡视管辖范围」。\n6. 游神结束，「告状箱」由庙祝保管，据说于深夜由城隍爷「处理」。\n7. 农历七月初一，城隍庙举行「开鬼门」仪式，焚烧大批纸钱，为孤魂引路进入人间。","taboo":"城隍游神时，路边观众不可嬉笑或指指点点；「告状箱」所投文书须用毛笔书写，不可用圆珠笔或印刷体；夜间不可独自前往城隍庙（传说城隍夜间「出巡」）；农历七月城隍庙「鬼门」期间，不可在庙外丢弃食物（以免引来无主孤魂）。","story":"城隍信仰起源于先秦时期的城池守护神崇拜，历代官方均将城隍纳入正式祭祀体系。海丰城隍庙始建于明朝，知县上任须先拜城隍，表示接受神明监督。城隍「巡城」制度反映了古代民众对「阴间司法」的期待——当人间司法不公时，城隍成为最后的「上诉途径」，投入告状箱的文书据说能引起城隍关注。","diff":"海丰县城城隍庙规模最大，游神队伍可达数百人；汕尾市区城区有独立城隍庙，游神时常与各社区土地公联合巡游；陆丰地区城隍信仰与三山国王信仰并行，部分庙宇将两者合祀；农历七月城隍「开关鬼门」仪式是各地普渡（中元节）仪式的重要组成部分。"},
{"n":"建醮谢神","py":"Kiàn-tsiau siā-sîn（海陆丰话）","c":"🙏 民间信仰","sc":"集体祭祀 / 还愿仪式","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"每三年或五年一次，由各村协商择定，通常在秋收之后","src":"[书A] 第五章·民间信仰；[书D] 第三章·神明祭典","intro":"「建醮」是汕尾规模最大的集体宗教仪式，每三至五年由一个村落或联合数村举行，历时三至七天。由道士主持斋醮法事，祈求神明庇佑地方平安、消灾解厄。建醮期间，村中须全面吃斋，外村人可入村观礼，但须遵守斋戒规定。","items":"醮坛（临时搭建的大型法事台）、道士法器（法衣、令旗、宝剑、净水盆）、三清像及诸神像、大量金银纸、斋菜（无荤菜）、彩灯、鞭炮、「天灯」（孔明灯）、戏台（酬神演戏用）","steps":"1. 建醮前数月，村理事会商定日期，邀请道士团队（通常4-8人）并筹集经费（由各户按丁口摊派）。\n2. 建醮前三天，全村「封斋」——所有村民不可食荤，村内外来车辆须绕道，村口立「封斋」告示牌。\n3. 建醮第一天「开坛」：道士设立醮坛，安置诸神像，诵读「开坛疏文」，宣告醮事开始，全村燃放鞭炮。\n4. 此后数天，道士日夜轮流诵经、打醮，为村民「过关」（消灾解厄）、「超幽」（超度孤魂野鬼）。\n5. 村民携带斋菜轮流到醮坛前「奉斋」（献给神明的素食），道士为每户祈福。\n6. 最终日「圆醮」：仪式高潮，焚烧大批金银纸和「幡」（旗帜），燃放大量鞭炮，施放天灯，送神归位。\n7. 圆醮当晚，搭台演出白字戏或正字戏，酬谢神明庇佑，通宵达旦。","taboo":"建醮期间全村须严格吃斋，违者被认为污染醮坛；孕妇不可进入醮坛区域；外来者须经净化方可入村（通常在村口跨过「净火」）；建醮期间不可举行婚嫁等喜事；道士诵经期间，旁观者须保持肃静，不可嬉笑；「幡」焚烧时，须由道士亲自点火，不可由普通村民代劳。","story":"建醮制度源于道教「科仪」体系，在汕尾与地方民间信仰深度融合。历史上，建醮往往在大瘟疫、水旱灾害、战乱之后举行，作为集体心理疗愈和社会凝聚的手段。汕尾渔村每逢海难或渔获锐减之年，族人便合议建醮，以仪式回应无法掌控的自然力量。现代建醮已不局限于灾后，成为三至五年一次的定期社区活动。","diff":"海丰县城附近村落建醮规模最大，可历时七天，邀请多个道士团队；陆丰碣石玄武山每逢大醮，全镇参与，是粤东最盛大的建醮之一；汕尾市区因城镇化，部分村落已无力独立建醮，改由数村联合举行；沿海渔村建醮特别加入「送船」仪式，焚烧纸制渔船，送走不洁之物和亡魂。"},
{"n":"三山国王信仰","py":"Sam-suann-kok-ông（海陆丰话）","c":"🙏 民间信仰","sc":"山神信仰 / 地方保护神","lv":"L2 粤东闽语区","rg":["海丰","陆丰","惠东"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历二月廿五（大王诞）、农历三月初三（三山国王总诞）","src":"[书A] 第五章·民间信仰；[书C] 第七章·潮汕民间信仰","intro":"三山国王是粤东地区最重要的地方守护神之一，供奉巾山、明山、独山三位山神，保佑乡土平安、五谷丰登。汕尾海丰、陆丰地区三山国王庙宇广布，每逢诞辰举行盛大游神和「食福」活动，是凝聚乡土认同的重要仪式。","items":"三牲五果、香烛、金银纸、三山国王神像（三位）、神轿（三顶）、彩旗、锣鼓乐器、鞭炮、「福饭」（祭后分发的米饭）","steps":"1. 诞辰前数日，由庙理事会召集各村代表，分配游神路线、祭品采购和抬轿人员。\n2. 诞辰当日清晨，庙祝为三位神像「开光换衣」——为神像擦拭、换上新袍、戴上冠冕。\n3. 上午举行「起驾」仪式：道士开坛，三顶神轿依次出庙，各村抬轿壮丁按序排列，游神队伍浩荡出发。\n4. 游神队伍巡经辖区各村，每到一村，村民须于村口摆设香案迎接，燃放鞭炮，向神轿献上三牲。\n5. 游神完毕回庙「安座」，燃放大量鞭炮，由道士宣告收神。\n6. 当晚举行「食福」——将祭品中的猪肉、米饭分装，由各户代表领取，称为「分福」，意为沾染神恩。","taboo":"游神路线须按传统走，不可任意更改（否则需请神示）；祭品中须有三牲且须完整（全猪、全鸡、全鱼）；女性经期不可接近神轿；抬轿壮丁须于前一晚斋戒（不食荤）；「食福」时须将分得的福饭带回家，不可在庙外食用；神轿行进中，旁观者不可用手指指向神像。","story":"三山国王起源于潮汕地区的山岳崇拜，相传三山神曾于隋朝显灵助兵平乱，被封为国王。随潮汕移民及粤东闽语区扩展，三山国王信仰传遍粤东和台湾。汕尾地区三山国王庙与妈祖庙相互补充——妈祖保佑出海渔民，三山国王则保佑在陆农民与整体乡土，形成「海陆分工」的神明格局。","diff":"海丰县城三山国王庙以「走火」（信众赤脚过燃烧的稻草）为特色仪式；陆丰河田镇三山国王游神规模最大，可聚集周边十余村共同参与；汕尾市区城镇化后三山国王庙部分被拆除，信仰有所淡化；惠东境内客家人亦供奉三山国王，成为闽客共同的信仰载体。"},
{"n":"妈祖信仰","py":"Má-tsóo（海陆丰话）","c":"🙏 民间信仰","sc":"海洋神祇 / 妈祖崇拜","lv":"L2 粤东闽语区","rg":["汕尾市区","海丰","陆丰"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历三月廿三（妈祖诞辰）、农历九月初九（妈祖升天日）","src":"[遗A] 妈祖信俗（UNESCO非遗）；[书A] 第五章·民间信仰","intro":"妈祖（天后圣母）是汕尾渔民最重要的守护神，汕尾城区天后宫、碣石玄武山天后宫等庙宇香火鼎盛。每逢妈祖诞辰，渔民须停航祭拜，举行盛大庙会、游神巡海仪式，祈求出海平安、渔获丰收。妈祖信仰深度融入汕尾沿海渔村的日常生活与年度节庆。","items":"三牲五果、香烛、金银纸、妈祖塑像（或画像）、龙舟（游神用）、鞭炮、彩旗、花灯、锣鼓乐器","steps":"1. 农历三月廿三，各天后宫于子时（0时）开始「迎圣」——点燃长明灯，由庙祝宣告妈祖诞辰到来。\n2. 清晨，渔船须全部靠岸，渔民携带三牲五果前往天后宫上香祭拜，不得出海。\n3. 庙宇举行「上仪式」：由道士主持开坛，诵读疏文，向妈祖报告一年内渔业收成和平安情况。\n4. 正午举行「游神」：将妈祖神像请上神轿，由壮丁抬轿沿指定路线巡游渔村或海边，渔民持香随行，鞭炮声、锣鼓声不断。\n5. 游神完毕，妈祖神像送回庙中「回宫安座」，再次大量燃放鞭炮。\n6. 晚间举行庙会，演出白字戏或正字戏酬神，通宵达旦。","taboo":"妈祖诞辰当日渔船不可出海（视为不敬）；祭拜妈祖的三牲须用全鸡（不可切割），猪肉须带皮；游神队伍前方不可出现孕妇或穿白衣者；游神时不可从神轿下穿越；祭拜时不可用牛肉（妈祖忌牛）；神像被请下神位时，一般信众不可直视神像面部。","story":"妈祖林默（960-987年）生于福建莆田湄洲岛，因传说其能预报天气、救助海难，被沿海渔民奉为神明。随闽南移民南下，妈祖信仰传入汕尾。汕尾城区天后宫始建于明代，历史逾五百年，是当地最重要的妈祖庙。碣石玄武山因同时供奉玄天上帝和妈祖，形成独特的「武妈合祀」格局，在全国罕见。","diff":"汕尾城区天后宫规模最大，诞辰活动可持续三天；碣石镇妈祖诞以「妈祖巡海」为特色，神轿须至海边，由渔民将海水淋于神像，象征妈祖巡视领海；海丰公平镇天后宫以「走火」（赤脚过火炭）仪式著名；陆丰渔村妈祖诞规模较小，以家庭祭拜为主。"},
{"n":"冬节圆（汤圆）","py":"Tang-tseh-înn（海陆丰话）","c":"🍜 饮食民俗","sc":"节令食品 / 冬至食俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"冬至日（公历12月21-23日）","src":"[书A] 第六章·饮食民俗；[书C] 第六章·节令食品","intro":"汕尾冬至须搓「冬节圆」（汤圆），寓意家人团圆、岁岁平安。冬节圆须由全家人共同搓制，分为甜汤圆（糖水煮）和咸汤圆（猪油、芹菜、虾米汤）两种。搓圆时须留出少量贴于门框、灶台、猪圈等处，称为「贴圆」，祈求六畜兴旺、门庭平安。","items":"糯米粉、清水、食用红色素（少量，用于搓红色小圆）、猪油、白糖（甜汤用）、猪骨汤、芹菜、虾米、鱼露（咸汤用）","steps":"1. 冬至前日或当日清晨，全家人（含小孩）围坐于大桌旁，将糯米粉加水揉成软硬适中的面团。\n2. 取少量面团加入红色素揉成红色，余为白色（红白两色象征阴阳和谐）。\n3. 全家人共同搓圆，每人须参与，以体现「合家欢聚」之意。\n4. 留出少量红色小圆（约10-20个），备用于「贴圆」。\n5. 甜汤圆：煮沸糖水，放入白色汤圆，煮至浮起即可。\n6. 咸汤圆：用猪骨汤加虾米、芹菜、鱼露煮沸，放入汤圆，出锅后淋猪油提香。\n7. 「贴圆」：煮熟后，将红色小圆分别贴于大门门框、灶台、水缸、猪圈、农具等处，以示祈福。\n8. 全家人共食汤圆，年长者须比小辈先吃（寓意长辈健在、家运绵长）。","taboo":"冬节圆须当日搓、当日吃，不可隔夜；搓圆时不可将汤圆搓成方形或不规则形，须为圆形；「贴圆」时须贴于高处，不可贴于地面；冬至日不可打骂家人（忌「破圆」之兆）；贴于门框的圆子须待其自然脱落，不可主动撕去。","story":"汕尾「冬节大过年」的说法流传已久，冬至被视为仅次于春节的重要节日。冬节圆「贴圆」习俗源于古代对「五方土地」的感谢——贴于灶台感谢灶神、贴于门框感谢门神、贴于猪圈感谢六畜之神。海陆丰话将汤圆称为「圆」，音同「缘」，故冬节吃汤圆亦有「结良缘、续情缘」之意。","diff":"海丰县城冬节圆以甜汤圆为主，用花生糖水或红糖煮；陆丰农村仍保留「贴圆」于牛栏、猪圈的完整习俗；汕尾市区现代家庭多改用市售汤圆，自制者减少，「贴圆」习俗趋于消失；部分客家移民聚居的惠东边界地区，冬至同时保留「吃酿豆腐」的客家习俗。"},
{"n":"红桃粿","py":"Âng-thô-kué（海陆丰话）","c":"🍜 饮食民俗","sc":"祭祀食品 / 节庆糕粿","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"春节、清明、中元节、神诞等重要祭祀节日","src":"[书A] 第六章·饮食民俗；[书C] 第六章·潮汕粿品","intro":"红桃粿是汕尾最具代表性的传统糕粿，以糯米粉或粳米粉制成粉红色桃形外皮，内馅为甜豆沙或咸糯米饭。因形似仙桃，象征长寿吉祥，是汕尾各类祭祀和节庆中必备的供品和礼品。","items":"糯米粉（或粳米粉）、食用红色素（或红曲粉）、猪油、盐、甜馅（绿豆沙、芝麻糖）或咸馅（糯米饭、猪肉、香菇、虾米）、桃形木模、蕉叶或竹叶（垫底）、蒸锅","steps":"1. 将糯米粉加热水、少许猪油揉成光滑面团，加入红色素揉匀，至面团呈均匀粉红色。\n2. 同时准备内馅：甜馅将绿豆煮熟压成豆沙，加糖炒干；咸馅将糯米蒸熟，与炒香的猪肉、香菇、虾米拌匀。\n3. 取适量面团（约50克），搓圆后以手掌压扁，包入馅料（约30克），捏口封紧。\n4. 将包好的粿坯放入桃形木模中，轻按使其成形，再敲出。\n5. 将成形的红桃粿置于裁好的蕉叶上，入蒸锅以大火蒸约15分钟至熟透。\n6. 出锅后，于表面刷少许猪油，使外皮光亮，待凉后即可供奉或食用。","taboo":"制作红桃粿须在洁净环境中进行，制作者须洁身（尤其不可身处不洁状态）；女性经期不宜参与制作（传统观念）；蒸制时锅盖不可中途揭开；供奉用的红桃粿须保持完整，不可破损；用于祭祀的红桃粿食用前须先「退供」（在神位前宣告撤祭）。","story":"红桃粿中的「桃」象征长寿，源于道教「蟠桃」神话。汕尾地区以红桃粿祭神始于唐宋时期，最初为祭天帝和祖先的供品，逐渐发展为各种神诞、节庆的通用祭品。其粉红色源于传统用红曲（发酵的红曲米）染色，现代多改用食用色素，但老一辈仍坚持用红曲以保持传统风味。","diff":"海丰县城红桃粿多为甜馅（绿豆沙或芝麻馅），外形较大；陆丰地区咸馅红桃粿更为普遍，内含糯米饭、猪肉，可作为正式点心食用；汕尾市区现代家庭多直接购买现成品，手工制作者减少；碣石镇因祭祀传统浓厚，红桃粿做工最为精细，外形桃纹清晰，颜色鲜艳。"},
{"n":"汕尾鱼丸","py":"Hî-uân（海陆丰话）","c":"🍜 饮食民俗","sc":"渔港饮食 / 海鲜加工","lv":"L3 汕尾市专属","rg":["汕尾市区","海丰","陆丰"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"全年皆有，传统上以春秋两季鱼最鲜时制作","src":"[书A] 第六章·饮食民俗；[书E] 第四章·渔民饮食习俗","intro":"汕尾鱼丸以新鲜海鱼（马鲛鱼、鳗鱼为上品）手工捶打成鱼浆，加入地瓜粉、盐、葱白等调制后，以手或模具挤成球状入沸水煮熟。口感爽弹，是汕尾早市、宵夜摊及家宴不可或缺的传统食品，亦是重要的手信伴手礼。","items":"新鲜马鲛鱼或鳗鱼（去皮去骨）、地瓜粉（番薯粉）、盐、白胡椒粉、葱白、清水、木棰（捶鱼用）、大碗、汤锅","steps":"1. 将鱼肉去皮去骨，切成大块，放于砧板上。\n2. 以木棰反复捶打鱼肉（传统做法须捶打20-30分钟），至鱼肉完全成糊状、无颗粒。\n3. 加入地瓜粉（比例约为鱼肉重量的15-20%）、适量盐、白胡椒粉、葱白末，搅拌均匀。\n4. 反复摔打鱼浆至起胶（能拉出丝状），以此检验弹性。\n5. 烧开一锅清水（不加盐），以虎口挤出圆形鱼丸，入沸水中煮至浮起（约3-5分钟）。\n6. 捞出过冷水，沥干备用，可直接作汤或煎炸食用。","taboo":"捶打鱼肉时须去除所有鱼刺和鱼皮，否则鱼丸口感粗糙；加入地瓜粉后不可搅拌过度，否则发硬不弹；煮鱼丸的水不可加盐（否则表皮变硬）；新鲜鱼丸不宜放置超过一天，须当日食用或冷冻。","story":"汕尾地处南海之滨，渔业历史逾千年。鱼丸的诞生源于渔民「不浪费」的朴素精神——将卖相不好或剩余的鱼肉加工成鱼丸，既延长保存期限，又提升食用价值。经历代改良，汕尾鱼丸以马鲛鱼为原料的做法成为地方特色，其弹性被视为手艺高低的标志：能在桌上弹跳的鱼丸方为上品。","diff":"汕尾市区（城区）以马鲛鱼丸最为出名，质地细腻弹牙，多用于汤食；海丰县城鱼丸加入少许猪肉增香，口感较厚重；陆丰地区以鳗鱼丸著称，颜色较深，味道更浓郁；碣石镇因靠近大海，渔获丰富，鱼丸原料更为多样，有虾丸、墨鱼丸等变体。"},
{"n":"入伙（新屋入住礼）","py":"Ji̍p-huê（海陆丰话）","c":"🏠 宗族与日常礼节","sc":"居所礼仪 / 迁居入新屋","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"新居落成后，由风水先生择定吉日","src":"[书A] 第七章·居住礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"新屋建成后，须经「入伙」仪式方可正式居住。仪式由风水先生择定吉日良时，届时家人搬入第一件物品（通常是米桶或炉灶），随后供奉灶神、安神位，燃放鞭炮，宴请亲友。整个过程强调「旺气进门、邪气尽退」。","items":"米桶（装满大米）、红布、香烛、三牲、金银纸、鞭炮、红包（给工人）、新扫帚（带叶连根）、万年青（或榕树枝）、灶神像","steps":"1. 吉日前数日，请风水先生确认吉时（通常为上午辰时或巳时），并指定第一件入门物品。\n2. 吉日吉时，家中最年长女性（或当家主妇）手捧装满大米的米桶，率先踏入新居，边走边念：「入门大吉，财丁两旺。」\n3. 随后将新扫帚、万年青枝（或榕枝，象征生生不息）带入，置于门厅显眼处。\n4. 在厨房安置灶神（贴灶神画像于灶台上方），点香供奉，请灶神保护家宅平安。\n5. 于正厅安神位（安奉祖先牌位或土地公），点香焚纸，告知神明新屋入伙。\n6. 于门口及各房间门槛燃放鞭炮，以爆竹声驱邪纳吉。\n7. 宴请亲友，接受亲友带来的「入伙礼」（通常为万年青、红包或厨具）。","taboo":"入伙当日不可将旧垃圾扫出门外（寓意扫出财气）；入伙后三天内不可将东西搬出屋外；孕妇须在吉时过后方可入内；入伙当日不可哭泣；新居未安神位前，亲友不可在内过夜；灶神画像须安置于灶台上方，不可贴于墙角或低处。","story":"「入伙」礼仪源于中国传统「五行」与「宅神」信仰，认为新房须以仪式「激活」灵气，方可成为保护家人的「福地」。汕尾地区「米桶先入门」的做法，象征「仓廪充实、衣食无忧」，是农耕与渔猎文化对丰收期待的共同表达。灶神信仰在汕尾尤为盛行，每家每户厨房必设灶神，「入伙」须首先安奉灶神。","diff":"海丰农村入伙仪式须延续三天，首日入伙、次日「暖屋」（宴请邻里）、第三日「谢土」（祭拜土地公）；陆丰城区入伙仪式多合并于一日完成；汕尾市区现代楼房入伙，传统仪式多简化为「带米桶进门、烧香放炮」；部分家庭会请道士做「净宅」仪式，以确保屋内无阴气。"},
{"n":"清明扫墓","py":"Tshing-mîng sàu-bōng（海陆丰话）","c":"🏠 宗族与日常礼节","sc":"宗族祭祀 / 扫墓祭祖","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"清明节（公历4月4-6日）前后十天内","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"清明扫墓是汕尾最重要的宗族集体活动之一。各姓宗族于清明前后数日内，由族长或房长召集全族男丁（现也包括女性）携带祭品，前往祖先坟墓，清除杂草、修缮墓碑、摆祭品、上香、烧纸钱，最后共享「墓粄」（祭墓糕点）。大族扫墓往往跨越数代，可历时多日。","items":"三牲（鸡、猪肉、鱼）或五牲、白饭、酒、茶、水果、鲜花、香烛、金银纸、纸钱、镰刀（除草）、石灰粉（描字）、墓粄（红桃粿或发粿）、鞭炮","steps":"1. 扫墓前数日，房长（各房分支长辈）通知族人集合日期、分配祭品采购任务。\n2. 扫墓当日，族人于约定时间集合，携带祭品、工具前往祖坟。\n3. 先以镰刀等工具清除墓周杂草、修整坟堆，并以石灰粉重新描出墓碑上的刻字（使其清晰显白）。\n4. 祭台摆放完毕后，由族中辈分最高者点香，众人按辈分依次上香祭拜。\n5. 香燃过半后，于墓前焚烧纸钱，燃放鞭炮（驱邪），喧闹声象征告知祖先子孙已至。\n6. 撤祭后，族人席地共享「墓粄」及祭品（称为「食墓」），同时商议宗族事务。\n7. 返家前，将祭余鲜花留于墓前，以示孝思长存。","taboo":"扫墓须择吉日，不可在「冲」本命年的日子；孕妇及幼儿（三岁以下）不宜参加扫墓；扫墓须在日落前完成；描墓碑字时须用白色石灰，不可用红色（红色为喜庆色）；祭品不可倒翻，否则视为不祥；扫墓当日不可理发。","story":"汕尾地区海陆丰宗族历史悠久，清明扫墓既是孝道体现，也是宗族凝聚力的重要机制。海丰彭氏、林氏等大族每年扫墓可召集数百族人，兼有清算族田收益、调解宗族纠纷的功能。汕尾沿海渔民认为，清明祭祖可保佑出海平安；山区农民则祈求风调雨顺、五谷丰登。","diff":"海丰县城大族扫墓规模宏大，有专属族田收入支付祭祀费用；陆丰碣石地区扫墓后有「食福」宴会传统，由族田收入宴请全族；汕尾市区城市家庭多以家庭为单位扫墓，宗族集体活动减少；深汕合作区客家移民清明扫墓与闽南俗相近，但祭品中加入客家「艾粄」。"},
{"n":"做忌（祭忌日）","py":"Tsò-kì（海陆丰话）","c":"👶 人生礼仪","sc":"丧葬礼仪 / 祭祀亡者","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"亡者忌日（逝世周年）；头三年须做头忌、二忌、三忌","src":"[书A] 第二章·宗族礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"「做忌」是在亡者逝世周年当日，家人聚集家中祭拜亡灵的仪式。摆设祭品、上香、烧纸钱，并煮亡者生前爱吃的食物供奉，以寄哀思。头三年忌日尤为重要，称为「头忌」「二忌」「三忌」，须宴请亲族，规模如小型祭祀宴。","items":"香烛、纸钱（金银纸）、三牲（鸡、猪肉、鱼）或五牲、亡者生前爱吃的食物、酒杯、茶杯、碗筷、鲜花、白饭","steps":"1. 忌日当天，家人清晨于厅堂神主牌位前摆设祭台，铺上白布或红布（头三年用白，三年后改红）。\n2. 依次摆放三牲、亡者爱食、白饭、茶酒，另备纸钱叠好于旁。\n3. 由家中长子（或长辈）点香，按辈分高低逐一上香，默念告知忌日已至，请亡者享用祭品。\n4. 香燃过半后，于门外或指定地点焚烧纸钱（金银纸、纸扎衣物等）。\n5. 撤祭后，家人共享祭品（称为「食忌」），以示与亡者共餐。\n6. 头三年忌日须邀请亲族到来共同祭拜，并设宴款待，规模视家境而定。","taboo":"忌日当天家人须素净，避免喜庆打扮；头三年忌日不可奏乐或举办喜庆活动；焚烧纸钱须在指定地点，不可在室内焚烧；忌日当天不可向他人讨债或争吵；三年内忌日须以白色为主色，三年后方可改用红色祭具。","story":"「做忌」体现了闽南慎终追远的孝道传统。汕尾地区受海洋文化影响，渔民家庭尤重忌日祭祀，认为善待亡者可保佑出海平安。头三年「三忌」制度源于古礼「三年之丧」，将长期守孝压缩为三个重要节点，使孝道与日常生活取得平衡。","diff":"海丰县城头忌、二忌、三忌规模较大，须宴请亲族；陆丰农村地区忌日仍保留「封斋」（当日不杀生）习俗；汕尾市区城市化后做忌仪式趋于简化，有些家庭改至墓地或骨灰堂祭拜；惠东边界地区混合客家做忌习俗，祭品中加入客家「茶粄」。"},
{"n":"食新娘茶","py":"Tsia̍h sin-niû-tê（海陆丰话）","c":"👶 人生礼仪","sc":"婚嫁礼仪 / 拜见亲族","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"婚礼次日清晨","src":"[书A] 第四章·婚嫁习俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"婚礼次日清晨，新娘须向夫家所有长辈及宾客逐一奉茶，称为「食新娘茶」。每位受茶者在回杯时须放入红包（或金饰），以示接纳新娘入门。此礼是新娘正式融入夫家的重要仪式。","items":"工夫茶具（潮汕式小杯茶盘）、乌龙茶或铁观音、红枣、花生、红包若干、托盘、新娘礼服","steps":"1. 婚礼次日清晨（通常6-8时），新郎引导新娘至厅堂，长辈依长幼序就座。\n2. 新娘在婆婆或伴娘协助下，按辈分高低逐一奉茶，两手捧杯、微微屈膝行礼，称呼对方辈分称谓。\n3. 受茶者饮茶后，将红包（或金戒指、手镯等）置于茶杯中回赠新娘，以示认可。\n4. 新娘依序完成全部亲族，最后奉茶予同辈宾客（较非正式，仅需奉茶无需回礼）。\n5. 仪式结束后，清点收得礼金，由婆婆帮助新娘逐一称谢。","taboo":"奉茶须从最高辈分长辈开始，不可乱序；新娘奉茶时不可将茶杯置于地上；受茶者不可无故拒绝，否则视为不接纳新娘；茶水不可事先倒好久放，须现泡现奉。","story":"「食新娘茶」源于闽南「以茶为礼」的传统，茶象征清廉诚信。新娘以茶侍奉，是向夫家宣誓恪尽妇德的仪式；长辈以红包或金饰回应，则是正式「认可」新娘成为家族一员的承诺。汕尾地区因受潮汕工夫茶文化影响，此礼仪保存尤为完整。","diff":"海丰县城奉茶礼较繁琐，须向所有男女长辈奉茶，礼金按辈分高低有约定俗成的标准；陆丰地区礼仪相近，但工夫茶道程序稍简；汕尾市区现代家庭受广府文化影响，有时改用「三茶六礼」广府婚俗做法，或将奉茶合并入婚宴环节；农村地区仍严格保留独立的次日清晨奉茶仪式。"},
{"n":"做三朝","py":"Tsò sam-jiau（海陆丰话）","c":"👶 人生礼仪","sc":"出生礼仪 / 洁净迎福","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"婴儿出生后第三天","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"婴儿出生第三天，由长辈或稳婆主持为婴儿进行第一次正式洗浴，俗称「洗三朝」。洗澡水中加入艾草、石榴叶、柚子叶等辟邪草药，并以熟鸡蛋在婴儿身上滚过，象征洗去秽气、引入福气。仪式毕，家人分送油饭、红蛋给亲友道喜。","items":"艾草、石榴叶、柚子叶、盐少许、熟鸡蛋（带壳）一枚、硬币、澡盆、热水、红蛋染料、油饭食材（糯米、猪肉、香菇）","steps":"1. 产后第三天上午，烧热水并加入艾草、石榴叶、柚子叶、少许盐，冷却至适温（约37℃）。\n2. 由好命婆（多子多福的老妇人）或外婆主持，将婴儿放入澡盆，轻柔擦洗全身。\n3. 用带壳熟鸡蛋在婴儿身体由上至下轻轻滚过，边滚边念：「鸡卵身，鸭卵面，大汉做好子孙。」\n4. 再以硬币在婴儿手心、脚心轻触，念：「手抱元宝，脚踏财源。」\n5. 洗毕，以新衣（多由外婆家送来）为婴儿穿上，象征外婆家的祝福。\n6. 染制红蛋、准备油饭，分送给亲友，告知喜讯；亲友回赠红包或鸡腿。","taboo":"洗三朝用水须妥善倒掉，不可让外人踩踏；外人（特别是孕妇）不宜进入产房；仪式期间忌大声喧哗；熟鸡蛋在身上滚后须由好命婆带走，不可随意丢弃。","story":"「三朝洗浴」源于古代闽南的洁净信仰，认为婴儿出生时仍带有冥界气息，须以辟邪草药洗去，方可正式「入世」。艾草辟邪、石榴多子、柚叶清洁，三者各有象征。汕尾沿海地区因渔业为主，仪式中还加入祈求孩子「如鱼得水」的祝词。","diff":"海丰县城仪式较完整，由稳婆或好命婆主持，伴有念咒吉语；陆丰城区仪式略简，多由外婆代劳；汕尾市区（城区）因城镇化，现代家庭多简化为普通洗浴，但农村仍保留完整仪式；深汕合作区部分客家移民与闽南俗混合，有时加入客家「上灯」元素。"}
];
(function(){
  const ci={};CAT_ORDER.forEach((c,i)=>ci[c]=i);
  DATA.sort((a,b)=>{
    const ca=ci[a.c]??999,cb=ci[b.c]??999;
    if(ca!==cb)return ca-cb;
    return (a.n||'').localeCompare(b.n||'','zh');
  });
})();

let activeCat='',activeSt='',activeRg='',filtered=[];

function updateCounts(){
  const cats=[['na',''],['n1','🏠 宗族与日常礼节'],['n2','👶 人生礼仪'],['n3','🎉 岁时节庆'],
    ['n4','🙏 民间信仰'],['n5','🍜 饮食民俗'],['n6','🌏 侨乡与海外传播'],
    ['n7','🏡 传统建筑与工艺'],['n8','🎭 戏曲与口传文艺']];
  cats.forEach(([id,cat])=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.textContent=' '+(cat?DATA.filter(e=>e.c===cat).length:DATA.length);
  });
}
function setCat(btn,cat){activeCat=cat;document.querySelectorAll('.fc[data-cat]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyFilters();}
function setSt(btn,st){activeSt=st;document.querySelectorAll('.fc[data-st]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyFilters();}
function setRg(btn,rg){activeRg=rg;document.querySelectorAll('.fc[data-rg]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyFilters();}

function applyFilters(){
  const q=(document.getElementById('sq')||{value:''}).value.toLowerCase();
  filtered=DATA.filter(e=>{
    if(activeCat&&e.c!==activeCat)return false;
    if(activeSt&&e.st!==activeSt)return false;
    if(activeRg&&!(e.rg||[]).includes(activeRg))return false;
    if(q&&!(e.n+' '+(e.intro||'')+' '+(e.sc||'')).toLowerCase().includes(q))return false;
    return true;
  });
  const rc=document.getElementById('rc');
  if(rc)rc.textContent='显示 '+filtered.length+' / '+DATA.length+' 条';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  if(!g)return;
  if(!filtered.length){g.innerHTML='<div class="empty">无匹配条目</div>';return;}
  g.innerHTML=filtered.map((e,i)=>{
    const cc=CC[e.c]||'#7A9BAE';
    const rgs=(e.rg||[]).slice(0,3).map(r=>'<span class="rt">'+r+'</span>').join('');
    const tm=e.tm?'<div class="cred">🕐 '+e.tm.split('（')[0].split('；')[0].slice(0,20)+'</div>':'';
    return '<div class="card" style="--cc:'+cc+'" onclick="openDrawer('+i+')">'
      +'<div class="ct"><div><div class="cn">'+e.n+'</div>'+(e.py?'<div class="cp">'+e.py+'</div>':'')+'</div>'
      +'<div class="cs">'+e.c.split(' ')[0]+'</div></div>'
      +'<span class="cpill" style="background:'+cc+'">'+e.sc+'</span>'
      +'<div class="ci">'+(e.intro||'')+'</div>'
      +'<div class="cm">'+rgs+'</div>'
      +tm+'</div>';
  }).join('');
}

function openDrawer(idx){
  const e=filtered[idx];if(!e)return;
  const cc=CC[e.c]||'#7A9BAE';
  const cred=(e.cr||'').replace(/★/g,'<span class="stars">★</span>');
  document.getElementById('dbdg').innerHTML=
    '<span class="bdg catb" style="background:'+cc+'">'+e.c+'</span>'
    +'<span class="bdg">'+e.sc+'</span>'
    +(e.lv?'<span class="bdg">'+e.lv+'</span>':'')
    +(e.st?'<span class="bdg">'+e.st+'</span>':'');
  document.getElementById('dtit').textContent=e.n;
  document.getElementById('dpy').textContent=e.py||'';
  const rows=[
    ['时间/时节',e.tm,false],
    ['适用地区',(e.rg||[]).join('、'),false],
    ['简介',e.intro,false],
    ['所需物品',e.items,false],
    ['操作步骤',e.steps,true],
    ['禁忌',e.taboo,false],
    ['背后故事',e.story,false],
    ['地域差异',e.diff,false],
    ['可信度',cred,false],
    ['资料来源',e.src,false,'src'],
  ];
  let html='';
  rows.forEach(([label,val,isStep,cls])=>{
    if(!val)return;
    html+='<div class="ds"><div class="dsl">'+label+'</div>';
    if(isStep)html+='<div class="stepbox">'+val+'</div>';
    else if(cls==='src')html+='<div class="srcbox">'+val+'</div>';
    else html+='<div class="dst">'+val+'</div>';
    html+='</div>';
  });
  document.getElementById('dbody').innerHTML=html;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrawer(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function maybeClose(e){if(e.target===document.getElementById('ov'))closeDrawer();}

document.getElementById('pill').textContent='共 '+DATA.length+' 条民俗';
updateCounts();
applyFilters();
</script>
