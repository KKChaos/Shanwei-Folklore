<style>
:root{color-scheme:light;--bg:#F2F6FA;--paper:#F8FBFD;--ink:#0D2233;--mid:#3A5A72;--muted:#7A9BAE;--red:#1A6B8A;--rbg:#DDF0F5;--bdr:#C8DDED;--shad:rgba(13,34,51,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0A1E2C;color:#F2F6FA;padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:2px solid #1A6B8A}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:#5BC8E8}
.sub{font-size:11px;color:rgba(242,246,250,.4);letter-spacing:1px;margin-top:1px}
.hsp{flex:1}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(242,246,250,.7)}
.searchbar{background:var(--paper);border-bottom:1px solid var(--bdr);padding:10px 28px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.si{flex:1;max-width:400px;padding:7px 14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;background:#fff;outline:none;color:var(--ink);transition:border-color .2s}
.si:focus{border-color:var(--red)}
.rc{font-size:12px;color:var(--muted);margin-left:auto}
.main{display:flex;flex:1;overflow:hidden}
aside{width:200px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--bdr);overflow-y:auto;padding:16px 12px}
.fg{margin-bottom:20px}
.fh{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.fc{display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12px;color:var(--mid);text-align:left;transition:background .15s}
.fc:hover{background:var(--bdr)}
.fc.on{background:var(--rbg);color:var(--red);font-weight:600}
.fd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fn{margin-left:auto;font-size:10px;color:var(--muted)}
.fc.on .fn{color:var(--red)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,#7A9BAE)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shad)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cn{font-size:15px;font-weight:600}
.cp{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px}
.cs{font-size:14px;flex-shrink:0}
.cpill{display:inline-block;font-size:10px;font-weight:600;color:#fff;padding:2px 8px;border-radius:4px;margin-bottom:9px}
.ci{font-size:12px;color:var(--mid);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cm{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.rt{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--bdr);padding:1px 7px;border-radius:4px}
.cred{font-size:10px;color:var(--muted);margin-top:8px}
.stars{color:#E8A020}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(13,34,51,.35);z-index:200}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;width:500px;max-width:100vw;height:100vh;background:#fff;overflow-y:auto;box-shadow:-6px 0 28px rgba(13,34,51,.18);transform:translateX(100%);transition:transform .25s ease}
.overlay.open .drawer{transform:translateX(0)}
.dh{padding:20px 24px 16px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:#fff;z-index:1}
.dx{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--bdr);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.dx:hover{background:var(--bg)}
.dbadges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.bdg{font-size:11px;padding:2px 9px;border-radius:5px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.bdg.catb{color:#fff;border:none}
.dtitle{font-size:20px;font-weight:700;margin-bottom:3px}
.dpinyin{font-size:13px;color:var(--muted);font-style:italic}
.db{padding:20px 24px}
.ds{margin-bottom:18px}
.dsl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.dst{font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
.dtags{display:flex;flex-wrap:wrap;gap:5px}
.dtag{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.divl{height:1px;background:var(--bdr);margin:16px 0}
.nlink{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--red);text-decoration:none}
.nlink:hover{text-decoration:underline}
.stepbox{background:var(--bg);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
</style>
</head>

<script>
const CC={"🏠 宗族与日常礼节":"#E07B39","👶 人生礼仪":"#D4688A","🎉 岁时节庆":"#E8A020","🙏 民间信仰":"#9B6BB0","🍜 饮食民俗":"#7BA05B","🌏 侨乡与海外传播":"#4A8DB8","🏡 传统建筑与工艺":"#8B6914","🎭 戏曲与口传文艺":"#6B7B8D"};
let DATA=[];
DATA = DATA.concat([
{"n":"做三朝","py":"Tsò sam-jiau（海陆丰话）","c":"👶 人生礼仪","sc":"出生礼仪 / 洁净迎福","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"婴儿出生后第三天","intro":"婴儿出生第三天，由长辈或稳婆主持为婴儿进行第一次正式洗浴，俗称「洗三朝」。洗澡水中加入艾草、石榴叶、柚子叶等辟邪草药，并以熟鸡蛋在婴儿身上滚过，象征洗去秽气、引入福气。仪式毕，家人分送油饭、红蛋给亲友道喜。","items":"艾草、石榴叶、柚子叶、盐、熟鸡蛋（带壳）一枚、硬币、澡盆、热水、红蛋染料、油饭食材（糯米、猪肉、香菇）","steps":"1. 产后第三天上午，烧热水并加入艾草、石榴叶、柚子叶、少许盐，冷却至约37℃。\n2. 由好命婆（多子多福的老妇人）或外婆主持，将婴儿放入澡盆，轻柔擦洗全身。\n3. 用带壳熟鸡蛋在婴儿身体由上至下轻轻滚过，边滚边念：「鸡卵身，鸭卵面，大汉做好子孙。」\n4. 以硬币在婴儿手心、脚心轻触，念：「手抱元宝，脚踏财源。」\n5. 洗毕，以新布包裹婴儿，家人煮油饭、染红蛋，分送亲友报喜。","taboo":"洗三朝用水须妥善倒掉，不可让外人踩踏；外人（特别是孕妇）不宜进入产房；仪式期间忌大声喧哗；熟鸡蛋须由好命婆带走，不可随意丢弃。","story":"「三朝洗浴」源于古代闽南的洁净信仰，认为婴儿出生时仍带有冥界气息，须以辟邪草药洗去方可正式「入世」。艾草辟邪、石榴多子、柚叶清洁，各有象征。汕尾沿海地区因渔业为主，仪式中还加入祈求孩子「如鱼得水」的祝词。","diff":"海丰县城仪式较完整，由稳婆或好命婆主持；陆丰城区多由外婆代劳；汕尾市区现代家庭多简化，农村仍保留完整仪式；深汕合作区部分客家移民混合「上灯」元素。"}
,{"n":"食新娘茶","py":"Tsia̍h sin-niû-tê（海陆丰话）","c":"👶 人生礼仪","sc":"婚嫁礼仪 / 拜见亲族","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"婚礼次日清晨","intro":"婚礼次日清晨，新娘须向夫家所有长辈及宾客逐一奉茶，称为「食新娘茶」。每位受茶者在回杯时须放入红包（或金饰），以示接纳新娘入门。此礼是新娘正式融入夫家的重要仪式。","items":"工夫茶具（潮汕式小杯茶盘）、乌龙茶或铁观音、红枣、花生、红包若干、托盘、新娘礼服","steps":"1. 婚礼次日清晨（通常6-8时），新郎引导新娘至厅堂，长辈依长幼序就座。\n2. 新娘在婆婆或伴娘协助下，按辈分高低逐一奉茶，两手捧杯、微微屈膝行礼，称呼对方辈分称谓。\n3. 受茶者饮茶后，将红包（或金戒指、手镯等）置于茶杯中回赠新娘，以示认可。\n4. 新娘依序完成全部族亲，最后奉茶予同辈宾客（较非正式，仅需奉茶无需回礼）。\n5. 仪式结束后，新娘拜见完成，正式成为夫家「自己人」。","taboo":"奉茶须从最高辈分长辈开始，不可乱序；新娘奉茶时不可将茶杯置于地上；受茶者不可无故拒绝，否则视为不接纳新娘；茶水不可事先倒好久放，须现泡现奉。","story":"「食新娘茶」源于闽南「以茶为礼」的传统，茶象征清廉诚信。新娘以茶侍奉，是向夫家宣誓恪尽妇德的仪式；长辈以红包或金饰回应，则是正式「认可」新娘成为家族一员的承诺。汕尾地区因受潮汕工夫茶文化影响，此礼仪保存尤为完整。","diff":"海丰县城奉茶礼较繁琐，礼金按辈分高低有约定俗成的标准；陆丰地区礼仪相近，但工夫茶道程序稍简；汕尾市区现代家庭受广府文化影响，有时改用广府婚俗做法或将奉茶并入婚宴；农村地区仍严格保留独立的次日清晨奉茶仪式。"}
,{"n":"做忌（祭忌日）","py":"Tsò-kì（海陆丰话）","c":"👶 人生礼仪","sc":"丧葬礼仪 / 祭祀亡者","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"亡者忌日（逝世周年）；头三年须做头忌、二忌、三忌","intro":"「做忌」是在亡者逝世周年当日，家人聚集家中祭拜亡灵的仪式。摆设祭品、上香、烧纸钱，并煮亡者生前爱吃的食物供奉，以寄哀思。头三年忌日尤为重要，称为「头忌」「二忌」「三忌」，须宴请亲族，规模如小型祭祀宴。","items":"香烛、纸钱（金银纸）、三牲（鸡、猪肉、鱼）或五牲、亡者生前爱吃的食物、酒杯、茶杯、碗筷、鲜花、白饭","steps":"1. 忌日当天，家人清晨于厅堂神主牌位前摆设祭台，铺上白布（头三年）或红布（三年后）。\n2. 依次摆放三牲、亡者爱食、白饭、茶酒，另备纸钱叠好于旁。\n3. 由家中长子（或长辈）点香，按辈分高低逐一上香，默念告知忌日已至，请亡者享用祭品。\n4. 香燃过半后，于门外或指定地点焚烧纸钱（金银纸、纸扎衣物等）。\n5. 撤祭后，家人共享祭品，头三年须宴请亲族同食。","taboo":"忌日当天家人须素净，避免喜庆打扮；头三年忌日不可奏乐或举办喜庆活动；焚烧纸钱须在指定地点，不可在室内焚烧；忌日当天不可向他人讨债或争吵；三年内忌日须以白色为主色，三年后方可改用红色祭具。","story":"「做忌」体现了闽南慎终追远的孝道传统。汕尾地区受海洋文化影响，渔民家庭尤重忌日祭祀，认为善待亡者可保佑出海平安。头三年「三忌」制度源于古礼「三年之丧」，将长期守孝压缩为三个重要节点，使孝道与日常生活取得平衡。","diff":"海丰县城头忌、二忌、三忌规模较大，须宴请亲族；陆丰农村地区忌日仍保留「封斋」（当日不杀生）习俗；汕尾市区城市化后做忌仪式趋于简化；惠东边界地区混合客家做忌习俗，祭品中加入客家「茶粄」。"}
,{"n":"清明扫墓","py":"Tshing-mîng sàu-bōng（海陆丰话）","c":"🏠 宗族与日常礼节","sc":"宗族祭祀 / 扫墓祭祖","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"清明节（公历4月4-6日）前后十天内","intro":"清明扫墓是汕尾最重要的宗族集体活动之一。各姓宗族于清明前后数日内，由族长或房长召集全族男丁（现也包括女性）携带祭品，前往祖先坟墓，清除杂草、修缮墓碑、摆祭品、上香、烧纸钱，最后共享「墓粄」（祭墓糕点）。大族扫墓往往跨越数代，可历时多日。","items":"三牲（鸡、猪肉、鱼）或五牲、白饭、酒、茶、水果、鲜花、香烛、金银纸、镰刀（除草）、石灰粉（描字）、红桃粿或发粿、鞭炮","steps":"1. 扫墓前数日，房长通知族人集合日期，分配祭品采购任务。\n2. 扫墓当日，族人于约定时间集合，携带祭品、工具前往祖坟。\n3. 先以镰刀清除墓周杂草、修整坟堆，并以石灰粉重新描出墓碑上的刻字（使其清晰显白）。\n4. 祭台摆放完毕后，由族中辈分最高者点香，众人按辈分依次上香祭拜。\n5. 香燃过半后，于墓前焚烧纸钱，燃放鞭炮。\n6. 扫墓毕，族人于墓地旁共享红桃粿等祭品，称「食墓粄」，象征祖先与子孙同食。","taboo":"扫墓须择吉日，不可在「冲」本命年的日子；孕妇及幼儿（三岁以下）不宜参加扫墓；扫墓须在日落前完成；描墓碑字时须用白色石灰，不可用红色；祭品不可倒翻，否则视为不祥；扫墓当日不可理发。","story":"汕尾地区海陆丰宗族历史悠久，清明扫墓既是孝道体现，也是宗族凝聚力的重要机制。海丰彭氏、林氏等大族每年扫墓可召集数百族人，兼有清算族田收益、调解宗族纠纷的功能。汕尾沿海渔民认为，清明祭祖可保佑出海平安；山区农民则祈求风调雨顺、五谷丰登。","diff":"海丰县城大族扫墓规模宏大，有专属族田收入支付祭祀费用；陆丰碣石地区扫墓后有「食福」宴会传统，由族田收入宴请全族；汕尾市区城市家庭多以家庭为单位扫墓，宗族集体活动减少；深汕合作区客家移民清明扫墓与闽南俗相近，但祭品中加入客家「艾粄」。"}
,{"n":"入伙（新屋入住礼）","py":"Ji̍p-huê（海陆丰话）","c":"🏠 宗族与日常礼节","sc":"居所礼仪 / 迁居入新屋","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"新居落成后，由风水先生择定吉日","intro":"新屋建成后，须经「入伙」仪式方可正式居住。仪式由风水先生择定吉日良时，届时家人搬入第一件物品（通常是米桶或炉灶），随后供奉灶神、安神位，燃放鞭炮，宴请亲友。整个过程强调「旺气进门、邪气尽退」。","items":"米桶（装满大米）、红布、香烛、三牲、金银纸、鞭炮、红包（给工人）、新扫帚（带叶连根）、万年青（或榕树枝）、灶神像","steps":"1. 吉日前数日，请风水先生确认吉时（通常为上午辰时或巳时），并指定第一件入门物品。\n2. 吉日吉时，家中最年长女性（或当家主妇）手捧装满大米的米桶，率先踏入新居，边走边念：「入门大吉，财丁两旺。」\n3. 随后将新扫帚、万年青枝（或榕枝，象征生生不息）带入，置于门厅显眼处。\n4. 在厨房安置灶神（贴灶神画像于灶台上方），点香供奉，请灶神入驻。\n5. 全家合力摆设家具，安置神位于正厅，上香祭拜地基主（土地神）。\n6. 宴请亲友，燃放鞭炮，庆祝乔迁。","taboo":"入伙当日不可将旧垃圾扫出门外（寓意扫出财气）；入伙后三天内不可将东西搬出屋外；孕妇须在吉时过后方可入内；入伙当日不可哭泣；新居未安神位前，亲友不可在内过夜；灶神画像须安置于灶台上方，不可贴于墙角或低处。","story":"「入伙」礼仪源于中国传统「五行」与「宅神」信仰，认为新房须以仪式「激活」灵气，方可成为保护家人的「福地」。汕尾地区「米桶先入门」的做法，象征「仓廪充实、衣食无忧」，是农耕与渔猎文化对丰收期待的共同表达。灶神信仰在汕尾尤为盛行，每家每户厨房必设灶神，「入伙」须首先安奉灶神。","diff":"海丰农村入伙仪式须延续三天，首日入伙、次日「暖屋」（宴请邻里）、第三日「谢土」（祭拜土地公）；陆丰城区入伙仪式多合并于一日完成；汕尾市区现代楼房入伙，传统仪式多简化为「带米桶进门、烧香放炮」；部分家庭会请道士做「净宅」仪式，以确保屋内无阴气。"}
,{"n":"汕尾鱼丸","py":"Hî-uân（海陆丰话）","c":"🍜 饮食民俗","sc":"渔港饮食 / 海鲜加工","lv":"L3 汕尾市专属","rg":["汕尾市区","海丰","陆丰"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"全年皆有，传统上以春秋两季鱼最鲜时制作","intro":"汕尾鱼丸以新鲜海鱼（马鲛鱼、鳗鱼为上品）手工捶打成鱼浆，加入地瓜粉、盐、葱白等调制后，挤成球状入沸水煮熟。口感爽弹，是汕尾早市、宵夜摊及家宴不可或缺的传统食品，亦是重要的伴手礼。能在桌上弹跳的鱼丸方为上品。","items":"新鲜马鲛鱼或鳗鱼（去皮去骨）、地瓜粉（番薯粉）、盐、白胡椒粉、葱白、清水、木棰（捶鱼用）、大碗、汤锅","steps":"1. 将鱼肉去皮去骨，切成大块，放于砧板上。\n2. 以木棰反复捶打鱼肉（传统做法须捶打20-30分钟），至鱼肉完全成糊状、无颗粒。\n3. 加入地瓜粉（比例约为鱼肉重量的15-20%）、适量盐、白胡椒粉、葱白末，搅拌均匀。\n4. 反复摔打鱼浆至起胶（能拉出丝状），以此检验弹性。\n5. 烧开一锅清水（不加盐），以虎口挤出圆形鱼丸，入沸水中煮至浮起（约3-5分钟），捞出即可食用。","taboo":"捶打鱼肉时须去除所有鱼刺和鱼皮，否则鱼丸口感粗糙；加入地瓜粉后不可搅拌过度，否则发硬不弹；煮鱼丸的水不可加盐（否则表皮变硬）；新鲜鱼丸不宜放置超过一天，须当日食用或冷冻。","story":"汕尾地处南海之滨，渔业历史逾千年。鱼丸的诞生源于渔民「不浪费」的朴素精神——将卖相不好或剩余的鱼肉加工成鱼丸，既延长保存期限，又提升食用价值。经历代改良，汕尾鱼丸以马鲛鱼为原料的做法成为地方特色，弹性被视为手艺高低的标志。","diff":"汕尾市区（城区）以马鲛鱼丸最为出名，质地细腻弹牙，多用于汤食；海丰县城鱼丸加入少许猪肉增香，口感较厚重；陆丰地区以鳗鱼丸著称，颜色较深，味道更浓郁；碣石镇因靠近大海，渔获丰富，有虾丸、墨鱼丸等变体。"}
,{"n":"红桃粿","py":"Âng-thô-kué（海陆丰话）","c":"🍜 饮食民俗","sc":"祭祀食品 / 节庆糕粿","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"春节、清明、中元节、神诞等重要祭祀节日","intro":"红桃粿是汕尾最具代表性的传统糕粿，以糯米粉或粳米粉制成粉红色桃形外皮，内馅为甜豆沙或咸糯米饭。因形似仙桃，象征长寿吉祥，是汕尾各类祭祀和节庆中必备的供品和礼品。","items":"糯米粉（或粳米粉）、食用红色素（或红曲粉）、猪油、盐、甜馅（绿豆沙、芝麻糖）或咸馅（糯米饭、猪肉、香菇、虾米）、桃形木模、蕉叶或竹叶（垫底）、蒸锅","steps":"1. 将糯米粉加热水、少许猪油揉成光滑面团，加入红色素揉匀，至面团呈均匀粉红色。\n2. 同时准备内馅：甜馅将绿豆煮熟压成豆沙，加糖炒干；咸馅将糯米蒸熟，与炒香的猪肉、香菇、虾米拌匀。\n3. 取适量面团（约50克），搓圆后以手掌压扁，包入馅料（约30克），捏口封紧。\n4. 将包好的粿坯放入桃形木模中，轻按使其成形，再敲出。\n5. 将成形的红桃粿放于蕉叶上，入蒸锅大火蒸15分钟至熟，趁热刷上少许猪油使其光亮。","taboo":"制作红桃粿须在洁净环境中进行；蒸制时锅盖不可中途揭开；供奉用的红桃粿须保持完整，不可破损；用于祭祀的红桃粿食用前须先「退供」（在神位前宣告撤祭）。","story":"红桃粿中的「桃」象征长寿，源于道教「蟠桃」神话。汕尾地区以红桃粿祭神始于唐宋时期，最初为祭天帝和祖先的供品，逐渐发展为各种神诞、节庆的通用祭品。其粉红色传统用红曲染色，现代多改用食用色素，但老一辈仍坚持用红曲以保持传统风味。","diff":"海丰县城红桃粿多为甜馅（绿豆沙或芝麻馅），外形较大；陆丰地区咸馅红桃粿更为普遍，内含糯米饭、猪肉，可作为正式点心食用；汕尾市区现代家庭多直接购买现成品；碣石镇因祭祀传统浓厚，红桃粿做工最为精细，外形桃纹清晰，颜色鲜艳。"}
,{"n":"冬节圆（汤圆）","py":"Tang-tseh-înn（海陆丰话）","c":"🍜 饮食民俗","sc":"节令食品 / 冬至食俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"冬至日（公历12月21-23日）","intro":"汕尾冬至须搓「冬节圆」（汤圆），寓意家人团圆、岁岁平安。冬节圆须由全家人共同搓制，分为甜汤圆（糖水煮）和咸汤圆（猪油、芹菜、虾米汤）两种。搓圆时须留出少量贴于门框、灶台、猪圈等处，称为「贴圆」，祈求六畜兴旺、门庭平安。","items":"糯米粉、清水、食用红色素（少量，用于搓红色小圆）、猪油、白糖（甜汤用）、猪骨汤、芹菜、虾米、鱼露（咸汤用）","steps":"1. 冬至前日或当日清晨，全家人围坐于大桌旁，将糯米粉加水揉成软硬适中的面团。\n2. 取少量面团加入红色素揉成红色，余为白色（红白两色象征阴阳和谐）。\n3. 全家人共同搓圆，每人须参与，以体现「合家欢聚」之意。\n4. 留出少量红色小圆（约10-20个），备用于「贴圆」（贴于门框、灶台、猪圈、果树等处）。\n5. 甜汤圆：煮沸糖水，放入汤圆，煮至浮起即可。咸汤圆：以猪骨汤为底，加芹菜、虾米，放入汤圆煮熟，加鱼露调味。","taboo":"冬节圆须当日搓、当日吃，不可隔夜；搓圆时须搓成圆形，不可搓成方形或不规则形；「贴圆」时须贴于高处，不可贴于地面；冬至日不可打骂家人（忌「破圆」之兆）；贴于门框的圆子须待其自然脱落，不可主动撕去。","story":"汕尾「冬节大过年」的说法流传已久，冬至被视为仅次于春节的重要节日。冬节圆「贴圆」习俗源于对「五方土地」的感谢——贴于灶台感谢灶神、贴于门框感谢门神、贴于猪圈感谢六畜之神。海陆丰话将汤圆称为「圆」，音同「缘」，故冬节吃汤圆亦有「结良缘、续情缘」之意。","diff":"海丰县城冬节圆以甜汤圆为主，用花生糖水或红糖煮；陆丰农村仍保留「贴圆」于牛栏、猪圈的完整习俗；汕尾市区现代家庭多改用市售汤圆，自制者减少；部分客家移民聚居的惠东边界地区，冬至同时保留「吃酿豆腐」的客家习俗。"}
,{"n":"妈祖信仰","py":"Má-tsóo（海陆丰话）","c":"🙏 民间信仰","sc":"海洋神祇 / 妈祖崇拜","lv":"L2 粤东闽语区","rg":["汕尾市区","海丰","陆丰"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历三月廿三（妈祖诞辰）、农历九月初九（妈祖升天日）","intro":"妈祖（天后圣母）是汕尾渔民最重要的守护神，汕尾城区天后宫、碣石玄武山天后宫等庙宇香火鼎盛。每逢妈祖诞辰，渔民须停航祭拜，举行盛大庙会、游神巡海仪式，祈求出海平安、渔获丰收。妈祖信仰深度融入汕尾沿海渔村的日常生活与年度节庆。","items":"三牲五果、香烛、金银纸、妈祖塑像（或画像）、龙舟（游神用）、鞭炮、彩旗、花灯、锣鼓乐器","steps":"1. 农历三月廿三，各天后宫于子时（0时）开始「迎圣」——点燃长明灯，宣告妈祖诞辰到来。\n2. 清晨，渔船须全部靠岸，渔民携带三牲五果前往天后宫上香祭拜，不得出海。\n3. 庙宇举行「上仪式」：由道士主持开坛，诵读疏文，向妈祖报告一年内渔业收成和平安情况。\n4. 正午举行「游神」：将妈祖神像请上神轿，由壮丁抬轿沿指定路线巡游渔村或海边。\n5. 游神毕，庙宇举行「妈祖巡海」仪式（碣石特色）：神轿至海边，渔民以海水淋于神像，象征妈祖巡视领海。","taboo":"妈祖诞辰当日渔船不可出海（视为不敬）；祭拜妈祖的三牲须用全鸡（不可切割）；游神队伍前方不可出现孕妇或穿白衣者；游神时不可从神轿下穿越；祭拜时不可用牛肉（妈祖忌牛）。","story":"妈祖林默（960-987年）生于福建莆田湄洲岛，因传说其能预报天气、救助海难，被沿海渔民奉为神明。随闽南移民南下，妈祖信仰传入汕尾。汕尾城区天后宫始建于明代，历史逾五百年。碣石玄武山同时供奉玄天上帝和妈祖，形成独特的「武妈合祀」格局，在全国罕见。","diff":"汕尾城区天后宫规模最大，诞辰活动可持续三天；碣石镇妈祖诞以「妈祖巡海」为特色，神轿须至海边；海丰公平镇天后宫以「走火」（赤脚过火炭）仪式著名；陆丰渔村妈祖诞规模较小，以家庭祭拜为主。"}
,{"n":"三山国王信仰","py":"Sam-suann-kok-ông（海陆丰话）","c":"🙏 民间信仰","sc":"山神信仰 / 地方保护神","lv":"L2 粤东闽语区","rg":["海丰","陆丰","惠东"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历二月廿五（大王诞）、农历三月初三（三山国王总诞）","intro":"三山国王是粤东地区最重要的地方守护神之一，供奉巾山、明山、独山三位山神，保佑乡土平安、五谷丰登。汕尾海丰、陆丰地区三山国王庙宇广布，每逢诞辰举行盛大游神和「食福」活动，是凝聚乡土认同的重要仪式。","items":"三牲五果、香烛、金银纸、三山国王神像（三位）、神轿（三顶）、彩旗、锣鼓乐器、鞭炮、「福饭」（祭后分发的米饭）","steps":"1. 诞辰前数日，由庙理事会召集各村代表，分配游神路线、祭品采购和抬轿人员。\n2. 诞辰当日清晨，庙祝为三位神像「开光换衣」——为神像擦拭、换上新袍、戴上冠冕。\n3. 上午举行「起驾」仪式：道士开坛，三顶神轿依次出庙，各村抬轿壮丁按序排列，游神队伍浩荡出发。\n4. 游神队伍巡经辖区各村，每到一村，村民须于村口摆设香案迎接，燃放鞭炮。\n5. 游神毕，回庙举行「谢神」仪式，将煮熟的米饭作「福饭」分发给参与者，称「食福」，象征神明赐福。","taboo":"游神路线须按传统走，不可任意更改；祭品中须有三牲且须完整（全猪、全鸡、全鱼）；女性经期不可接近神轿；抬轿壮丁须于前一晚斋戒；「食福」时须将分得的福饭带回家，不可在庙外食用；神轿行进中，旁观者不可用手指指向神像。","story":"三山国王起源于潮汕地区的山岳崇拜，相传三山神曾于隋朝显灵助兵平乱，被封为国王。随潮汕移民及粤东闽语区扩展，三山国王信仰传遍粤东和台湾。汕尾地区三山国王庙与妈祖庙相互补充——妈祖保佑出海渔民，三山国王则保佑在陆农民与整体乡土，形成「海陆分工」的神明格局。","diff":"海丰县城三山国王庙以「走火」仪式为特色；陆丰河田镇三山国王游神规模最大，可聚集周边十余村共同参与；汕尾市区城镇化后三山国王庙部分被拆除，信仰有所淡化；惠东境内客家人亦供奉三山国王，成为闽客共同的信仰载体。"}
,{"n":"建醮谢神","py":"Kiàn-tsiau siā-sîn（海陆丰话）","c":"🙏 民间信仰","sc":"集体祭祀 / 还愿仪式","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"每三年或五年一次，由各村协商择定，通常在秋收之后","intro":"「建醮」是汕尾规模最大的集体宗教仪式，每三至五年由一个村落或联合数村举行，历时三至七天。由道士主持斋醮法事，祈求神明庇佑地方平安、消灾解厄。建醮期间，村中须全面吃斋，外村人可入村观礼，但须遵守斋戒规定。","items":"醮坛（临时搭建的大型法事台）、道士法器（法衣、令旗、宝剑、净水盆）、三清像及诸神像、大量金银纸、斋菜（无荤菜）、彩灯、鞭炮、「天灯」（孔明灯）、戏台（酬神演戏用）","steps":"1. 建醮前数月，村理事会商定日期，邀请道士团队（通常4-8人）并筹集经费（由各户按丁口摊派）。\n2. 建醮前三天，全村「封斋」——所有村民不可食荤，村口立「封斋」告示牌。\n3. 建醮第一天「开坛」：道士设立醮坛，安置诸神像，诵读「开坛疏文」，全村燃放鞭炮。\n4. 此后数天，道士日夜轮流诵经、打醮，为村中各户消灾祈福，同时安排戏班（通常为正字戏或白字戏）连续演出酬神。\n5. 最后一天「圆醮」：道士诵「送神疏」，将诸神送回天界，焚烧醮坛所有符篆和纸扎品，燃放鞭炮，建醮圆满结束。","taboo":"建醮期间全村须严格吃斋，违者被认为污染醮坛；孕妇不可进入醮坛区域；外来者须经净化方可入村（通常在村口跨过「净火」）；建醮期间不可举行婚嫁等喜事；道士诵经期间，旁观者须保持肃静。","story":"建醮制度源于道教「科仪」体系，在汕尾与地方民间信仰深度融合。历史上，建醮往往在大瘟疫、水旱灾害、战乱之后举行，作为集体心理疗愈和社会凝聚的手段。汕尾渔村每逢海难或渔获锐减之年，族人便合议建醮，以仪式回应无法掌控的自然力量。","diff":"海丰县城附近村落建醮规模最大，可历时七天；陆丰碣石玄武山每逢大醮，全镇参与，是粤东最盛大的建醮之一；汕尾市区因城镇化，部分村落改由数村联合举行；沿海渔村建醮特别加入「送船」仪式，焚烧纸制渔船，送走不洁之物和亡魂。"}
,{"n":"城隍爷巡城","py":"Siânn-hông-iâ sûn-siânn（海陆丰话）","c":"🙏 民间信仰","sc":"司法神祇 / 城隍崇拜","lv":"L3 汕尾市专属","rg":["海丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历五月十一（城隍诞辰）；农历七月初一「鬼门开」","intro":"城隍爷是阴间司法神，掌管地方亡魂与人间善恶记录。海丰县城城隍庙历史悠久，每逢城隍诞辰举行「城隍巡城」游神，城隍神像乘坐大轿巡视全城，象征「阴间审判官」巡查人间善恶，使恶人知惧、善人安心。农历七月城隍开鬼门、十五日关鬼门，对应中元节普渡仪式。","items":"城隍爷神像（含文武判官像）、大型神轿、「日夜游神」牌（引路用）、锁链（象征拿问恶鬼）、彩旗、香烛、鞭炮、三牲五果","steps":"1. 城隍诞辰前，庙理事会预备游神路线，通知沿路各户备好香案迎接。\n2. 诞辰当日，庙祝为城隍爷神像「换新衣」「戴官帽」，将文武判官像置于左右。\n3. 游神队伍由「日夜游神」牌打头阵，其后依序为彩旗队、锣鼓队、城隍轿，最后为跟轿信众。\n4. 城隍轿每至一处，主人须上香、献三牲，并可向城隍「投诉」（在纸上写下冤情，投入随行的「告状箱」）。\n5. 游神毕，回庙举行「谢神」，将告状箱内的文书于神前焚烧，视为城隍已收到陈情。","taboo":"城隍游神时，路边观众不可嬉笑或指指点点；「告状箱」所投文书须用毛笔书写；夜间不可独自前往城隍庙；农历七月城隍庙「鬼门」期间，不可在庙外丢弃食物。","story":"城隍信仰起源于先秦时期的城池守护神崇拜，历代官方均将城隍纳入正式祭祀体系。海丰城隍庙始建于明朝，知县上任须先拜城隍，表示接受神明监督。城隍「巡城」制度反映了古代民众对「阴间司法」的期待——当人间司法不公时，城隍成为最后的「上诉途径」，投入告状箱的文书据说能引起城隍关注。","diff":"海丰县城城隍庙规模最大，游神队伍可达数百人；汕尾市区城区有独立城隍庙，游神时常与各社区土地公联合巡游；陆丰地区城隍信仰与三山国王信仰并行；农历七月城隍「开关鬼门」仪式是各地普渡（中元节）仪式的重要组成部分。"}
,{"n":"元宵节闹花灯","py":"Guân-siâu-tseh nāu-hue-ting（海陆丰话）","c":"🎉 岁时节庆","sc":"春节延伸 / 灯节游乐","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历正月十五元宵节，部分地区延至正月十八","intro":"汕尾元宵节以「闹花灯」为核心活动，家家户户悬挂花灯，街道灯市绵延数里，并举行猜灯谜、舞龙舞狮、游花灯等活动。传统上，「上灯」（为新生男丁挂灯）是元宵节最重要的宗族仪式，代表男丁正式进入宗谱，享有祠堂分猪肉的权利。","items":"花灯（手工竹篾纸糊灯或现代彩灯）、蜡烛或LED灯芯、灯谜卷轴、龙狮道具、锣鼓、鞭炮、汤圆（元宵夜食用）、「上灯」专用花灯（通常为红色鱼形或莲花形）","steps":"1. 元宵节前数日，各家购买或制作花灯，悬挂于门前、厅堂；商铺沿街拉起花灯串，营造灯海氛围。\n2. 元宵日下午，「上灯」仪式：上一年内添有男丁的各家，须在宗祠或庙宇专设「灯棚」处悬挂新灯，向宗族报告新丁降生，交「灯脚钱」（入谱费）。\n3. 入夜后，全家点亮花灯，提灯出行，孩童手持「兔儿灯」「鱼儿灯」在街道游行。\n4. 各处设「灯谜摊」，猜中者得奖品，商家竞相出题，称「打灯谜」。\n5. 舞龙舞狮队伍沿街表演，最终在宗祠前汇聚，举行「化龙」（焚烧纸龙）仪式，将一年的祈愿随龙升天。","taboo":"「上灯」挂的花灯须保持点亮至灯节结束，中途不可熄灭；灯不可倒挂；提灯游行时，若灯火熄灭须重新点燃，不可弃灯离去；元宵夜不可早睡（须守岁至深夜）；花灯不可借给他人，否则「福气外流」。","story":"元宵「上灯」习俗将「添丁」与「点灯」谐音融为一体（「灯」谐「丁」），是闽南宗族文化的重要体现。汕尾海陆丰地区宗族观念浓厚，男丁须于元宵正式「上灯入谱」方算宗族成员。随社会发展，女丁亦逐渐被纳入「上灯」行列，但男丁传统仍更为正式。","diff":"海丰县城「上灯」仪式最为隆重，须于祠堂举行，由族长主持；陆丰碣石镇元宵花灯以海洋主题灯笼著名（制作鱼、虾、龙舟形花灯）；汕尾市区元宵活动结合现代灯光艺术展，传统竹篾花灯逐渐减少；陆丰甲子镇「上灯」完毕后有「烧花炮」习俗（抢花炮），竞争激烈，往往全村出动。"}
,{"n":"端午扒龙船","py":"Tuann-ngóo pâ-liông-tsûn（海陆丰话）","c":"🎉 岁时节庆","sc":"端午节 / 龙舟竞渡","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"农历五月初五端午节（有时延至初七「散龙船」）","intro":"汕尾端午龙舟竞渡（本地称「扒龙船」）历史悠久，各村备有专属龙舟，于端午节前后在河道或海湾竞渡。除竞速外，还有「采青」「祭龙」「送龙船」等仪式性活动，整个端午成为水上节庆与宗族竞技的综合活动。","items":"龙舟（长20-30米，配有龙头、龙尾）、划桨、鼓、锣、彩旗、粽子、艾草、菖蒲、黄酒、三牲（祭龙头用）、雄黄粉","steps":"1. 端午节前，各村「起龙船」——将存放于龙船棚（或水底）的龙舟取出，清洗、修缮，并请道士或庙祝「点睛」（为龙头开光）。\n2. 初四或初五清晨，举行「祭龙」仪式：以三牲祭拜龙头，点香烧纸，祈求竞渡平安；将供品中的鸡血涂于龙头（「开光」）。\n3. 「采青」：龙舟于河道上行驶，至河边青草丛或树枝处，由桨手折取绿枝插于船头，象征采纳生气。\n4. 正式竞渡：各村龙舟鸣鼓起棹，在锣鼓声中奋力划向终点，全场呐喊助威。\n5. 竞渡结束后，举行「散龙船」：龙头、龙尾被请下入库，龙舟再次沉入水底或存入龙船棚，等待来年。","taboo":"龙头开光后，任何人不可用手触摸龙头眼部；女性不可登上龙舟参与竞渡（传统习俗，现代已有改变）；竞渡期间若有人落水，须立即救起；落水者不可由对方船只救起，须由本村人救援；「散龙船」前不可擅自拆解龙舟。","story":"汕尾龙舟竞渡既有纪念屈原的文化含义，又深嵌于渔村对龙神的崇拜——龙是海洋的主宰，与渔业生产密切相关。汕尾各村对龙舟的重视程度极高，龙舟优劣关乎村庄荣誉，部分大村长期供养专职龙舟队员。「采青」习俗源于古代竞渡前的「采药」行为，与汕尾「避邪」信仰融合后演化为采绿枝以纳生气。","diff":"汕尾市区（品清湖）龙舟赛规模最大，现为官方组织的文化体育活动，参与村庄达数十支；海丰县城附近赤石河道龙舟竞渡历史最悠久，保留「祭龙」最完整仪式；陆丰甲子港因为海港，龙舟在海湾竞渡，场面更为壮观；陆丰螺河流域各村龙舟多于河道上下行来回比速，与汕尾式并排竞速有所不同。"}
,{"n":"中元节普渡","py":"Tiong-guân-tseh phóo-tōo（海陆丰话）","c":"🎉 岁时节庆","sc":"鬼节 / 普渡超幽","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历七月十五（中元节正日）；各村轮流于农历七月不同日期举行","intro":"中元节（俗称「鬼节」）是汕尾规模仅次于春节的重大节日。农历七月「鬼门开」，无主孤魂进入人间，各家各户须于门口摆设「路祭」，并参与村庙主办的「普渡」法事，超度无主亡灵，兼顾祭拜自家祖先。整个农历七月，各村庄轮流举行普渡，形成「流水普渡」格局。","items":"三牲五果、白饭（每碗需插一枝香）、纸钱（金银纸）、纸扎衣物食品、香烛、水果、面条（象征长寿）、糖果饼干（给孤魂野鬼）、道士（主持普渡法事）","steps":"1. 农历七月初一，城隍庙举行「开鬼门」仪式，宣告亡灵进入人间。\n2. 各村按惯例确定本村普渡日期（各村错开，避免同日争抢神明注意）。\n3. 普渡日傍晚，各家于门口摆设「路祭」：桌上放三牲五果、白饭、糖果，朝向街道方向，意为招待街上游荡的孤魂野鬼。\n4. 点香上供，焚烧纸钱，并撒米（称「施孤米」）于门外，以施食孤魂。\n5. 村庙同步举行「普渡法事」：由道士主持诵经，超度水旱战疫等各类无主亡灵。农历七月十五（正日），各户再次「拜地」，以圆满结束普渡。","taboo":"农历七月不宜搬家、结婚、开业（鬼月不吉）；夜间不可单独在河边、海边行走；「路祭」摆好后须将家门关闭（以免孤魂进屋）；不可用手指月亮；七月间不可拍打他人肩膀（会「拍走三魂」）；普渡供品食用前须先「退供」。","story":"中元普渡融合了道教「中元地官赦罪」、佛教「盂兰盆节」与民间鬼神信仰三重传统。汕尾地区因历史上多次瘟疫、海难和战乱，留有大量无主孤魂，普渡信仰尤为深厚。「流水普渡」制度——各村错开日期——源于资源分配的实际需要，同时使整个农历七月都处于祭祀氛围之中，强化了地区共同体意识。","diff":"海丰县城普渡以「大孤棚」著称，供桌高达数层，陈列祭品数百件；陆丰甲子镇普渡有「放水灯」传统——于夜间将点燃的莲花形纸灯放入海中，为水中亡灵引路；汕尾市区因城市管理，普渡规模受限，焚烧纸钱须在指定地点；渔村普渡特别强调「海中亡灵」的超度，祭品中须包含鱼类，并向海面撒米。"}
,{"n":"白字戏","py":"Pe̍h-jī-hì（海陆丰话）","c":"🎭 戏曲与口传文艺","sc":"地方戏曲 / 海陆丰方言剧种","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"全年皆有演出，以神诞、节庆为主要演出场合","intro":"白字戏是汕尾（海陆丰地区）独有的地方剧种，以海陆丰话（学佬话）为演唱语言，融合南音、潮调等音乐元素，曲调悠扬婉转，题材多为民间故事和忠孝节义传说。2008年被列为国家级非物质文化遗产，是汕尾最具代表性的文化符号之一。","items":"传统戏台（或临时搭建野台）、南音乐器（二弦、横笛、椰胡、月琴、唢呐）、打击乐（大锣、小锣、钹、板鼓）、传统服装（戏服、盔头）、脸谱颜料、布景画片","steps":"演出程序：\n1. 演出前，乐师于台侧「起乐」——奏开场音乐15-30分钟，预告演出即将开始，吸引观众聚集。\n2. 「报幕」：台口报出演出剧目名称。\n3. 正式演出：角色分为生（文生、武生）、旦（正旦、花旦）、净（花脸）、末（老生）、丑（三花）五大行当，演员依唱念做打分工演出。\n4. 白字戏以「曲牌联套」结构组织音乐，唱词用海陆丰话，念白亦用方言，与正字戏（中州官话）相区别。\n5. 酬神演出按惯例须先演「开场短折」（三仙、天官等吉祥折子），再演正剧。","taboo":"演出前演员须拜「田都元帅」（戏神），不拜不可登台；饰演反派的演员下台后须「洗脸」（卸去脸谱）才可正常与人交谈；酬神演出不可演出「悲剧结局」；演员不可坐于道具箱上（被认为会压台运）。","story":"白字戏形成于明末清初，因用海陆丰「白话」（方言）演唱而称「白字戏」——相对于「正字」（官话音）而言。20世纪后期濒临失传，当地政府设立海丰县白字戏传承剧团，保护传承。海外海陆丰华人录像资料中保存了部分已失传的传统剧目，反哺故乡传承工作。","diff":"海丰县白字戏剧团是最重要的保存机构，剧目最为丰富；陆丰地区白字戏与正字戏并行，观众群体有所区分；汕尾市区现代演出场所逐渐增加，但传统野台（露天演出）形式仍是主流；部分年轻团体尝试将白字戏与现代剧场结合，创作新题材剧目。"}
,{"n":"正字戏","py":"Tsìng-jī-hì（海陆丰话）","c":"🎭 戏曲与口传文艺","sc":"古典戏曲 / 南戏正宗","lv":"L3 汕尾市专属","rg":["海丰","陆丰"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"全年皆有演出，以神诞庙会为主；大醮建醮期间必演","intro":"正字戏是汕尾（海陆丰）保存的古老剧种，以中州官话（「正字」）演唱，是宋末南戏流入粤东后的直接传承，与白字戏（方言演唱）并称海陆丰两大剧种。2006年列入国家级非遗，现仅剩陆丰正字戏剧团一家专业团体，被学界誉为「南戏活化石」。","items":"戏台（或野台）、传统乐器（大锣、小锣、三弦、横笛、唢呐、二弦）、传统戏服（颜色严格按行当）、盔头、脸谱颜料","steps":"演出程序：\n1. 演出前奏乐「起锣鼓」（大锣、小锣、钹等打击乐合奏，约15分钟）。\n2. 角色分生、旦、净、末、丑五大行当，以中州官话唱念（与现代普通话略有不同，保留古入声）。\n3. 武打场面以「打出手」（抛掷武器）著名，演员须接住高速飞来的兵器，技巧高超，是正字戏的最大特色。\n4. 酬神演出须先演《三仙白》《天官赐福》等开场吉祥折子，再演正剧；正剧须选「大团圆结局」剧目。\n5. 演出结束，由班主或台柱旦角向神明「谢神」，方可收场。","taboo":"酬神演出须先演吉祥折子再演正剧，不可颠倒；演出「鬼戏」（鬼魂角色）须有禳解仪式；武打道具不可指向观众方向；饰演死亡角色者下台须绕道行走，不走正门；女演员（旦角）不可在后台穿戴男角服装。","story":"正字戏源于宋末南戏，随难民和商人传入粤东，在元明两朝逐渐定型。「正字」区别于「白字」（方言）——正字戏保留了相对标准的古汉语唱腔，被学者视为研究宋元戏曲的活化石。20世纪60-70年代濒临失传，改革开放后政府扶持陆丰正字戏剧团重新恢复演出，并赴港台及东南亚巡演。","diff":"陆丰正字戏现存唯一专业剧团（陆丰市正字戏传承保护中心），是正字戏保存最完整之地；海丰县白字戏剧团有时兼演正字戏折子，但非主业；汕尾市区偶有正字戏演出，多在大型庙会；马来西亚曾有正字戏班演出记录，现已失传，仅留录像资料。"}
,{"n":"渔歌对唱","py":"Hî-kua tuì-tshiùnn（海陆丰话）","c":"🎭 戏曲与口传文艺","sc":"口传文艺 / 渔业民歌","lv":"L3 汕尾市专属","rg":["汕尾市区","海丰","陆丰"],"st":"🟡 待补充","cr":"★ 口述与民间流传","tm":"传统上于捕鱼归来、晒网休息时即兴对唱；节庆场合亦有组织对唱","intro":"汕尾渔歌是沿海渔民在长期海上劳作中形成的口头民歌传统，以海陆丰话演唱，曲调自由奔放，歌词即兴创作，内容涵盖海上生活、爱情、神明崇拜和生活感悟。渔歌对唱曾是渔村最重要的娱乐形式，现因渔业转型和电子媒体普及而趋于式微，会唱者多为六十岁以上老一辈渔民。","items":"无需乐器（清唱为主）；现代演出场合有时配以二弦或横笛伴奏","steps":"传统对唱形式：\n1. 渔船归港、渔民晒网整理时，由一人起唱（通常以「哎哟」开头），叙述当日捕鱼经历或感叹天气。\n2. 对方渔船或岸上渔民接唱，以同曲调即兴回应，内容可呼应、可反驳、可调侃。\n3. 对唱以曲调一致、歌词押韵为基本要求，以机智幽默、出口成章为高下之分。\n4. 节庆场合正式对唱：分男女两队，轮流出人，以「接龙」方式持续对唱，最先接不上词者认输。","taboo":"对唱时不可唱丧事相关词语（「死」「鬼」等）；对唱若涉及对方家人须以尊称，不可辱骂；渔船出海前不可演唱送别或哀愁曲调，须唱吉祥词语；对唱中不可提及「沉船」「翻船」等不祥字眼。","story":"汕尾渔歌是闽南「歌仔」传统与粤东海洋文化结合的产物，曾是海陆丰渔民传递信息、调解矛盾、娱乐休闲的重要手段。渔歌中保存了大量海洋地名、鱼类名称和捕鱼技术，是研究当地渔业史的活化石。1950-70年代，民间文艺工作者记录了大量传统渔歌歌词。","diff":"汕尾市区（马宫、东洲岛）渔歌保存最为完整；海丰小漠镇渔歌曲调较为低沉，多反映艰辛的深海捕鱼生活；陆丰甲子、碣石渔歌因临近潮汕，部分曲调受潮汕歌谣影响；现代传承人多尝试将渔歌曲调与现代流行音乐结合，以吸引年轻一代。"}
,{"n":"下山虎民居","py":"Hā-suann-hóo（海陆丰话）","c":"🏡 传统建筑与工艺","sc":"民居建筑 / 合院式布局","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"常年可见；传统建造多在冬季农闲时期动工","intro":"「下山虎」是汕尾（海陆丰）地区最具代表性的传统民居格局，平面形如下山老虎而得名。建筑以两侧「虎耳」（厢房）和中央「虎口」（天井-正厅）为核心，形成三合院格局，通风采光良好，适应岭南湿热气候。现存大量清代至民国时期的下山虎古宅，是汕尾重要的文化遗产。","items":"（建造用）青砖或红砖、杉木梁架、贝灰（蚝壳烧成，替代石灰）、琉璃瓦、卵石（铺地用）、彩绘颜料（用于门楼彩绘）","steps":"格局说明：\n1. 下山虎标准格局为「一厅二房」：中央为正厅（供奉祖先神位）；两侧为「虎耳」（厢房，供家人居住）；正厅前方为天井（内院），天井两侧有耳房（厨房、杂物间）。\n2. 入口「门楼」位于天井前方，多有精美石雕或灰塑装饰，门联多书吉祥词语。\n3. 正厅（虎口）设祖先牌位和神位，是全宅精神核心，所有家庭仪式均于此举行。\n4. 建筑材料以贝灰（蚝壳烧成的石灰）为特色，是沿海地区独有建材，具有防潮防盐侵蚀的优点。\n5. 门楼上的灰塑（贝灰雕刻）常描绘戏曲故事和吉祥图案，是民间工艺的重要载体。","taboo":"下山虎朝向须经风水师确认，不可随意面朝不吉方位；正厅中轴线不可被阻断；大门不可正对胡同或巷子口（「冲煞」）；天井不可加盖顶棚（封天井被认为「堵财气」）；神位须高于地面，不可与卧室同室。","story":"「下山虎」之名源于风水意象——虎下山象征「势不可挡，旺气下行」，两侧虎耳（厢房）护卫中央，如老虎张开前肢。这一格局与闽南传统「三合院」一脉相承，在汕尾因地制宜加入贝灰、琉璃瓦等适应性元素。许多下山虎古宅门楼上的灰塑保留了精美的民间工艺。","diff":"海丰县城保留最多完整下山虎古宅，部分已列为文物保护单位；陆丰大安镇、河田镇下山虎群落保存完好；汕尾市区旧城区仍有零散下山虎，但因城市改造多遭拆除；陆丰博美镇出现「下山虎与围龙屋结合」的混合型民居，全国罕见。"}
,{"n":"汕尾侨乡习俗传播","py":"Suann-bî kiâu-hiong sip-siok tsuân-pò","c":"🌏 侨乡与海外传播","sc":"海外华人 / 闽南俗海外保存","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 待补充","cr":"★★ 地方志与田野调查","tm":"全年；重要节点为春节、清明（海外侨亲回乡祭祖季）","intro":"汕尾（海陆丰）是著名侨乡，历史上大批居民移居东南亚（马来西亚、泰国、印尼、新加坡）及香港、台湾。海外海陆丰华人建立同乡会、妈祖庙、三山国王庙，并在海外保留了白字戏班、海陆丰方言歌谣等传统。每年清明前后，大批海外侨亲回乡祭祖，带动故乡民俗的活化与经济发展。","items":"（海外保留）妈祖神像、三山国王神像、白字戏道具、海陆丰传统食谱（红桃粿、鱼丸等食材）","steps":"海外习俗保留机制：\n1. 同乡会组织：海外各地海陆丰华人成立同乡会（如马来西亚「海陆丰同乡会」），定期举办同乡聚会，维系乡音乡俗。\n2. 庙宇移植：在海外重建妈祖庙、三山国王庙，将故乡神明香火带出，于海外神诞日举行游神，保留原乡仪式形式。\n3. 白字戏传承：马来西亚、泰国等地华人社区保留白字戏班，于节庆演出，但因缺乏新血，多数已趋式微。\n4. 饮食传承：海外华人将红桃粿、鱼丸等传统食品制作技艺带出，在海外华人社区仍有制作，是乡愁的具体载体。\n5. 回乡祭祖：每年清明前后，海外侨亲组织「回乡团」，集体返乡扫墓祭祖，并捐款修缮祠堂、庙宇，维系与原乡的精神纽带。","taboo":"海外侨亲回乡参与祭祀须遵守本地仪式规矩，不可将海外「改良」做法随意引入；捐款修缮庙宇须经宗族同意，不可单方面改变神像或庙宇格局。","story":"汕尾侨乡史始于明清时期，海陆丰人因战乱、饥荒和经济压力大批下南洋。海外海陆丰华人对故乡文化的坚守，往往比本地更为执着——一些已在马来西亚失传的白字戏剧目，反而在海外华人录像资料中得以保存，反哺故乡传承工作。","diff":"马来西亚槟城、吉隆坡海陆丰华人聚集区保留最完整的三山国王信仰和妈祖信仰，部分庙宇有百年历史；泰国曼谷海陆丰华人以商贸为主，民俗保留程度次之；香港新界围村有部分海丰移民后裔，将下山虎建筑风格带入香港传统村落；台湾亦有少量陆丰移民，集中于屏东、高雄一带，多已融入闽南主流文化。"}
]);

let activeCat='', activeSt='', activeRg='', filtered=[];

const CAT_ORDER=["👶 人生礼仪","🏠 宗族与日常礼节","🍜 饮食民俗","🏡 传统建筑与工艺","🌏 侨乡与海外传播","🎭 戏曲与口传文艺","🙏 民间信仰","🎉 岁时节庆"];
const ENTRY_ORDER={
"👶 人生礼仪":["做三朝","食新娘茶","做忌（祭忌日）"],
"🏠 宗族与日常礼节":["清明扫墓","入伙（新屋入住礼）"],
"🍜 饮食民俗":["汕尾鱼丸","红桃粿","冬节圆（汤圆）"],
"🏡 传统建筑与工艺":["下山虎民居"],
"🌏 侨乡与海外传播":["汕尾侨乡习俗传播"],
"🎭 戏曲与口传文艺":["白字戏","正字戏","渔歌对唱"],
"🙏 民间信仰":["妈祖信仰","三山国王信仰","建醮谢神","城隍爷巡城"],
"🎉 岁时节庆":["元宵节闹花灯","端午扒龙船","中元节普渡"]
};
(function(){
  const ci={};CAT_ORDER.forEach((c,i)=>ci[c]=i);
  const ei={};for(const c in ENTRY_ORDER){ei[c]={};ENTRY_ORDER[c].forEach((n,i)=>ei[c][n]=i);}
  DATA=DATA.map((e,i)=>({e,i})).sort((a,b)=>{
    const ca=ci[a.e.c]??999,cb=ci[b.e.c]??999;
    if(ca!==cb)return ca-cb;
    const ra=(ei[a.e.c]&&a.e.n in ei[a.e.c])?ei[a.e.c][a.e.n]:9999;
    const rb=(ei[b.e.c]&&b.e.n in ei[b.e.c])?ei[b.e.c][b.e.n]:9999;
    if(ra!==rb)return ra-rb;
    return a.i-b.i;
  }).map(x=>x.e);
})();

function updateCounts(){
  const cats=[
    ['na',''],
    ['n1','🏠 宗族与日常礼节'],['n2','👶 人生礼仪'],['n3','🎉 岁时节庆'],
    ['n4','🙏 民间信仰'],['n5','🍜 饮食民俗'],['n6','🌏 侨乡与海外传播'],
    ['n7','🏡 传统建筑与工艺'],['n8','🎭 戏曲与口传文艺']
  ];
  cats.forEach(([id,cat])=>{
    const el=document.getElementById(id);
    if(!el)return;
    const n=cat?DATA.filter(e=>e.c===cat).length:DATA.length;
    el.textContent=' '+n;
  });
}
function setCat(btn,cat){
  activeCat=cat;
  document.querySelectorAll('.fc[data-cat]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}
function setSt(btn,st){
  activeSt=st;
  document.querySelectorAll('.fc[data-st]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}
function setRg(btn,rg){
  activeRg=rg;
  document.querySelectorAll('.fc[data-rg]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('sq')||{value:''}).value.toLowerCase();
  filtered=DATA.filter(e=>{
    if(activeCat&&e.c!==activeCat)return false;
    if(activeSt&&e.st!==activeSt)return false;
    if(activeRg&&!(e.rg||[]).includes(activeRg))return false;
    if(q&&!(e.n+' '+(e.intro||'')).toLowerCase().includes(q))return false;
    return true;
  });
  const rc=document.getElementById('rc');
  if(rc)rc.textContent='显示 '+filtered.length+' / '+DATA.length+' 条';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  if(!g)return;
  if(!filtered.length){g.innerHTML='<div class="empty">无匹配条目</div>';return;}
  g.innerHTML=filtered.map((e,i)=>{
    const cc=CC[e.c]||'#7A9BAE';
    const rgs=(e.rg||[]).slice(0,3).map(r=>'<span class="rt">'+r+'</span>').join('');
    const tm=e.tm?'<div class="cred">🕐 '+e.tm.split('（')[0].split('；')[0]+'</div>':'';
    return '<div class="card" style="--cc:'+cc+'" onclick="openDrawer('+i+')">'
      +'<div class="ct"><div><div class="cn">'+e.n+'</div>'+(e.py?'<div class="cp">'+e.py+'</div>':'')+'</div>'
      +'<div class="cs">'+e.c.split(' ')[0]+'</div></div>'
      +'<span class="cpill" style="background:'+cc+'">'+e.sc+'</span>'
      +'<div class="ci">'+(e.intro||'')+'</div>'
      +'<div class="cm">'+rgs+'</div>'
      +tm
      +'</div>';
  }).join('');
}

function openDrawer(idx){
  const e=filtered[idx];
  if(!e)return;
  const cc=CC[e.c]||'#7A9BAE';
  const bdg=document.getElementById('dbdg');
  const cred=(e.cr||'').replace(/★/g,'<span class="stars">★</span>');
  bdg.innerHTML='<span class="bdg catb" style="background:'+cc+'">'+e.c+'</span>'
    +'<span class="bdg">'+e.sc+'</span>'
    +(e.lv?'<span class="bdg">'+e.lv+'</span>':'')
    +(e.st?'<span class="bdg">'+e.st+'</span>':'');
  document.getElementById('dtit').textContent=e.n;
  document.getElementById('dpy').textContent=e.py||'';
  const rows=[
    ['时间/时节',e.tm],
    ['适用地区',(e.rg||[]).join('、')],
    ['简介',e.intro],
    ['所需物品',e.items],
    ['操作步骤',e.steps,true],
    ['禁忌',e.taboo],
    ['背后故事',e.story],
    ['地域差异',e.diff],
    ['可信度/来源',cred],
  ];
  let html='';
  rows.forEach(([label,val,isStep])=>{
    if(!val)return;
    html+='<div class="ds"><div class="dsl">'+label+'</div>';
    if(isStep)html+='<div class="stepbox">'+val+'</div>';
    else html+='<div class="dst">'+val+'</div>';
    html+='</div>';
  });
  if(e.url)html+='<div class="divl"></div><a class="nlink" href="'+e.url+'" target="_blank">📎 在 Notion 中查看</a>';
  document.getElementById('dbody').innerHTML=html;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrawer(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

function maybeClose(e){
  if(e.target===document.getElementById('ov'))closeDrawer();
}

document.getElementById('pill').textContent='共 '+DATA.length+' 条民俗';
updateCounts();
applyFilters();
</script>
</body>
</html>
