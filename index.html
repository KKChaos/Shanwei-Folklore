<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汕尾民俗知识库</title>
<style>
:root{color-scheme:light;--bg:#F2F6FA;--paper:#F8FBFD;--ink:#0D2233;--mid:#3A5A72;--muted:#7A9BAE;--red:#1A6B8A;--rbg:#DDF0F5;--bdr:#C8DDED;--shad:rgba(13,34,51,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0A1E2C;color:#F2F6FA;padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:2px solid #1A6B8A}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:#5BC8E8}
.sub{font-size:11px;color:rgba(242,246,250,.4);letter-spacing:1px;margin-top:1px}
.hsp{flex:1}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(242,246,250,.7)}
.searchbar{background:var(--paper);border-bottom:1px solid var(--bdr);padding:10px 28px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.si{flex:1;max-width:400px;padding:7px 14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;background:#fff;outline:none;color:var(--ink);transition:border-color .2s}
.si:focus{border-color:var(--red)}
.rc{font-size:12px;color:var(--muted);margin-left:auto}
.main{display:flex;flex:1;overflow:hidden}
aside{width:200px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--bdr);overflow-y:auto;padding:16px 12px}
.fg{margin-bottom:20px}
.fh{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.fc{display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12px;color:var(--mid);text-align:left;transition:background .15s}
.fc:hover{background:var(--bdr)}
.fc.on{background:var(--rbg);color:var(--red);font-weight:600}
.fd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fn{margin-left:auto;font-size:10px;color:var(--muted)}
.fc.on .fn{color:var(--red)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,#7A9BAE)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shad)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cn{font-size:15px;font-weight:600}
.cp{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px}
.cs{font-size:14px;flex-shrink:0}
.cpill{display:inline-block;font-size:10px;font-weight:600;color:#fff;padding:2px 8px;border-radius:4px;margin-bottom:9px}
.ci{font-size:12px;color:var(--mid);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cm{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.rt{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--bdr);padding:1px 7px;border-radius:4px}
.cred{font-size:10px;color:var(--muted);margin-top:8px}
.stars{color:#E8A020}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(13,34,51,.35);z-index:200}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;width:500px;max-width:100vw;height:100vh;background:#fff;overflow-y:auto;box-shadow:-6px 0 28px rgba(13,34,51,.18);transform:translateX(100%);transition:transform .25s ease}
.overlay.open .drawer{transform:translateX(0)}
.dh{padding:20px 24px 16px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:#fff;z-index:1}
.dx{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--bdr);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.dx:hover{background:var(--bg)}
.dbadges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.bdg{font-size:11px;padding:2px 9px;border-radius:5px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.bdg.catb{color:#fff;border:none}
.dtitle{font-size:20px;font-weight:700;margin-bottom:3px}
.dpinyin{font-size:13px;color:var(--muted);font-style:italic}
.db{padding:20px 24px}
.ds{margin-bottom:18px}
.dsl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.dst{font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
.dtags{display:flex;flex-wrap:wrap;gap:5px}
.dtag{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.divl{height:1px;background:var(--bdr);margin:16px 0}
.stepbox{background:var(--bg);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
.srcbox{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;font-family:monospace}
</style>
</head>
<body>
<header>
  <div><div class="logo">汕尾民俗知识库</div><div class="sub">Hái-Lù-Fong Bîn-sio̍k Ji-su-khòo · Ver 2.0</div></div>

      <button class="fc" data-cat="👶 人生礼仪" onclick="setCat(this,'👶 人生礼仪')"><span class="fd" style="background:#D4688A"></span>人生礼仪<span class="fn" id="n2"></span></button>
      <button class="fc" data-cat="🎉 岁时节庆" onclick="setCat(this,'🎉 岁时节庆')"><span class="fd" style="background:#E8A020"></span>岁时节庆<span class="fn" id="n3"></span></button>

      <button class="fc" data-cat="🍜 饮食民俗" onclick="setCat(this,'🍜 饮食民俗')"><span class="fd" style="background:#7BA05B"></span>饮食民俗<span class="fn" id="n5"></span></button>
      <button class="fc" data-cat="🌏 侨乡与海外传播" onclick="setCat(this,'🌏 侨乡与海外传播')"><span class="fd" style="background:#4A8DB8"></span>侨乡传播<span class="fn" id="n6"></span></button>
      <button class="fc" data-cat="🏡 传统建筑与工艺" onclick="setCat(this,'🏡 传统建筑与工艺')"><span class="fd" style="background:#8B6914"></span>建筑工艺<span class="fn" id="n7"></span></button>

<script>
const CC={"🏠 宗族与日常礼节":"#E07B39","👶 人生礼仪":"#D4688A","🎉 岁时节庆":"#E8A020","🙏 民间信仰":"#9B6BB0","🍜 饮食民俗":"#7BA05B","🌏 侨乡与海外传播":"#4A8DB8","🏡 传统建筑与工艺":"#8B6914","🎭 戏曲与口传文艺":"#6B7B8D"};
const CAT_ORDER=["👶 人生礼仪","🏠 宗族与日常礼节","🎉 岁时节庆","🙏 民间信仰","🍜 饮食民俗","🏡 传统建筑与工艺","🎭 戏曲与口传文艺","🌏 侨乡与海外传播"];
let DATA=[
{"n":"剪纸与门笺装饰","py":"剪纸 (Tsián-tsuá)","c":"🎭 戏曲与口传文艺","sc":"民间工艺艺术","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节前后（主要制作与张贴时节）；喜庆节日","src":"[书A] 第八章·民间艺术；[志A] 第十一章·民俗风情·民间工艺","intro":"剪纸与门笺（门前悬挂的彩纸装饰）是海丰春节前最重要的民间装饰艺术。家家户户在门框、窗格、室内剪贴各式红色吉祥图案，并在门楣上悬挂门笺（多色彩纸裁成流苏状），营造新春喜庆氛围。","items":"红色薄纸（主要用色）、金色或彩色薄纸（门笺用）、剪刀、刻刀、剪纸样本（图案模板）、浆糊（粘贴用）","steps":"春节前一至两周，家中女性开始剪纸活动；选定吉祥图案（年年有余之鱼、莲年有余之莲、双喜字、梅花、麒麟等）；折叠红纸后按图案剪出，展开即成对称图案；将剪纸贴于窗格、室内神台旁、镜框上；门笺：用多色彩纸裁成长条流苏，上部固定成排，悬挂于门楣横梁上，随风飘动；春节后，剪纸与门笺保留至下一个春节前才更换。","taboo":"剪纸不可剪出「破」字或残缺图案（寓意不吉）；门笺须成双成对，不可单数悬挂；剪纸完成后不可叠压放置（会「折运气」）；春节前不可将旧年门笺先拆除，须在新年前夕换新。","story":"海丰民间剪纸有着「鱼」的主题偏好——鱼的图案在剪纸中出现频率最高，因「鱼」与「余」谐音，寓意「年年有余」。老一辈剪纸艺人能徒手剪出构造复杂的双鱼戏莲图案，不需模板，全凭手感与经验，其精准度令现代设计师叹服。","diff":"城区剪纸多购买现成商业品，手工制作减少；农村仍有女性自制剪纸的传统，手工版更受重视；客家聚居区剪纸风格与福佬区略有不同，客家剪纸线条更粗犷，色彩更大胆。"},
{"n":"布袋戏（木偶戏）","py":"布袋戏 (Póo-tē-hì)","c":"🎭 戏曲与口传文艺","sc":"传统戏曲艺术","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"神诞庆典、节庆、婚寿喜庆等场合","src":"[书A] 第八章·民间艺术；[书B] 第六章·闽南传统表演艺术","intro":"布袋戏（掌中戏）是以手指操控小型布偶进行表演的民间戏曲，随闽南移民传入海陆丰。表演者将手伸入布偶（以食指控制头部，拇指和中指控制双手），以闽南语演唱故事，形象生动，是海丰民间深受喜爱的传统艺术。","items":"布袋偶（以布为身，木雕为头，手缝制作）、小型戏台（木制折叠台）、锣鼓弦乐（配乐）、各色角色服饰（生旦净末丑均有专属服装）","steps":"演出前，艺人在小型戏台后方准备就绪；以双手各持一个布袋偶，在台上进行双人对话场景；高难度表演时，单人可同时操控两个偶进行搏斗场面；以闽南语（福佬话）为各角色配音演唱，嗓音须一人分饰多角；配乐师随场景节奏变化实时配乐；演出内容多为忠奸善恶的历史演义，也有喜剧短剧；神诞庆典中，布袋戏演出时长可达三至五小时。","taboo":"布袋偶演出完毕须将头部朝上存放，不可倒置；不可让儿童私自取出布袋偶「把玩」（恐损坏精细部件）；演出开场须先向神明行礼，结尾须有「谢神」仪式；在丧事场所不可演出喜剧内容。","story":"海丰布袋戏艺人有「一人千声」之称，一场演出中，艺人须为生旦净末丑各类角色发出不同的声音、语调和唱腔，有时还须同时双手各持一偶进行对话，声音与动作完全分离，是极高难度的综合表演艺术。这一技艺的传承高度依赖口传身授，每位新艺人须跟师学习数年方能独立演出。","diff":"海丰布袋戏以闽南语（福佬话）演出为主，与台湾布袋戏同宗；部分艺人也会演出客家语版本；城区演出已逐渐稀少，主要在农村神诞庆典中保留；近年有文化机构对布袋戏进行系统记录保护。"},
{"n":"皮影戏（海丰）","py":"皮影戏 (Phî-iánn-hì)","c":"🎭 戏曲与口传文艺","sc":"传统戏曲艺术","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"神诞庆典、民俗节庆、婚庆寿宴等喜庆场合","src":"[书A] 第八章·民间艺术；[志A] 第十一章·民俗风情·民间艺术","intro":"皮影戏是海丰传统戏曲艺术的重要组成部分，用雕刻精细的皮革人偶在灯光后演出，以福佬话（闽南语）配唱，题材多取自历史故事与民间传说。海丰皮影戏至今仍有民间艺人传承表演，是珍贵的活态文化遗产。","items":"皮影人偶（牛皮或驴皮雕刻，上色彩绘）、白色幕布（背光演出）、油灯或电灯（背光源）、竹签（操控人偶）、锣鼓弦乐（配乐）","steps":"架设白色幕布，在幕后设置光源；艺人在幕后以竹签操控皮影人偶，使人偶影像投射于幕布上；乐师以唢呐、椰胡、二弦等乐器伴奏；主唱艺人用闽南语（福佬话）演唱故事，声调抑扬顿挫；演出内容多为「薛仁贵征东」「三国演义」「岳飞传」等历史故事；也有专门为儿童演出的动物主题短剧；演出时间从数十分钟到数小时不等，神诞庆典中多连续演出数晚。","taboo":"皮影人偶演出结束后须面朝下放置，不可让人偶「站立」过夜（民间认为「人偶通灵」，不可无故保持演出姿态）；演出期间不可随意拉动幕布；儿童不可随意触碰操控竹签；演出前须向神明「开场祭拜」，告知演出开始。","story":"海丰皮影戏的皮影人偶制作工艺极为精细，每个人偶须雕刻百余个细节，并以天然颜料上色，一套完整皮影人偶的制作须耗费数月时间。如今海丰仍有少数老艺人坚守这门技艺，将传统图案与现代审美相融合，制作出的皮影人偶已成为珍贵的民间工艺品。","diff":"海丰皮影戏与潮汕皮影戏（纸影戏）同宗同源，但海丰版以牛皮材质为主；唱腔融入了本地闽南语特色；部分海丰皮影艺人也会演出客家语版本，体现了两种文化的交融。"},
{"n":"舞狮习俗","py":"舞狮 (Bú-sai)","c":"🎭 戏曲与口传文艺","sc":"民间舞蹈","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节、元宵（最密集）；神诞、婚庆、开业庆典等喜庆场合","src":"[书A] 第八章·民间艺术；[书C] 第七章·民间舞蹈","intro":"舞狮是海丰乃至整个岭南地区最普遍的民间表演艺术，逢喜庆节日必有舞狮助兴。海丰舞狮以南派狮（包头狮）为主，狮头彩绣精美，表演套路融合武术身段，是技艺与力量的综合展示。","items":"狮头（竹篾扎骨，彩绸装饰，有活动嘴巴和眨眼机关）、狮被（彩绸狮身）、锣鼓钹（三件套）、高桩（高难度表演用）、采青用生菜和红包","steps":"演出前，舞狮队在神明前「开光」，请神明附体；一声炮响，舞狮开始，锣鼓齐鸣；两名演员分持狮头和狮尾，做各式动作：「睡狮」「醒狮」「过山」「采青」；「采青」为高潮：生菜捆绑红包悬挂于高处，狮子须腾高「采得」，取「吉祥纳彩」之意；主人家燃放鞭炮，红包塞入狮嘴；狮向主人鞠躬（点头）致谢；演出结束，队伍移往下一家继续。","taboo":"狮头须存放于高处，不可置于地面；舞狮期间不可拍打狮被；不可在狮子「采青」时故意阻挠；主人家若请来舞狮队，须准备红包，不可空手迎接；舞狮不可进入正在举行丧事的家庭。","story":"海丰有「舞狮压邪」的传统信仰：新店开业、新屋入伙、婚礼喜庆，必请舞狮队上门表演，由狮子将各个角落「踩一遍」，驱逐潜藏邪气，纳入吉祥。这一功能使舞狮不仅是表演艺术，更是一种民间宗教实践。","diff":"海丰南派舞狮以广东南狮（包头狮）为主，狮头较大，眼睛可眨动；与北派长毛狮有明显区别；城区舞狮商业化程度较高，有高桩竞技表演；农村舞狮更注重仪式功能（驱邪纳祥）而非表演难度。"},
{"n":"盐田生产习俗","py":"晒盐 (Tsà-iâm)","c":"🏡 传统建筑与工艺","sc":"传统生产习俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"全年（晴天为主）；夏季（四月至九月）产盐旺季","src":"[志A] 第八章·盐业·传统盐田；[书E] 第三章·沿海生产习俗","intro":"海丰县历史上拥有大型盐场，盐田生产是沿海重要的传统产业，形成了一套完整的生产礼俗与禁忌体系，包括开盐日的祭祀、盐工的生活规矩、丰产时的谢神习俗等，是海丰海洋生产文化的重要组成部分。","items":"盐田（晒盐场）、盐耙（收盐工具）、盐桶、盐袋、香烛（祭灶神用）、海水（晒盐原料）","steps":"年初第一次进盐田前，须在盐场入口向「盐神」（或土地神）上香致敬，祈求当年产盐顺利；引入海水，在盐田蒸发池中逐步浓缩海水；用铁耙轻轻翻动盐晶，促进结晶；盐晶成熟后，用盐耙将盐刮拢成堆；入袋称重，送往盐仓；丰收时，盐工向神明还愿，分享丰收喜悦。","taboo":"晒盐期间不可在盐田中大声喧哗（相传声音会「震散」盐晶）；不可让外姓人踏入盐田中央（占有盐权的传统保护措施）；盐工不可在盐田边如厕（污染水源）；不可在涨潮前没有及时收盐（海水倒灌会冲散盐晶）。","story":"海丰盐场历史悠久，据地方志记载，海丰在宋代已有官设盐场，明清时期发展至鼎盛。盐税是古代重要财政来源，「盐官」是当时最有权势的地方官员之一。这一历史使海丰盐业文化积淀深厚，盐工群体形成了独特的生产礼仪与集体认同，「盐的故事」至今仍是海丰老人讲述地方历史时的重要内容。","diff":"海丰马宫、小漠等地历史上盐田面积较大；近年部分盐田已改建，传统盐田生产规模大幅缩小；但晒盐习俗及盐工文化记忆仍在沿海老人中保留，成为重要的口述历史资源。"},
{"n":"赶海习俗","py":"赶海 (Kuánn-hái)","c":"🏡 传统建筑与工艺","sc":"渔业习俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"退潮时（每日两次，随农历潮汐变化）","src":"[书E] 第三章·沿海生产习俗；[志A] 第十一章·民俗风情·渔业民俗","intro":"「赶海」是海丰沿海居民趁退潮在海滩拾取海产（蛏子、蛤蜊、螃蟹、章鱼、海螺等）的传统生产活动。赶海不仅是重要的副业收入来源，也是沿海文化认同的重要组成部分，世代传承着丰富的海滩知识。","items":"木桶或塑料桶（盛放渔获）、铁耙或竹夹（挖取泥中贝类）、水鞋（防止割伤）、帽子（遮阳用）、手套（部分人使用）","steps":"提前查询当日退潮时间（或根据经验判断）；退潮前约半小时出发前往海滩；在礁石区翻找螃蟹、章鱼、海螺；在沙滩区寻找气孔，用铁耙挖取蛏子、蛤蜊；在泥滩区翻找泥蛤、弹涂鱼；随时观察潮水变化，避免被涨潮困住；满载而归后，对渔获进行分类清洗，当日即可烹饪。","taboo":"赶海须至少两人同行，不可独自前往偏僻海岸（安全考虑）；不可在涨潮时进入礁石区（危险）；不可采取小于两厘米的贝类（保护幼苗，也是当地约定俗成的规矩）；赶海前须查看天气预报，台风前后海浪大，不可赶海。","story":"海丰老一辈赶海人拥有丰富的「海滩知识」：哪片礁石盛产什么、哪个季节最多哪种贝类、潮水到哪条水线时须撤退——这些知识从不见诸文字，完全靠口耳相传和亲身体验积累，是鲜活的海洋民间知识体系，也是海丰沿海文化的瑰宝。","diff":"鲘门、捷胜等拥有大面积礁石海岸的地区赶海最为丰富；沙质海滩以挖蛏子、蛤蜊为主；泥质海滩（如马宫一带）则盛产泥蛤和弹涂鱼；近年由于环境变化，部分海滩渔获减少，但赶海文化仍在当地青少年中传承。"},
{"n":"贝灰建筑工艺","py":"贝灰 (Pùe-hue)","c":"🏡 传统建筑与工艺","sc":"传统工艺","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"传统建筑施工期间（历史：明清至民国；现代仍有传承）","src":"[书A] 第七章·居住礼俗；[志A] 第八章·传统工艺·建筑工艺","intro":"「贝灰」是以海边贝壳（蚝壳、蛤蚌壳等）烧制而成的石灰，是海丰沿海传统民居建筑的核心材料。贝灰建筑具有防潮、隔热、坚固的特性，是海丰海洋文化与建筑智慧的结晶，被视为重要的非物质文化遗产。","items":"贝壳（蚝壳、蛤蚌壳为主）、柴火（烧制用）、石灰窑（传统砖砌）、水（熟化用）、糯米水（加入增强韧性）、沙","steps":"收集大量蚝壳等贝壳；在石灰窑中分层码放贝壳与柴火；高温煅烧约两至三天，使贝壳中的碳酸钙转化为生石灰（氧化钙）；取出生石灰，加水「熟化」为熟石灰，并加入糯米汁（增加韧性）；将熟贝灰与沙、土按比例混合，制成「三合土」；用于砌筑墙体、粉刷墙面、制作地板；贝灰建筑完工后表面光洁白亮，数百年不褪色。","taboo":"贝壳烧制时窑内温度须均匀，不可中途停火；生石灰加水须慢慢加入，避免沸腾烫伤；糯米水须在石灰熟化后才可加入；贝灰建筑不可在梅雨季节施工（湿度过高影响凝固）。","story":"海丰现存最古老的贝灰建筑已有数百年历史，部分清代宗祠、古民居至今保存完好，其坚固程度令现代建材汗颜。以贝壳为建材，既利用了海洋丰富资源，也体现了海滨先民「靠海吃海、用海建家」的生存智慧，是海洋文化与建筑文化的完美融合。","diff":"沿海地区贝壳资源丰富，贝灰建筑更为普遍；内陆山区以青砖土墙为主，贝灰较少使用；近年「贝灰修缮」技艺已列为地方保护项目，有专业工匠在维修古建筑时使用传统贝灰工艺。"},
{"n":"入宅暖屋","py":"入宅 (Ji̍p-tsheh)","c":"🏡 传统建筑与工艺","sc":"建筑礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新屋建成后，选定的入宅吉日","src":"[书A] 第七章·居住礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"「入宅」（暖屋）是新房落成后正式迁入居住的仪式，须择吉日进行，并举行一系列仪式驱邪纳祥，使新居充满生气与旺气。这是建筑礼俗的最终环节，标志着新家庭正式安家落户。","items":"米桶（装满米，象征丰衣足食）、扫帚（新的）、水桶（装满水，象征财源滚滚）、火炭（象征旺气）、红包（入宅利是）、鞭炮、三牲（拜神用）","steps":"入宅前日，在新居内彻底清扫、安置家具，完成安神仪式；入宅吉时前，家人在旧居打包好全部「第一次」要带入新居的物品；在吉时（通常为清晨或上午），手持米桶、水桶、扫帚等吉祥物品踏入新居，第一步须迈右脚；亲友陆续前来道贺，主人以红包（「入宅利是」）回赠；在新灶上煮甜品（汤圆或发糕），全家及来客共食；设宴席（「暖屋酒」）宴请亲友邻里，热热闹闹「暖屋」；宴席上须有鱼（有余）、鸡（吉祥）、整猪或猪肉。","taboo":"入宅时第一步须迈右脚（左为「不吉」）；入宅日不可将旧家中的扫帚带入新居（旧扫帚带旧气）；不可在入宅日争吵或哭泣；入宅当日不可让外人先于户主踏入家门；空桶不可带入（须装满米或水）。","story":"海丰入宅习俗中，「第一锅火」须由户主在新灶上生起，煮熟的第一样食物须是甜品（汤圆或红糖水）——「甜头」意味着新居生活甜甜蜜蜜。灶火一旦升起，便代表这个家庭在新地点的生活正式开始，炊烟便是家的最有力象征。","diff":"城区入宅暖屋多在周末举行，规模可大可小；农村暖屋宴常是百桌以上的盛大聚会；客家聚居区入宅仪式有「点灯」环节（在新屋各房间点油灯），寓意照亮新家的每个角落。"},
{"n":"动土仪式","py":"动土 (Tōng-thóo)","c":"🏡 传统建筑与工艺","sc":"建筑礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新屋建造开始动工之前（黄道吉日）","src":"[书A] 第七章·居住礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"「动土」是新屋建造前的开工仪式，在正式挖地基、开工建设之前，须选择黄道吉日，举行祭祀仪式，祈求土地神（伯公）允许在此处建房，并保佑工程顺利、日后家宅平安。","items":"三牲或素果、香烛、福德金（伯公纸钱）、鞭炮、锄头（开土用）、红布（系于锄柄）、米酒","steps":"由风水师选定动土吉日与吉时；吉时前，在建房地基中央设香案，供奉三牲和香烛；户主率家人向土地神（方向为建房地块的伯公庙或地神方位）上香祭拜；诵读「动土文」（感谢土地神、祈求施工平安）；焚化福德金；户主在吉时亲手持系有红布的锄头，象征性地刨第一铲土（「动第一锄」）；燃放鞭炮，正式宣告开工；工匠方可开始真正动工建造。","taboo":"动土须在黄道吉日进行，不可在「破日」「丧日」开工；户主必须亲自出席，不可委托他人主持；动土第一锄不可由女性执行（部分传统宗族）；动土当日不可与人争吵；鞭炮不可提前燃放。","story":"「动土」的核心精神是向土地神「请示」借用土地建房。海丰民间认为每块土地都有其守护神，未经「许可」擅自开挖，会触怒土地神带来工程事故。动土仪式因此是建筑与信仰之间的重要「沟通」程序，也是人与自然环境互相尊重的文化表达。","diff":"城区建筑项目的动土仪式已高度仪式化，配合媒体出席的「奠基典礼」；农村自建房动土则更注重传统宗教仪式；客家聚居区动土仪式中加入了客家风水口诀的吟唱。"},
{"n":"海丰牛肉炉","py":"牛肉炉 (Gû-bah lôo)","c":"🍜 饮食民俗","sc":"饮食习俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"冬季（农历十月至次年二月）为旺季；全年均有","src":"[书F] 第四章·岭南特色饮食；[书E] 第五章·海丰饮食民俗","intro":"牛肉炉（牛肉火锅）是海丰冬季最具代表性的饮食习俗，以新鲜现宰的本地黄牛肉薄片涮入清汤底或沙茶汤底食用，讲究「现宰现吃」，是海丰人冬季家庭聚餐和朋友聚会的首选饮食。","items":"新鲜牛肉（多部位：里脊、牛腩、牛腱、牛百叶等）、沙茶酱（海丰特色蘸料）、清骨汤底（牛骨熬制）、蔬菜（菠菜、豆腐、粉丝等）、香菜、辣椒末","steps":"选购当天现宰的新鲜本地黄牛肉，按不同部位分类切薄片；熬制清骨汤底（牛骨加姜葱大火熬约4小时）；起炉，待汤底沸腾；各人按喜好取牛肉薄片夹入汤中烫至变色（约10至30秒）；即烫即取，蘸上沙茶酱食用；牛肉涮完后，将蔬菜、豆腐等放入汤中煮熟；最后用汤底煮粉丝或炖饭，不浪费一滴鲜汤。","taboo":"牛肉须当天购买当天食用，隔夜牛肉失鲜不可使用；涮肉时不可涮至全熟（半生最鲜嫩）；沙茶酱不可一次性放入锅中（否则汤底变浑，影响后续食用）；聚餐时不宜催促他人进食，牛肉炉贵在「慢涮慢食」。","story":"海丰牛肉炉与本地黄牛养殖文化密切相关。海丰内陆山区（如公平、赤石一带）历来放牧黄牛，冬季是宰牛旺季。「现宰现食」的牛肉炉文化使得海丰人对新鲜牛肉格外挑剔：早上现宰、中午上市、晚上涮锅，从宰牛到上桌不超过12小时，是对食材新鲜度的极致追求。","diff":"城区牛肉炉店遍布大街小巷，已成为外来游客体验海丰饮食的必选项目；农村冬季杀牛场景更为传统，乡亲互邀共食；部分地区沙茶酱配方略有不同，有的偏花生味，有的偏辣，体现了地方细微差异。"},
{"n":"腊肠腊肉制作","py":"腊味 (La̍k-bī)","c":"🍜 饮食民俗","sc":"传统食品制作","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十一月至十二月（冬腊月，天气干燥适合晾制）","src":"[书A] 第六章·饮食民俗；[书F] 第三章·岭南腊味文化","intro":"腊肠、腊肉是海丰冬季的传统食品，利用冬季干燥气候腌制、风干而成，是春节前必备年货，也是馈赠亲友的重要礼品。海丰腊肠以甜中带咸、肥瘦相间、风味浓郁著称。","items":"猪肉（三分肥七分瘦）、肠衣（天然猪小肠或羊肠衣）、食盐、白糖、生抽、老抽、高度白酒、五香粉、砂糖","steps":"猪肉洗净，切成小丁（腊肠）或大块（腊肉）；按比例加入食盐、白糖、酱油、白酒、五香粉，拌匀腌制24小时；腊肠：将腌好的肉丁灌入泡发的肠衣中，每隔约15厘米扎紧；腊肉：直接将腌好的肉块穿绳悬挂；悬挂于通风阴凉处（日照不宜直晒）风干7至14日；部分家庭以荔枝木熏烟增香；完全干透后收起，置于阴凉干燥处保存；食用前蒸熟或炒熟。","taboo":"腊味晾制期间不可受潮（受潮易发霉）；不可放于阳光直晒处（阳光直晒使腊味变干过快，口感变柴）；灌肠时不可留有气泡（影响成型）；腊肉不可在下雨天悬挂（吸收湿气导致腐坏）。","story":"海丰「自制腊肠」是许多家庭的年前传统项目，全家围坐灌肠，热闹非凡。旧时无冰箱，腊味是冬季储存肉食的主要方式，也是调节肉食供给的民间智慧。如今生活富裕，腊肠已不再是储粮必需，但自制腊肠的文化仪式感和对特定风味的追求，使这一传统延续至今。","diff":"城区家庭多向市场购买腊味，或在农历十一月委托肉档代制；农村仍盛行家庭自制；部分客家聚居区以客家风格腊味（偏咸、偏硬）为主，与福佬区（偏甜、偏软）风味有所区别。"},
{"n":"鱼丸制作（海丰特色）","py":"鱼丸 (Hî-uân)","c":"🍜 饮食民俗","sc":"传统食品制作","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"常年制作；冬季（捕鱼旺季）产量最高","src":"[书E] 第四章·渔民饮食习俗；[书F] 第四章·岭南特色食品","intro":"鱼丸是海丰沿海最具代表性的渔村传统食品，以新鲜海鱼（马鲛鱼、鳗鱼、带鱼等）的鱼肉手工剁泥制成，口感弹韧，是海丰人日常餐桌上不可或缺的食物，也是重要的礼品和年货。","items":"新鲜海鱼（马鲛鱼或鳗鱼最佳）、食盐、淀粉（薯粉或木薯粉）、清水、葱花（增香用）","steps":"选取新鲜海鱼，去头去骨，取净鱼肉；将鱼肉放在砧板上，用刀背反复剁打至泥状（传统须剁打半小时以上，使鱼肉充分起胶）；加入适量食盐及少量清水，顺一个方向搅拌至起黏性；少量加入淀粉，继续搅拌至鱼浆黏稠、可拉丝状态；烧开一锅清水，将鱼浆挤成球形（以虎口挤出，汤匙辅助）放入水中；丸子浮起后转小火煮2至3分钟即熟；捞出放入冷水中，使鱼丸更弹韧；可煮汤、炒菜或蘸酱食用。","taboo":"制作鱼丸须使用当天捕获的新鲜海鱼，隔夜鱼肉会影响成型效果和口感；剁鱼浆时不可使用铁器（会令鱼肉变色）；搅拌时须顺一个方向，不可来回搅拌（影响起胶）；鱼浆不可长时间静置，须尽快制作完成。","story":"海丰鱼丸的「弹牙」程度是品质的核心指标。渔村老厨师判断鱼丸是否合格的传统方法：将鱼丸放在碗底用力一摔，能弹起来的才是好鱼丸。这一「摔碗测弹」的方法至今仍被老一辈奉为圭臬，反映了手工鱼丸对鱼肉新鲜度和制作功力的高要求。","diff":"鲘门捷胜等沿海渔村以马鲛鱼鱼丸最为知名，弹性最佳；城区鱼丸多用冷冻鱼肉，口感略逊；内陆地区鱼丸用淡水鱼制作，口感和风味与海鱼版有明显区别；近年机器制作的鱼丸普及，但手工鱼丸仍受老食客追捧。"},
{"n":"驱邪净宅","py":"净宅 (Tsīng-tsheh)","c":"🙏 民间信仰","sc":"驱邪仪式","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"不定期，在家宅不宁、连遭不顺或搬入新居前举行","src":"[书A] 第五章·民间信仰；[书D] 第三章·禁忌与驱邪","intro":"「净宅」是为家宅驱除邪气、恶灵或不洁能量的民间仪式，由道士主持，结合符咒、诵经、香烟熏屋等手段净化居住空间。常在家宅遭遇连续厄运或迁入旧居时进行。","items":"桃木剑（或法器）、黄符纸（镇煞符）、朱砂（画符用）、香（须为驱邪专用粗香）、米酒（泼洒用）、艾草（熏烟用）、雄黄（驱虫驱邪）","steps":"道士到场，先以罗盘观察屋内气场，确定「煞位」（邪气集中之处）；于每个房间及角落逐一焚香熏烟（艾草与特殊香料）；在门框、窗框及屋角贴上黄色镇煞符纸；以朱砂在墙壁特定位置画八卦或符号；道士诵念驱邪经文，在屋内各处逐一念动；将米酒洒于各个房间角落（酒气驱邪）；最终在主门口加贴门神符，封锁屋内邪气；燃放鞭炮，驱赶残余邪气；仪式结束后，家人须在屋内烧艾草熏烟三日。","taboo":"净宅仪式期间，家中所有成员须在场（不可缺席）；不可在仪式期间说负面话语；仪式结束后三日内不可请外人来家中（等邪气完全清除）；孕妇不宜主动参与净宅仪式；贴上的符纸不可自行撕除。","story":"海丰民间最常引发「净宅需求」的情况是「连续丧失家人」或「家人频繁生病」。当地人认为这可能是「宅煞」（宅中邪气）所致。道士净宅后往往建议户主改变家中某些摆设（如移动床位方向），这些建议通常结合了风水原则与心理安抚功能。","diff":"城区净宅需求近年有所减少，但仍有道士提供上门服务；农村净宅习俗依然普遍；部分农村道士在净宅时会加入客家「解煞」口诀，体现了客家与福佬文化的交融。"},
{"n":"还愿酬神","py":"还愿 (Huân-guān)","c":"🙏 民间信仰","sc":"酬神仪式","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"不定期，在许愿应验后举行","src":"[书A] 第五章·民间信仰；[书D] 第三章·问卜与还愿","intro":"「还愿」是民间在向神明许愿后、愿望应验时履行诺言的答谢仪式。海丰民间信仰重视「有求必还」，还愿方式依许愿时的承诺而定，常见的有演戏酬神、献牲致谢、捐灯油钱等。","items":"还愿供品（依许愿内容而定，通常比平时更丰盛）、戏班（若许愿演戏）、灯油（捐庙用）、香烛、纸钱、感谢红布（有时悬挂于庙内）","steps":"许愿者前往神明所在庙宇（或家中神位），上香告知神明愿望已实现；按照当初许愿时的承诺行事：若许诺演戏，须聘请戏班在庙前演出三至五晚；若许诺献牲，须供奉三牲甚至整猪；若许诺捐灯油，须向庙宇交付约定款项；再次跪拜致谢，感恩神明庇佑；燃放鞭炮庆贺；若未能立即还愿，须向神明解释并重新约定时间（称「延愿」）。","taboo":"还愿不可拖延太久（一般以三年为限）；还愿时供品须比许愿时更丰盛；若许愿演戏，戏班的场数不可少于承诺场数；还愿完成后须正式向神明「销愿」（告知愿已还清），否则视为尚有未了之愿。","story":"海丰沿海渔村有「渔获丰收还愿」的传统：某年出海大丰收，船长认为是妈祖显灵，则承诺在年底前「做大戏」（请戏班）还愿。年底在庙前搭台演出，全村人聚集观戏，既是还愿，也是社区共同庆祝丰收的节日。","diff":"城区还愿多以捐款捐物形式进行，演戏还愿较少；沿海渔村「大戏还愿」规模最大，有时一演便是七日；客家聚居区还愿习俗与福佬区相近，但所酬神明和仪式细节有所不同。"},
{"n":"新居安神位仪式","py":"安神 (An-sîn)","c":"🙏 民间信仰","sc":"居住礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"搬入新居时（结合入宅仪式进行）","src":"[书A] 第七章·居住礼俗；[书D] 第二章·民间神明崇拜","intro":"搬入新居前，须为家中神明（祖先牌位、观音、关帝、灶君、伯公等）安置神台与神位，称「安神」。安神仪式由风水师或道士主持，决定神台方位，是入宅程序中不可缺少的环节。","items":"神台（木制或石制）、各路神明神像或神主牌、香炉、供果、香烛、风水罗盘（风水师自备）、红布（覆盖神台）","steps":"风水师到新居勘察，依据户主生辰八字及房屋坐向，确定神台安置方位（须面向吉方）；选定安神吉日吉时；吉时前，在厅堂中清洁神台放置处，铺上红布；按吉时将神台就位，再将神像或神主牌安置于台上；道士或户主上香，念诵「安神文」，邀请神明入驻新居；供奉三牲或鲜花水果，燃放鞭炮；安神后，神台位置不可随意移动。","taboo":"安神须在入宅正式暖屋前进行，不可先住人再安神；安神期间不可有外人经过神台前方；神台须保持整洁，不可将日常物品放于台上；神像一旦安座，若需移位须再请风水师重新择日。","story":"海丰民间认为，一个新家庭安神不成，则「家宅不宁」。因此即便是初步装修完成尚未完全入住的新居，安神仪式也须提前举行，让神明先行「镇守」。这一习俗体现了海丰人将神明视为家庭保护者、而非仅仅装饰品的朴素信仰。","diff":"城区部分新居已不再供奉传统神明，仅保留伯公龛；农村安神仪式较为完整，通常包括祖先牌位、观音、伯公等多位神明；商业用途的新居安神则以关帝、财神为主要对象。"},
{"n":"土地神日常祭拜","py":"拜伯公 (Pài peh-kong)","c":"🙏 民间信仰","sc":"日常祭拜","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"每月初一、十五（主要祭拜日）；节庆前后","src":"[书A] 第五章·民间信仰；[书D] 第六章·土地神信仰","intro":"土地神（福德正神，海丰俗称「伯公」）是海丰最普遍的民间神祇，每个村落、街道、店铺、农田旁几乎都设有伯公龛（土地神位）。每月初一和十五须向伯公上香，是家庭日常信仰生活的核心。","items":"香烛（小炷为主）、清水（一杯）、茶或酒（少量）、鲜花或素果、福德金（伯公专用纸钱）","steps":"每月初一、十五清晨（或傍晚），家中女主人或户主在伯公龛前点燃香烛；供上清水一杯、鲜花或一两件水果；双手合十默念祈愿词，感谢伯公一月的庇护，祈求家宅平安、出入顺利；烧化少量福德金；商铺则会额外祈求生意兴隆、顾客盈门。","taboo":"不可将污秽之物（鞋子、脏物）置于伯公龛旁；伯公龛前不可晾晒衣物；不可在龛前嬉笑打闹；烧化纸钱须在龛前指定位置进行，不可随意乱烧。","story":"海丰有「伯公龛越小越灵」的说法，认为朴实无华的小型伯公龛反而更贴近地方，庇佑力更强。许多村落历史最久的伯公只是一块简单的石头，数百年来受当地人香火供奉，已形成深厚的信仰积淀。","diff":"城区商业区的伯公龛多由商家维护，装饰较华丽；农村田间地头的伯公龛简朴，甚至以石块代替；渔村码头旁的「海伯公」兼具土地神与海神的功能，供奉时加入渔业相关祈愿。"},
{"n":"新丁拜祠入籍","py":"入籍 (Ji̍p-tsi̍k)","c":"🏠 宗族与日常礼节","sc":"添丁礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新生男丁出生后首次祠堂行礼；正式登记在春祭或上灯仪式期间","src":"[书A] 第二章·宗族礼俗；[书G] 第三章·华南宗族制度","intro":"「新丁拜祠」是海丰宗族中为新出生男孩进行的祠堂认祖仪式，通过正式登记和行礼，将新生男丁纳入宗族成员名册，赋予其完整的宗族身份与权利，是宗族传承的重要制度性仪式。","items":"三牲或红蛋（供奉祖先）、婴儿专属红包（由族长回赠）、族谱（记录用）、香烛","steps":"新生男孩出生后满月，由父亲携抱前往祠堂；族长或长老主持简短仪式，向祖先牌位禀告新丁降生；婴儿被抱至祖先牌位前行礼（由父亲协助）；族长当众宣布新丁名字，并在族谱或宗族名册上正式登记；族长回赠红包，作为宗族对新丁的「见面礼」；仪式结束后，父亲设小宴席请族中长辈饮茶；正式的「上灯」仪式则在当年元宵节前后举行。","taboo":"新丁拜祠须由亲生父亲携抱进行，不可由他人代替；仪式进行时婴儿须保持相对安静（若哭闹须暂停）；入籍登记的名字须正式确定，此后不可随意更改族谱记录；不可在外姓人面前泄露族谱内容。","story":"海丰某些古老宗族至今保留「入籍赠礼」的传统：族中每新增一名男丁，宗族公产（蒸尝田收益）须向其赠送一定份额的「丁钱」（添丁红包），金额虽不多，但象征意义重大——意味着这个新生儿已成为宗族的一份子，可分享祖先遗产的庇佑。","diff":"大型宗族入籍仪式较为正式，有专职记录员负责族谱更新；小型宗族则由族长兼任；城区宗族因祠堂活动减少，部分以电话通知族长代替亲赴祠堂；近年部分宗族将入籍与上灯合并为一次仪式。"},
{"n":"分炉分支仪式","py":"分炉 (Hun-lôo)","c":"🏠 宗族与日常礼节","sc":"宗族制度","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"不定期，通常在家族分支独立成户或迁居新地时","src":"[书G] 第四章·宗族聚合与地方认同；[书A] 第二章·宗族礼俗","intro":"「分炉」是宗族中一个房支分出、另立门户的仪式，字面意思是「分开炉灶」。仪式核心是将本支的神明（祖先牌位、香炉）从总祠分出一份，带到新居，象征新支系虽独立生活，仍承继祖先香火。","items":"香炉（从祖祠分出的副香炉）、祖先牌位（分支专属）、香灰（从祖炉中取出，置于新炉中）、红布（包覆香炉）、鞭炮、三牲","steps":"在族长见证下，分支家庭在祖祠举行仪式；从祖祠主香炉中取出一捧香灰，置于专为分支准备的小香炉中（此为最关键一步，象征「香火相传」）；将新香炉用红布包裹；由族长带领，将新香炉及祖先牌位送至新居；新居设新神台，安置香炉与牌位；燃放鞭炮，正式宣告分支独立；新支系须在此后独立完成祭祖，但重要节日仍可回祖祠参拜。","taboo":"取香灰须在吉时进行，不可在午夜或日落后；香灰不可散落（散落代表香火中断）；新香炉安置后不可随意移动；分炉后若新支系绝嗣，香炉须送回祖祠；不可在分炉当日在新居动刀。","story":"「分炉」的核心是「香灰」的传递。海丰民间认为，祖祠香炉中的香灰承载着历代祖先的灵气，将香灰带到新居，等于将祖先的庇佑延伸至新地。因此「分炉」不是分离，而是「香火的延伸」，是海丰宗族向外扩展的精神纽带。","diff":"大宗族分炉仪式隆重，有宴席庆祝，族谱须记录此次分支；小家庭分炉则相对简约；海外华侨创业海外时，也会进行「远程分炉」，将香灰带至海外安置，维系与故乡祖先的精神联结。"},
{"n":"祠堂年初春祭","py":"春祭 (Tshun-tsè)","c":"🏠 宗族与日常礼节","sc":"祭祖礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历正月初二至十五（各宗族选定日期不同）","src":"[书A] 第二章·宗族礼俗；[书G] 第三章·华南宗族制度","intro":"春节期间，海丰各宗族在祠堂举行年初祭祖仪式，称「春祭」。全体族人在祠堂聚集，共同祭拜列祖列宗，开启新年的宗族生活，是宗族成员于新年确认集体身份的重要仪式。","items":"三牲、发糕、年糕、香烛、纸钱元宝、鞭炮、族旗（部分宗族有）","steps":"族长提前选定春祭日期，通知各房各户；祭日当天，族人着整洁服装前往祠堂；族长主持开典，三叩九拜祭拜祖先牌位；全体族人依辈分次序行礼；族长宣读本年宗族事项（新丁入籍、婚事登记、族产报告等）；焚化纸钱元宝，燃放鞭炮；将供品（发糕、年糕）分给参与祭祀的族人带回；祭典结束，部分宗族即场安排宴饮。","taboo":"春祭期间不可在祠堂内争吵；入祠堂须仪容整洁，不可穿拖鞋；不可在拜祭过程中接听电话；女性在部分传统宗族中不参与正式行礼，仅在外围旁观；祭品须在仪式完成后方可分取。","story":"海丰宗族春祭中，族长会当众宣布上一年的宗族大事。新丁（新出生的男孩）的名字在此时正式对族人公告，并登记在宗族名册上，这一刻标志着新生儿正式获得宗族身份。这个「宣名」环节使春祭兼具新年仪式与宗族行政的双重功能。","diff":"大型宗族春祭分多日分批进行，各房轮流主持；小型宗族则一次完成；城区宗族因人员分散，春祭参与率有时不及农村；海外侨胞若恰逢春节回乡，参与春祭是表达宗族认同的重要方式。"},
{"n":"回门礼","py":"回门 (Huê-mn̂g)","c":"👶 人生礼仪","sc":"婚礼习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婚礼后第三天（或第七天）","src":"[书A] 第四章·婚嫁习俗；[书B] 第三章·人生礼俗","intro":"「回门」是新婚夫妇在婚礼后首次一同回访女方娘家的礼俗，是婚礼流程的收尾环节。新郎须以「女婿」身份正式拜见岳父母，女方家以丰盛饭食款待，是新家庭与娘家维系亲情的重要仪式。","items":"回门礼品（新郎备，通常为糕点、糖果、伴手礼）、红包（新郎奉给岳父母及娘家长辈）、新娘红包（娘家长辈回赠）","steps":"婚后第三天（或第七天），新郎新娘共同前往娘家；新郎携带礼品，须在午前到达；到达后，新郎向岳父母及娘家长辈行礼，正式以女婿身份拜见；娘家备丰盛午宴款待女婿及女儿；娘家长辈回赠红包给新郎新娘，称「压肚腰」（祝其生活富足）；午宴后，夫妻须在天黑前返回男家，不可在娘家过夜（初次回门禁忌）。","taboo":"回门当日须在天黑前离开娘家，不可在娘家过夜；新郎不可穿全黑衣服前往；回门礼品须为偶数（双数）；若回门日适逢娘家长辈忌日（忌讳喜事遇丧日），须另选日期。","story":"海丰「回门」有个特别的风俗：回门当天，娘家须为女儿煮一碗「回门面」（长面线），由外婆或母亲亲手做好，象征「留住女儿的情」与「祝新婚夫妇长长久久」。面线须够长，中途不可折断。","diff":"城区回门多选择在附近餐厅聚餐，形式较灵活；农村回门仪式更完整，须登堂入室正式拜见所有娘家长辈；客家区回门除第三天外，还有「七日回」（第七天再回）的传统，两次回门各有其礼。"},
{"n":"嫁妆与出嫁礼","py":"出嫁 (Tshut-kè)","c":"👶 人生礼仪","sc":"婚礼习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"婚礼正日前一至两日（嫁妆发送）；婚礼正日当天出嫁","src":"[志A] 第十一章·民俗风情·礼仪习俗；[书A] 第四章·婚嫁习俗","intro":"嫁妆是女方家庭为女儿出嫁准备的财物，代表娘家对女儿的疼爱与支持。海丰嫁妆习俗包括嫁妆的准备、公开展示及随新娘送入男家，是婚礼中体现女方家庭地位的重要环节。","items":"床上用品（红色被褥、枕头）、梳妆台、衣柜、金银首饰（手链、项链、耳环）、「子孙桶」（马桶，寓意多子多孙）、「有头有尾」的甘蔗两根（寓意有始有终）、剪刀（寓意剪断旧情）","steps":"嫁妆于出嫁前一日（或当日）由娘家亲属护送至男家，由专人搬运；嫁妆须在日出后出发，在太阳落山前全部送达；嫁妆送达时，男家须鸣炮迎接并奉茶点款待送嫁妆者；男家须在洞房内整齐摆放嫁妆，不可随意挪动；出嫁日，新娘梳妆完毕，由「好命妇人」为其梳头，诵吉祥词；新娘出门踏上红毡，由兄弟抱上轿（或婚车）。","taboo":"嫁妆中「子孙桶」须由男家自家人清洗，不可被外人使用；甘蔗须保持完整，不可折断；新娘出门时不可流泪（哭泣被认为会带走财气）；嫁妆数量须为偶数，取成双成对之意。","story":"「子孙桶」是海丰嫁妆中最具象征意义的物品。旧时无论贫富，嫁妆必有「子孙桶」（木制马桶），并在桶内放入红枣、花生、桂圆、莲子——取「早生贵子」（枣生桂莲）的谐音祝愿，是民间语言智慧的体现。","diff":"城区嫁妆已现代化，以家电、家具、现金为主；农村仍保留部分传统嫁妆礼俗；客家区嫁妆习俗与福佬区有所不同，客家区更重视实用性家具，而福佬区更注重金银首饰的显示。"},
{"n":"订婚送定礼","py":"送定 (Sàng-tīng)","c":"👶 人生礼仪","sc":"婚礼习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"婚礼前数月（具体由双方家长商定吉日）","src":"[志A] 第十一章·民俗风情·礼仪习俗；[书A] 第四章·婚嫁习俗","intro":"「送定」是海丰传统婚俗的正式订婚仪式，由男方携带聘礼（礼饼、聘金、糖果等）前往女方家，经双方家长正式确定婚约，是婚礼流程中的关键一环，意味着婚事「定下来了」。","items":"礼饼（喜饼，须为双数，以盒计）、聘金（红包，金额须为偶数）、糖果饼干（分赠亲友用）、金器（戒指、手链等）、糯米酒（部分地区）、红色礼盒","steps":"男方家选定吉日，准备礼饼、聘金及金器；男方父母率男方前往女方家，媒人随行；双方家长正式见面，互换礼品；男方将聘礼（礼饼、聘金）奉上，女方接受后婚约正式成立；女方家以茶点、红蛋款待男方；双方商定婚礼日期及相关事宜；女方家将礼饼分发亲友邻里，公告婚讯。","taboo":"礼饼数量须为偶数（双数取「好事成双」之意）；聘金金额不可为奇数；送定当日不可与他人争吵；送定后若悔婚，「退定」须退还双倍礼金，被视为严重失礼。","story":"海丰「送定饼」的习俗形成了独特的社区信息传播机制：女方家收到礼饼后，须在三日内分发给亲友邻里，以告知婚讯。收到礼饼的人家须回赠红包，无需专程登门道贺。因此，礼饼的数量往往反映了女方家的社会关系网络广度，送定礼越隆重，女方家地位越高。","diff":"城区送定礼趋于现代化，部分家庭已省略礼饼直接以红包代替；农村仍严格遵循礼饼传统；客家聚居区送定礼中增加了「担茶」（挑茶担送礼）的特色环节。"},
{"n":"百日宴","py":"百日 (Pah-ji̍t)","c":"👶 人生礼仪","sc":"出生礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生后第一百天","src":"[书A] 第四章·人生礼仪；[书B] 第三章·人生礼俗","intro":"婴儿出生满一百天举行「百日宴」，是介于满月与周岁之间的重要庆典。海丰人认为婴儿安然度过百日，意味着已脱离早夭危险，身体日趋强健，是值得庆贺的里程碑。","items":"百日宴席菜肴、红蛋（百颗，象征圆满）、长寿面线、桂圆荔枝干、外婆家礼品（衣物糕点）","steps":"百日当天，家人为婴儿穿上新衣；晨起先在祖先神位前供奉红蛋、面线，告知百日之喜；外婆家携带礼品（衣物、首饰、红蛋、糕饼）前来庆贺；设宴席宴请亲友，规模视家庭情况而定；将红蛋分发给所有宾客及邻里，宾客以红包回礼；长辈为婴儿拍照留念，这一做法近代已十分普遍。","taboo":"百日宴不可在丧事发生的近期内举行；红蛋数量须为偶数（或恰好百个）；宴席菜肴不可出现「苦」字相关食材；外婆家的礼品不可回礼（须全部接受，表示感谢外家的养育之恩）。","story":"海丰百日宴中，「百颗红蛋」的习俗是颇具地方特色的一笔。将一百颗鸡蛋染红，既象征「百」的圆满，也方便分发——宾客、邻里人手一颗，将婴儿的喜气带回各家。这一习俗将私人家庭的庆典转化为社区共享的喜事。","diff":"城区百日宴多在酒楼举行，规模大、菜式丰盛；农村百日宴在家中摆桌，邻里帮厨，气氛更为温馨；部分客家聚居区不特别强调百日，而将周岁视为更重要的节点。"},
{"n":"关帝诞（六月廿四）","py":"关帝诞 (Kuan-tè tuann)","c":"🎉 岁时节庆","sc":"神诞节庆","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历六月廿四（关羽诞辰）","src":"[书A] 第五章·民间信仰；[书D] 第六章·关帝信仰","intro":"关帝（关羽、关圣帝君）是海丰民间崇拜最广泛的武神，兼司忠义、财富与保护。海丰境内关帝庙众多，六月廿四诞辰当日，各庙举行隆重庆典，商界尤为重视，是一年中重要的神诞节日。","items":"三牲（猪、鸡、鱼）、米酒（关帝喜酒）、香烛、关帝金（专用纸钱）、鞭炮、红色横幅（写祝词）","steps":"六月廿四清晨，各关帝庙开庙门，信众早起前往进香；商家在商铺门口或店内关帝像前备三牲供奉，祈求生意兴隆；庙内举行开光祭典，道士诵经；庙会组织关帝神像出巡部分社区（规模小于妈祖出巡）；夜间燃放鞭炮；部分庙宇聘请剧团演神功戏庆祝。","taboo":"祭拜关帝须供米酒，不可供茶（关帝不饮茶）；不可在关帝像前说谎（关帝司正义，谎言会招致惩罚）；商家祭拜后当日不可讨债（忌煞气）；不可供奉乌龟（龟与「输」谐音）。","story":"海丰商界有「拜关帝求财」的传统，许多商人将关帝像供奉于收银台旁边。这一信仰来自关帝「重义气、守信用」的形象——商人认为拜关帝可保生意中义气为先、诚信立本，从而财源广进。海丰的老字号商铺几乎无一不供关帝。","diff":"城区商业集中地关帝诞气氛最为热烈；农村关帝庙多与其他神明合祀，诞日活动规模较小；沿海渔村关帝有时与妈祖共祀，渔民祭拜关帝时也会加入祈求出海平安的内容。"},
{"n":"重阳登高祭祖","py":"重阳 (Tiông-iông)","c":"🎉 岁时节庆","sc":"农历节日","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历九月初九","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"重阳节（九月初九）是海丰人「秋祭」的重要节日，与清明春祭并称「两大扫墓节」。海丰人在重阳登高望远，并前往祖坟祭扫，同时也是敬老尊老的节日，家中老人在此日受到特别的礼待。","items":"三牲或素果、香烛、纸钱元宝、鞭炮、菊花（敬老礼品）、重阳糕（有的地区制作）","steps":"重阳日，各宗族部分家庭前往祖坟祭扫（规模小于清明）；家中晚辈向老人行礼，赠送菊花或礼品；部分青年相约登上附近山丘，远眺家乡，祈福平安；祭扫时的步骤与清明相仿：培土、上香、供奉祭品、烧纸钱；入夜后家人聚餐，为家中老人庆重阳。","taboo":"登高时不可随意折断树枝（登高之地多为风水宝地）；祭扫期间不可喧哗嬉笑；不可身着艳丽颜色衣物前往扫墓；重阳日不宜剃头（老人忌讳）。","story":"重阳「登高」的习俗源于古代避瘟的传说（汉代桓景登高避灾）。海丰虽无高山，但城郊的小山丘在重阳前后常有市民家庭登爬，既有休闲意义，也保留了「高处避邪」的民俗心理。近年重阳节被定为「老人节」，海丰各社区多组织慰问老人活动。","diff":"近山的农村重阳登高活动更为普遍，且往往与扫墓合并；城区以家庭聚餐敬老为主；沿海渔村重阳有时在码头设简单祭台，感谢海神保佑一年出海平安。"},
{"n":"七夕乞巧节","py":"七夕 (Tshit-si̍h)","c":"🎉 岁时节庆","sc":"农历节日","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历七月初七","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"七夕节是海丰女性的重要节日，又称「乞巧节」或「女儿节」。传说此夜牛郎织女在银河相会，未婚女子于此夜向织女祈求心灵手巧与姻缘美满，已婚妇女则为家人祈福。","items":"鲜花（七种颜色各一）、七种针线（各色丝线）、巧果（油炸面点）、水果、香烛、脸盆（盛水穿针用）","steps":"七月初七傍晚，家中女性于庭院或天台摆设供桌；供奉七色花、七种针线及巧果；燃香向织女祈拜，祈求手艺精巧、姻缘美满；「穿针乞巧」：将七根针排列，月光下穿针引线，穿入者为「得巧」；部分地区有「洗头发」习俗，相传七夕夜以露水洗头可使头发乌黑亮丽；年轻女性互相比试刺绣、剪纸等手工技艺。","taboo":"七夕供奉用的巧果不可分给男性（「乞巧」专属女性）；穿针时不可有人打扰；不可在祭拜前先尝巧果；七夕前后不宜晾晒内衣于室外（迷信污秽冲撞织女）。","story":"海丰旧时有「摆七姐」的习俗：七夕前数日，年轻女性聚集一起，以面粉捏制各种精巧造型（花鸟鱼虫），在七夕夜摆于供桌展示，称「摆七姐」。彼此比试手艺，制作最精细者被称为「巧手」，颇受邻里赞誉。","diff":"城区七夕节现代化色彩较浓，常与情人节文化混合；农村仍保留传统乞巧仪式；客家区七夕节的「做七巧」（手工品制作）与福佬区略有不同，更注重实用性手工技艺的展示。"},
{"n":"浴佛节（四月初八）","py":"浴佛节 (Ik-hut-tsiet)","c":"🎉 岁时节庆","sc":"佛教节日","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历四月初八（释迦牟尼佛诞日）","src":"[书A] 第五章·民间信仰；[书D] 第五章·佛教信仰与民间习俗","intro":"农历四月初八是释迦牟尼佛的诞辰，称「佛诞节」或「浴佛节」。海丰寺庙在此日举行「浴佛」仪式，以香汤浇灌佛像，信众进香祈福，是佛教与民间信仰融合的重要节日。","items":"香汤（用丁香、肉桂、郁金等香料煮成的水）、香烛、鲜花、素果、佛珠、线香","steps":"四月初八，海丰各佛寺及观音庙大开山门，信众早起前往进香；寺中设「浴佛盆」，内置释迦牟尼佛降生小像（右手指天，左手指地）；信众以勺舀取香汤，从佛像头顶缓缓浇下，是为「浴佛」；浴佛后，信众绕寺三圈，以示礼敬；部分寺庙向信众分发「吉祥符」或「平安米」；寺中素斋开放，信众可免费用餐。","taboo":"浴佛时须以左手持勺，右手拱于腹前；须保持庄重肃静；不可将浴佛用香汤带走（须留于盆中）；当日宜吃素，不可杀生。","story":"「浴佛」的象征意义来自佛教典故：释迦牟尼降生时，天降香雨为其沐浴，九龙吐水。民间以香汤浴佛，意在净化自身业障，也祈求雨水丰沛、五谷丰收。海丰地区的浴佛节因临近春耕后期，也具有祈雨护农的民间功能。","diff":"城区大型寺庙浴佛节活动规模较大，有时请来高僧主持；农村小庙活动相对简约；客家聚居区保留了较纯粹的佛教仪式形式，福佬区则更多融入了民间信仰元素。"},
{"n":"土地公诞（二月二）","py":"伯公诞 (Peh-kong tuann)","c":"🎉 岁时节庆","sc":"神诞节庆","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历二月初二（又称「龙抬头」）","src":"[书A] 第五章·民间信仰；[书D] 第六章·土地神信仰","intro":"农历二月初二是土地公（福德正神，海丰俗称「伯公」）的诞辰。土地公是管辖一方土地与财富的地方守护神，每个村落、街巷几乎都有伯公庙（「伯公龛」），二月初二须备供品祭拜，祈求财运亨通、土地丰饶。","items":"三牲或素果、香烛、纸钱（福德金）、米酒（伯公喜酒）、发糕、花生","steps":"二月初二清晨，各家各户先在自家门口的伯公龛前备供品上香；再前往村中伯公庙参拜；供品以三牲（或鱼、鸡）及发糕为主，发糕须「笑开」（顶部裂开）；点燃福德金（伯公专用纸钱）焚化；部分社区会在庙前摆设流水席，邀请全村人共食，费用由庙会公款承担；商家在此日也会特别祭拜伯公，祈求生意兴隆。","taboo":"祭拜伯公不可使用苦味食物；纸钱须烧尽，不可中途离开；不可在伯公庙前争吵；二月初二当日不宜借钱给他人（「借出不还」之忌）。","story":"海丰民间认为伯公是土地的守护者，也是财富的保管人。有一习俗：若当年某户人家财运不顺，可在伯公诞日向伯公「借财」——在伯公像前放一枚硬币，来年财运好转后须还「利息」（多放数枚），称「向伯公借财」。","diff":"城区商业区的伯公庙祭拜尤为热闹，商家会大规模供奉；农村伯公庙多设于村口大树旁，格局简朴；渔村的「海伯公」（海边土地神）信仰兼有妈祖功能，祭拜时加入渔业元素。"},
{"n":"观音诞辰祭拜","py":"观音诞 (Kuan-im tuann)","c":"🎉 岁时节庆","sc":"神诞节庆","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历二月十九（主诞）；六月十九、九月十九亦为观音诞","src":"[书A] 第五章·民间信仰；[书D] 第五章·观音信仰","intro":"观音菩萨（观世音）是海丰民间最受崇拜的女性神祇，与妈祖并列为最重要的庇护神。海丰各地均设有观音庙或在庙中供奉观音，每逢三个观音诞均有祭拜活动，以二月十九主诞最为隆重。","items":"鲜花（白莲花或百合为佳）、香烛、素果（观音不受荤腥）、甜粿、清水（供水杯）、线香","steps":"观音诞前日，信众沐浴斋戒；诞日清晨赶往观音庙（或家中观音神位），摆设素果鲜花；以清水供奉（象征观音净瓶中的甘露）；燃香祭拜，跪拜祈愿；许愿者须还愿：愿望实现后再来上香或捐油灯钱；部分信众选择于此日全日吃素（「观音素」），以示虔诚；庙宇会请来经师诵念「大悲咒」和「观音经」。","taboo":"观音神前供品须全素，不可摆放荤腥肉食；进庙须仪容整洁；不可在庙内喧哗嬉笑；女性例假期间不可靠近主供桌；供花不可用枯萎残花。","story":"海丰民间流传观音「送子」的信仰，许多未育家庭会在观音诞日前往庙中祈求子嗣，称「向观音借红线」。若事后怀孕生子，须回庙还愿，为神像换上新衣，并捐献灯油，代代相传，使观音庙香火长盛。","diff":"城区观音庙规模较大，诞日人山人海；农村观音庙多为小型社区庙宇，祭拜较为亲密；部分宗族将观音与祖先同祀，形成「观音助祖」的特殊信仰形式。"},
{"n":"滚地金龙","py":"滚地金龙 (Kún-tē kim-liông)","c":"🎭 戏曲与口传文艺","sc":"民间舞蹈","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"元宵节（最重要演出场合）；春节巡游；神诞庆典","src":"[遗A] 国家级非遗名录·海丰滚地金龙；[书A] 第八章·民间艺术","intro":"滚地金龙是海丰独有的民间艺术，表演者两人操控一条金龙道具，全程贴地表演，模仿龙的腾挪翻滚动作，配合激烈的锣鼓音乐，极具视觉冲击力。与一般舞龙不同，「滚地」是其最大特色。","items":"金龙道具（布料与竹篾制成，长约4至5米，饰以金色鳞片）、锣鼓套（锣、鼓、钹）、宝珠（引龙之珠）、演员垫护（保护腰背滚地）","steps":"演出前，在空地铺设草席或毛毡；表演开始，「龙珠」领舞者手持宝珠在前引导；两名演员分别钻入龙头和龙身，开始贴地表演；核心动作：「滚地」（演员全身趴地，带动龙体在地面翻滚）、「穿梭」（龙体在珠后快速穿行）、「腾飞」（演员跃起，使龙体瞬间腾空）；整场演出体力消耗极大，演员常于场地轮换休息；表演结束，龙身「入睡」，演员出来向观众致意。","taboo":"演出期间不可在龙体上踩踏；观众不可向龙头投掷物品；滚地动作须由训练有素者表演，不可草率；龙道具须定期「开光」维护神性；演出结束后须将龙体抬起存放，不可拖行于地。","story":"滚地金龙相传起源于明代海丰县城，与当地崇龙习俗有关。当地人认为龙贴地滚行，有「巡视地界、驱邪纳吉」的神性功能，因此逐渐发展出这一独特的贴地表演形式。在现代，滚地金龙已被列为国家级非遗，并多次赴国外演出，是海丰对外文化交流的代表性节目。","diff":"滚地金龙是海丰独有的艺术形式，在粤东乃至全省均属罕见；城区表演更注重舞台效果，增加了灯光音效；乡村表演保留了更多原始力量感；海丰已成立专业团队对此进行系统保护和传承。"},
{"n":"麒麟舞（公平镇）","py":"麒麟舞 (Kî-lîn bú)","c":"🎭 戏曲与口传文艺","sc":"民间舞蹈","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"春节、元宵（主要演出季）；神诞、婚庆等喜庆场合","src":"[遗A] 国家级非遗名录·海丰麒麟舞；[书A] 第八章·民间艺术","intro":"麒麟舞是海丰最具代表性的民间表演艺术，以两人配合舞动麒麟道具，配合锣鼓音乐，展现麒麟的神威与灵动。海丰公平镇是麒麟舞的核心传承地，已被列为国家级非物质文化遗产。","items":"麒麟道具（头部由竹篾扎骨架，彩纸彩绸装饰，身体为彩绸布套）、锣、鼓、钹、唢呐（配乐用）、演员服装（鲜艳武士装）","steps":"演出开始，锣鼓声起，两名演员分别钻入麒麟头尾；麒麟「醒觉」，先做拜四方动作，向天地神明致敬；随后展示各种步法：「睡麒麟」（卧地休息）、「行麒麟」（巡游步伐）、「戏球麒麟」（与宝球互动）；高潮段落：麒麟腾跃、甩尾，演绎「采青」（吃地上摆放的青菜，寓意纳祥）；演出结束，麒麟向主人家点头致意，主人回赠红包；锣鼓收尾，演出完毕。","taboo":"麒麟道具平时须妥善存放，不可随意丢置地面；演出前须在神明前「开光」；观众不可从麒麟身体下钻过；表演期间不可触碰麒麟道具；演出不可中断。","story":"海丰麒麟舞融合了南派武术步法与戏曲身段，相传由清代武术师傅创编，将武功招式融入舞蹈。如今公平镇仍有多个「麒麟队」，传承人多自幼从师，学艺过程结合武术训练。麒麟舞在春节期间沿村巡回表演，每到一处主人家门前必有「采青」仪式，主人赠红包，麒麟队继续前行，形成独特的「贺岁巡游」文化。","diff":"海丰公平镇麒麟舞以体量大、步法正宗著称；城区麒麟舞商演化程度更高；汕尾市区也有麒麟舞但风格略有差异；相邻的惠州惠东地区也有麒麟舞传统，但与公平版在音乐和动作上各有特色。"},
{"n":"上梁典礼","py":"上梁 (Siōnn-niô)","c":"🏡 传统建筑与工艺","sc":"建筑礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新屋建造过程中，安装主梁（正梁）之日（黄道吉日）","src":"[书A] 第七章·居住礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"上梁是新屋建造过程中最重要的仪式，在安装屋顶正梁（脊梁）时举行。民间认为正梁是「房屋之脊」，关系一家未来的命运，因此须择吉日、请大师主持，并大宴亲邻。","items":"正梁（质优木料，现多用钢筋混凝土）、红布（覆盖梁头）、五谷（稻、麦、豆等）、红包（「梁钱」）、糍粑或馒头（「抛梁粑」用，内包硬币）、鞭炮、三牲","steps":"由风水先生选定上梁吉日与吉时；正梁用红布包裹，写上「上梁大吉」字样；主人准备三牲香烛，在建筑工地前祭拜土地神与鲁班（建筑之神）；在吉时，由工匠将正梁安置于最高处；主人或工匠头在梁上唱「上梁文」，颂吉祥词句；上梁完毕后，将糍粑从梁上抛下，围观众人争抢（称「抢梁粑」）；主人大摆宴席，宴请参建工匠、亲朋邻里。","taboo":"上梁日不可与他人争吵；不可说与「倒」「塌」「断」相关的字眼；上梁期间若遇下雨，须换日（雨水入梁为不祥）；孕妇不可站于施工区域内；抢梁粑时不可哭泣。","story":"海丰上梁文是一种民间口头文学，由主持仪式者即兴吟唱，内容包含「东方甲乙木，木上站仙人……」等固定套语，夹杂吉祥祝福与风水口诀，格律自由，充满地方特色，是珍贵的口传文化遗产。","diff":"城区现代楼房建筑中，上梁习俗已大大简化，多仅燃放鞭炮并备简单供品；农村仍保留完整上梁仪式，工匠的「上梁文」吟唱依然是活态习俗；客家聚居区上梁仪式有客家语吟唱的专属版本。"},
{"n":"渔船开光","py":"开光 (Khai-kong)","c":"🏡 传统建筑与工艺","sc":"渔业礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新船建成下水前；旧船大修后","src":"[书E] 第二章·渔民信仰习俗；[书A] 第五章·民间信仰","intro":"新渔船或大修后的渔船，在正式投入捕鱼作业前，须举行「开光」仪式，邀请道士或庙祝为渔船供奉神明、书写神符，赋予渔船「灵性」，使妈祖与海神能够庇佑船上人员平安。","items":"红布（覆盖船眼）、新鲜猪血或红漆（点眼用）、三牲供品、香烛、鞭炮、神符（由道士书写）、新船名牌","steps":"选择吉日，邀请有资质的道士或庙祝前来；新船命名，在船头两侧绘制「船眼」（圆形眼睛图案）；道士以毛笔蘸猪血或红漆，为船眼「点睛」，使船眼「见光」；道士念诵经文，请妈祖等神明入驻船中；在船上各处张贴神符；供奉三牲，焚香上供；燃放鞭炮，宣告开光完成；船长率全体船员向神明行礼；之后方可正式出海。","taboo":"开光仪式期间，部分渔村规定女性不可登船；开光当日不可说任何不吉利的话；开光后三日内不可出海（须让神明「安座」）；船眼须保持完整，若有损伤须及时修复。","story":"海丰渔船的「船眼」文化有着古老的渊源，源于古代地中海与东南亚航海文明对船眼的信仰。闽越先民随渔业传统将此带入海陆丰。船眼不仅是装饰，更被视为船只的「眼睛」，使船能「看见」礁石、风浪与危险。","diff":"大型渔船开光仪式较为隆重，有时邀请整个渔村共同庆贺；小型渔船开光则相对简约；鲘门渔港的开光仪式有独特的「下水礼」，新船首次入水时须摔碎酒瓶于船头。"},
{"n":"春节年糕制作","py":"年糕 (Nî-kuéh)","c":"🍜 饮食民俗","sc":"节庆食品","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十二月廿日前后（春节前一至两周）","src":"[书A] 第三章·春节习俗；[书F] 第三章·节庆饮食","intro":"年糕是海丰春节必备的传统食品，以糯米为主料，加红糖熬制而成，口感甜糯，取「年年高」（年糕谐音）之吉意。年糕既用于供奉祖先与神明，也用于分赠亲友、互表祝愿。","items":"糯米粉、红糖（黄片糖）、清水、花生油（润模用）、竹笋叶或香蕉叶（铺底）、方形木模（传统）","steps":"将红糖溶于温水，待凉后与糯米粉混合，搅拌成糊状（无颗粒）；木模内铺上香蕉叶，刷上薄薄花生油（防粘）；将糯米糊倒入模具中至八分满；放入蒸笼，大火蒸约2至3小时，至竹签插入不粘为止；取出冷却，待完全凝固后脱模；年糕表面呈深棕红色，光亮油润即为成功。","taboo":"蒸年糕期间不可大声说话；不可中途将锅盖完全取下；年糕未完全冷却前不可切割；供神的年糕须保持完整，不可事先切块。","story":"海丰民间有「年糕越蒸越亮，来年越来越旺」的说法，认为年糕的光泽与来年的财运相关。因此蒸年糕时，家中老人往往会在旁守候，观察年糕的色泽变化，成为春节前家庭生活的温馨场景。","diff":"海丰城区年糕多用红糖，颜色较深；农村年糕有时加入花生或芝麻；客家聚居区的「黄糍」与年糕相近但不完全相同，材料和蒸制方法略有差异；部分地区春节还会制作白色的「甜粿」（纯白糯米加白糖），与棕色年糕并列供奉。"},
{"n":"端午粽子","py":"粽 (Tsàng)","c":"🍜 饮食民俗","sc":"节庆食品","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历五月初一至初五（端午节前后）","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"端午节包粽子是海丰最具代表性的饮食习俗之一。海丰粽子有独特的咸粽传统，以糯米加猪肉、香菇、虾米、咸蛋黄等配料，以竹叶包裹蒸煮而成，口感香糯咸鲜。","items":"糯米（泡水4小时以上）、猪五花肉（腌制）、香菇、虾米、咸蛋黄、生抽、老抽、五香粉、竹叶（或芦苇叶）、草绳（捆绑用）","steps":"竹叶提前浸泡软化，洗净；猪肉切块腌制；糯米加调味料拌匀；取两片竹叶折叠成锥形兜，先放一层糯米，加猪肉、香菇、虾米、咸蛋黄等馅料，再覆盖一层糯米；收口折叠竹叶，用草绳紧紧捆绑；入大锅沸水，煮2至3小时；取出剪绳剥叶，热食或放凉皆可。","taboo":"草绳须捆紧，若煮时松散（「漏粽」）被视为不吉；端午节粽子不可只留自己食用，须分赠邻里亲友；端午时节还有挂艾草菖蒲、饮雄黄酒驱「五毒」的配套习俗。","story":"海丰端午节还有「挂艾草菖蒲」的传统：在门口挂上干艾草与菖蒲，认为气味可驱邪避瘟。端午时节也是饮雄黄酒的日子，少量涂抹于小孩耳后、肚脐，以驱「五毒」（蛇蝎蜈蚣蟾蜍壁虎）。","diff":"海丰粽子与潮汕粽子相近，均以咸肉粽为主；部分地区也有甜粽（豆沙馅）；捷胜等沿海地区粽子有时加入新鲜鱼肉或海虾，增添海鲜风味；城区粽子个头偏大，农村家庭自制粽子更小巧，方便分食。"},
{"n":"糖葱酥（双捷镇）","py":"糖葱 (Tng-tshang)","c":"🍜 饮食民俗","sc":"传统糖果糕点","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"常年生产；节庆前（春节、中秋）销量最旺","src":"[书A] 第六章·饮食民俗；[书F] 第四章·岭南特色食品","intro":"糖葱酥（又称「糖葱薄饼」）是海丰县双捷镇的传统名特食品，以特制麦芽糖为心，外裹薄脆饼皮，形似大葱，故名「糖葱」。制作工艺独特，是海丰最具辨识度的地方特产之一。","items":"麦芽糖、白砂糖、芝麻、糯米粉（薄饼皮）、食用植物油","steps":"将麦芽糖与白砂糖按比例熬煮至特定温度，糖色呈琥珀色；趁热将糖浆倒于石板上，待稍冷后反复拉伸折叠，使糖体充入空气，变为白色中空管状；趁糖体尚温时撒入芝麻，继续拉伸；糖体降温定型，切段；另外烙制薄脆饼皮，将糖条包卷其中，即成糖葱酥；成品中空酥脆，一碰即碎，入口即化。","taboo":"糖葱制作须在天气干燥时进行，湿度过高会使糖体发软；拉糖时须两人配合，不可单人操作；成品不可受潮，须密封保存；馈赠他人时不可整条折断。","story":"双捷糖葱已有百年以上历史，相传由清末移民从闽南引进制法，后在双捷镇落地生根并发扬光大。如今双捷糖葱已成为游子思乡的符号：海外华侨回乡必带糖葱伴手礼，也有将糖葱航运至东南亚华人社区销售的传统。","diff":"双捷糖葱与潮汕地区「糖葱饼」同宗同源，但双捷版本麦芽糖比例更高，口感更甜更酥；城区超市也有工厂化糖葱产品，但风味与手工版相差较大；赠礼时双捷糖葱比市售商品更受重视。"},
{"n":"节庆粿品制作","py":"粿 (Kuéh)","c":"🍜 饮食民俗","sc":"节庆食品","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"各节庆前（春节、清明、中元、冬至）","src":"[志A] 第十一章·民俗风情·岁时节庆；[书A] 第六章·饮食民俗","intro":"「粿」是闽南语对米制糕点的统称，海丰各节庆均有对应的特定粿品，是节日饮食文化的核心。不同粿品有不同原料、制法与象征意义，制作过程本身也是家庭传授技艺的重要场合。","items":"糯米粉或粘米粉、糖（红糖或白糖）、艾草（清明粿用）、红曲（红粿用）、各色馅料（豆沙、花生、萝卜丝）、香蕉叶（垫底用）、蒸笼","steps":"依节庆确定粿品种类（清明做「青草粿」，取艾草捣汁揉入粉团；冬至做「冬至丸」，纯糯米粉搓圆；春节做「发糕」，需发酵）；备料，依配方加入糖、色素或草汁；擀制或手捏成型；垫上香蕉叶，置蒸笼蒸熟；出笼冷却后可食用或供奉神明、分赠邻里。","taboo":"蒸粿时不可中途打开锅盖；制作过程中不可说不吉利的话；供奉用的粿须在神明「食完」（香烛燃尽）后方可取下；发糕若蒸出来顶部不开裂，被视为不吉，须重做。","story":"海丰发糕（「发」粿）是最受重视的节庆粿品，顶部须自然裂开（称「发开」或「笑开」），象征财运亨通、笑口常开。若蒸出来顶部未裂，民间会说「发糕没发」，须补救或重蒸，绝不可以未裂开的发糕供奉祖先。","diff":"海丰公平镇「大粿」（糯米大饼）闻名周边；捷胜镇以「糯米酿」（酿粄）为特色；赤石镇清明青草粿中艾草用量更多；城区商业化粿品口味更多样，但家庭手工制作的粿品在老辈人中更受推崇。"},
{"n":"海丰咸茶","py":"咸茶 (Kiâm-tê)","c":"🍜 饮食民俗","sc":"茶饮习俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"日常（尤其下午时分）；亦用于节庆和待客","src":"[书A] 第六章·饮食民俗；[书F] 第四章·岭南特色饮食","intro":"海丰咸茶是当地最具代表性的传统饮食，将绿茶叶与芝麻、花生米、炒米等配料混合，加少量盐，以研磨棒在陶钵中研磨成糊状，加水搅拌而成。味道咸香醇厚，既是日常饮品，也是待客佳品。","items":"绿茶叶（新鲜或晒干）、芝麻（炒香）、花生米（炒香）、炒米（爆米）、盐、清水、陶制研磨钵（擂茶钵）、木制研磨棒（擂棒）","steps":"将茶叶放入陶钵，加少量盐；用擂棒顺时针研磨茶叶，至茶叶细腻；加入芝麻、花生米继续研磨，至所有配料充分融合；加入适量清水，搅拌成均匀糊状；再加适量热水调匀，呈绿色茶汤；最后撒入炒米，增加口感；盛入碗中，趁热饮用。","taboo":"咸茶研磨须顺时针方向，不可逆转；不可使用铁器研磨（会破坏茶香）；配料须现做现食，隔夜咸茶风味大减；待客时不可强迫客人反复续碗。","story":"咸茶原为海丰先民闽越文化的遗存，是古代「茗粥」（煮茶加盐）习俗的演变形式。在海丰，咸茶兼具食物与饮料的双重功能，过去农忙季节常以一大钵咸茶配炒米替代正餐，体现了山海之间劳动人民对食物的智慧运用。","diff":"公平镇以多放花生为特色；赤石镇添加炸花生碎；城区商业版咸茶有时加入薄荷叶增香；陆丰的「客家擂茶」与海丰咸茶同源，但配料和口味有所差异，两者各有特色。"},
{"n":"渔民出海祭海","py":"祭海 (Tsè-hái)","c":"🙏 民间信仰","sc":"渔业礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"渔汛开始前（通常农历三月至四月）；大型出海活动出发前","src":"[书E] 第二章·渔民信仰习俗；[志A] 第十一章·民俗风情·渔业民俗","intro":"海丰沿海渔民在正式出海捕鱼前，必举行祭海仪式，祈求妈祖、海神庇佑船员平安、渔获丰收。这是渔村中最具凝聚力的集体仪式，也是渔民与海洋之间精神纽带的体现。","items":"三牲（全猪头、全鸡、鱼）、米酒、香烛、鞭炮、纸钱元宝、彩旗（各船旗帜）","steps":"出海前日，渔村召集各船船长商议出海日期，由年长渔民选择吉日；祭海当天清晨，各渔船在码头停靠，船主在船头摆设香案供品；庙祝或年长渔民主持仪式，率众上香，向妈祖、海神祈祷；念诵出海平安经文；焚化纸钱与纸扎供品；燃放长串鞭炮；各船整备出发，渔旗飘扬；归港后须再到妈祖庙致谢，称「还愿」。","taboo":"出海前不可说「翻」字；不可说「沉」字；出发时若遇到送葬队伍，须延迟出发；部分渔村女性不可踏上准备出海的渔船。","story":"海丰鲘门有「开海节」的传统，每年南海休渔期结束（约8月1日）后举行大规模祭海活动，全镇渔船集体出海，场面壮观，近年已发展为地方文化旅游活动，吸引大批游客参观。","diff":"鲘门、捷胜等大渔港祭海规模宏大，有统一组织；小漠等小渔村则以各船单独祭海为主；马宫渔港祭海有独特的「拜四方海神」环节，向东南西北四方依次祭拜。"},
{"n":"掷杯问卜","py":"掷杯 (Tiànn-pue)","c":"🙏 民间信仰","sc":"问卜习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"不定期，在做重大决定前或遇到疑难时","src":"[书A] 第五章·民间信仰；[书D] 第三章·问卜与占卜","intro":"掷杯（又称「掷筊」）是海丰最普遍的民间问卜方式，使用一对半月形木制「筊杯」，在神明前投掷，根据正反面朝上的结果判断神明意愿。简便易行，是日常信仰生活的重要组成部分。","items":"一对筊杯（半月形木块，内凹为阴面，外凸为阳面）、香烛","steps":"信众在神像前上香，心中默念姓名、住址与所问之事；双手合捧筊杯，陈述问题与期望的选项；将筊杯投掷于地；结果判读：一阴一阳（「圣杯」）→ 神明同意/吉；两阳朝上（「笑杯」）→ 神明未答，可重新投；两阴朝上（「阴杯」）→ 神明不同意/不吉；连续三次「圣杯」为最吉之兆。","taboo":"同一问题不可无限次重投，否则视为对神明不尊；投杯时心须诚敬，不可嬉笑；不可替他人代问（需由当事人亲自问）；结果不好时不可立即推翻，须静思三日后再问。","story":"海丰渔民在出海前若对天气有疑虑，常在妈祖庙前掷杯询问是否适宜出海。若三次未得圣杯，则多选择延迟出发。这一习俗使掷杯与海丰渔业生计深度交织，有研究者认为这实质上是一种风险决策的集体机制。","diff":"城区神庙提供筊杯借用服务；渔村渔民多自备筊杯，常年随身携带；客家聚居区也有类似习俗，但筊杯材料与形制略有差异，部分地区改用竹片。"},
{"n":"小孩过关仪式","py":"过关 (Kuè-kuan)","c":"🙏 民间信仰","sc":"驱邪保平安仪式","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"小孩12岁前，通常在本命年或生病、受惊吓后举行","src":"[书A] 第五章·民间信仰；[书D] 第三章·人生礼俗与信仰","intro":"「过关」是为年幼孩子驱除厄运、化解凶煞的民间仪式，由道士或庙祝主持。民间认为孩子12岁之前须过「十二道关」（月关、花关、水关等），每逢本命年或遭遇灾厄须专程「过关」。","items":"红符纸、香烛、三牲或鸡蛋、米、盐、五色线（红黄蓝绿白）、关衣（纸扎衣物）、小孩本命年生辰八字","steps":"家长携孩子前往土地庙或主庙，告知道士孩子生辰八字与遭遇；道士查看孩子正处于哪道「关」内，写红符并念经；将红符在香炉上绕三圈，贴于孩子额头或背上（后取下焚化）；道士以米、盐、五色线「扎关」，象征封锁厄运；焚化关衣，请神明接收；道士给孩子佩戴平安符或五色线手环；回家后须以鸡蛋「滚身」，吸走邪气。","taboo":"过关后当天不可外出至偏僻处；过关所用五色线不可由他人随意取走；过关后三日内不可参与丧事；孩子过关后须遵守道士嘱咐。","story":"海丰民间流传「三六九，过了就上路」的说法，意思是3岁、6岁、9岁是孩子关卡最密集的年份，每逢这些年岁的孩子若生病或有不顺，家长多会第一时间带去「过关」。这与传统「小三关」理论相合。","diff":"城区家长近年多在元宵节前后集中带孩子去大庙过关；农村过关习俗仍较频繁，任何时候孩子有异常都会进行；仪式细节因主持者（道士、庙祝）而略有差异。"},
{"n":"神明绕境巡游","py":"绕境 (Jiáu-kíng)","c":"🙏 民间信仰","sc":"神明游行","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"各神诞日；或特定节日（元宵、妈祖诞、关帝诞）","src":"[书A] 第五章·民间信仰；[书D] 第二章·民间神明崇拜","intro":"绕境是海丰民间信仰中规模最大的集体活动，将神明銮驾（神像轿子）抬出庙宇，巡游境内各街道，接受信众顶礼，同时为境内驱邪纳祥。仪式队伍浩大，锣鼓喧天，是社区凝聚力的集中展示。","items":"神明銮驾（神轿）、仪仗旗帜（彩旗、蛇矛、长矛等）、锣鼓队、香案、鞭炮、祭品（各家自备）","steps":"绕境前数日，庙宇委员会公告巡游路线与日期；绕境日，信众为神明更换新衣；出发前，庙内举行开光仪式；銮驾队伍出发，前有仪仗开路，锣鼓随行；队伍行经各街各巷，沿途各家各户设香案、燃鞭炮、行跪拜礼迎接；神明经过时，信众可取下香烛在銮驾边绕行，称「抢香」；巡游结束，神明回驾入庙，关闭庙门，代表驱邪完毕。","taboo":"銮驾经过时，不可从轿杆下钻过；不可持雨伞于銮驾前行进；孕妇不宜近距离接触銮驾；不可在巡游路线上晾晒衣物；绕境当日，沿途住户不可在屋内从事农活。","story":"海丰某些宗族有轮流「请神」的传统：村中各家各户按轮次将神明供奉于家中数日，该家庭承担维护神明供奉的责任，并接受村民前来「行香」。这一习俗将神明信仰与社区互助融为一体。","diff":"大宗教社区绕境队伍可达数百人，历时半天以上；小村落绕境只在本村范围内，时间较短；部分村落绕境时有「乩童起乩」（乩身请神）表演，展现神明降临之力。"},
{"n":"妈祖信仰与日常祭拜","py":"妈祖 (Má-tsó)","c":"🙏 民间信仰","sc":"海神信仰","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★★ 联合国非遗登录","tm":"农历三月廿三诞辰（主祭）；日常可随时祭拜","src":"[遗A] 联合国非遗·妈祖信俗（2009）；[志A] 第十一章·民俗风情·民间神祀；[书D] 第四章·海神信仰","intro":"妈祖（天后）是中国沿海最重要的海神，主司海上平安。海丰沿海各镇（鲘门、捷胜、小漠、马宫等）均建有天后宫，渔民出海前必拜妈祖，是海丰渔业文化与民间信仰的核心。","items":"香烛、三牲（全猪、全鸡、鱼）或鲜花水果、纸钱、天后宫神像銮驾","steps":"日常祭拜：渔民出海前在天后宫上香，点燃红烛，奉上鲜花或水果，祈求海上平安；诞辰祭拜：全村备三牲前往天后宫，由专职人员主持，念诵经文；妈祖神像出巡绕境，信众随行，烟炮齐鸣；庙内聘请剧团演神功戏（白字戏）；夜间燃放烟花；渔船启航前须在船头供妈祖神位。","taboo":"进入天后宫须保持庄重；女性例假期间不宜进入内殿；不可将祭品带出庙外食用；渔船上不可发生争吵；出海时若风浪忽起，须向妈祖祈祷，不可咒骂风浪。","story":"海丰捷胜天后宫有传说：清代某年台风大作，渔船遇险，船夫向妈祖祈祷，忽见海面红光闪现，帆船得以安然入港。此后当地渔民将这一奇迹刻入庙碑，每逢台风后均会到天后宫还愿致谢。","diff":"鲘门天后宫以规模最大著称；捷胜天后宫以历史悠久著称；马宫天后宫有独特的「拜四方海神」环节；沿海渔村的妈祖信仰与内陆村落的祭祀形式有所差异，渔村更注重「送船平安」。"},
{"n":"食祖宗族聚餐","py":"食祖 (Tsia̍h-tsóo)","c":"🏠 宗族与日常礼节","sc":"宗族礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"清明扫墓后，或冬至祭祖后举行","src":"[书A] 第二章·宗族礼俗；[书G] 第四章·宗族聚合与地方认同","intro":"「食祖」是合族祭祖后共同聚餐的习俗，意为「吃祖先的恩泽」。此餐由宗族公产（祭田收益）支付，向族人传递「祖德庇佑，人人有份」的宗族共同体理念。","items":"宴席菜肴（鸡、鱼、猪肉为必备）、米酒、茶水、分胙肉（各房领取份额）","steps":"祭祖仪式结束后，在祠堂前坪或附近空地摆设宴席；宴席由宗族公产支付；族中成员均有资格参与；由族长或长老主持开席词；聚餐结束后，将剩余祭品（尤其是肉类）按房份平均分配，各家带回；食祖结束，通常一并讨论宗族公务（修葺祠堂、修谱计划、族产管理等）。","taboo":"食祖须在白天举行，不可延至日落后；各房席位安排须按辈分尊卑；不可当众谈论族内纠纷；外姓人一般不参与，除非经族长特别邀请。","story":"「食祖」的物质来源是宗族「蒸尝田」（公田）的收益。海丰许多大宗族在历史上拥有大片公田，租金收入专用于祠堂维护、祭祖费用和食祖宴席。这一制度使宗族具备了类似社区基金的功能，确保族内弱势成员也能享有祭祖的权利。","diff":"海丰大族食祖规模可达数十桌，分男女席分坐；小宗族则合族一二十人共一桌；城区宗族因公田资产减少，食祖费用多改由各房均摊；海外侨胞返乡时若恰逢食祖，须支付较多的「回馈」以表感谢祖德。"},
{"n":"族谱修编","py":"修族谱 (Siú tsók-póo)","c":"🏠 宗族与日常礼节","sc":"宗族制度","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"不定期，通常每三十年一次；多选在重要整寿年份","src":"[书G] 第三章·华南宗族制度；[志A] 第十一章·民俗风情·宗族礼俗","intro":"族谱（宗谱）是宗族成员世系的文字记录，是海丰宗族认同的核心文本。修族谱须全宗族协力完成，通常设立修谱委员会，历时数年，完成后举行盛大的「颁谱典礼」。","items":"旧版族谱（若有）、毛笔、宣纸（旧式）或电脑（现代）、红布（包覆新谱）、宴席食材","steps":"宗族长老决议修谱，成立修谱委员会；向各房各户收集资料，记录近几十年新增男丁、女丁、婚嫁、迁移信息；追溯始祖渊源，核实各房世系连接；编写谱序；付印装订，每房依人口比例领取数量；举行颁谱典礼，燃放鞭炮，全族宴饮；新谱供于祠堂，由族长保管正本。","taboo":"族谱不可随意翻阅，尤其外姓人；不可置于地面或不洁之处；修谱过程中若有争议，须由族长裁决；族谱不可焚毁（族谱被烧视为大忌）。","story":"海丰许多宗族族谱都追溯到中原南迁的始祖，记录着先民从福建或中原迁入海陆丰的路线与年代。这些迁移故事在族谱序言中被细致记载，成为海丰人「寻根问祖」的重要依据，也是研究历史移民的珍贵资料。","diff":"海丰福佬大宗族（如陈、林、张等姓）族谱修编规模庞大，有时需要联络海内外同族；客家宗族族谱修编相对独立，多与粤东客家区宗亲联动；近年部分宗族已启动数字化族谱项目。"},
{"n":"冬至祠堂祭祖","py":"冬至祭祖 (Tang-tsì tsè-tsóo)","c":"🏠 宗族与日常礼节","sc":"祭祖礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"公历12月21日或22日（冬至节气）","src":"[书A] 第三章·祭祀习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"冬至在海丰被称为「冬节」，地位仅次于清明。各宗族于冬至在祠堂举行正式祭祖仪式，并有全族共同搓汤圆、食汤圆的传统，是宗族聚合的重要时刻。","items":"汤圆（糯米丸子，白色和红色）、三牲或五牲、香烛、纸钱、糯米粉、糖","steps":"冬至前夕，各家女性带领孩子搓汤圆，糯米粉加水揉成团，捏成小球形，部分染成红色；冬至日，汤圆先敬奉祖先神位，再供全家食用；各宗族聚集于祠堂，由族长主持祭祖仪式，摆放三牲等供品，上香行礼；仪式结束后，分发「冬节丸」（汤圆）给族人。","taboo":"冬至汤圆须在日出前或清晨搓好；汤圆数量不可为奇数；祭祖仪式上不可喧哗；汤圆要在当天全部食用，不可隔夜。","story":"海丰有「冬至大过年」的说法，认为冬至的重要性不亚于春节。这与冬至是一年中阴极阳生的转折点有关——自冬至日起，白昼逐渐变长，是生命与希望的象征。因此冬至的祭祖仪式被赋予了特殊的宇宙观意义。","diff":"城区冬至祠堂祭祖多保留正式仪式；农村则将宗族聚餐作为重头戏；客家区冬至有独特的「冬至粄」（糍粑类食品）习俗，与福佬区的汤圆有所不同。"},
{"n":"清明扫墓","py":"清明 (Tshing-mîng)","c":"🏠 宗族与日常礼节","sc":"祭祖礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"公历4月4日或5日（清明节气）","src":"[志A] 第十一章·民俗风情·岁时节庆；[书A] 第三章·祭祀习俗","intro":"清明节是海丰人一年中最重要的祭祖节日，合族扫墓是宗族凝聚力的核心活动。各宗族按辈分排定日期，集体前往祖坟祭扫，仪式庄重，参与人数众多。","items":"三牲（烧猪、白斩鸡、鱼）、水果、糕点（粿品）、香烛、纸钱元宝、鞭炮、锄头（修坟）、镰刀（清草）、颜料（描碑文）","steps":"清明前数日，各宗族召集确定合族扫墓日期与分工；到达后先清除杂草、培土固坟，有石碑者重描碑文；摆放祭品于坟前，由族长主持上香；全体族人依辈分依次行礼祭拜；焚化纸钱元宝，燃放鞭炮；将「分胙」（祭后的肉食）按房份分发族人带回；活动结束后，族人共享简单午餐，称「食山」。","taboo":"扫墓时不可穿全黑或全白衣服；祭品须完整，不可残缺；不可在坟地嬉笑打闹；孕妇不宜参加扫墓；祭拜完成前不可先食用供品。","story":"海丰宗族扫墓的「分胙」制度历史悠久。祭毕将烧猪等祭品按房份平均分割带回各家，象征祖先庇佑降及每一房后裔。这一平等分配的仪式使扫墓兼具祭祀与族人团结的双重功能，即便旅居海外的华侨，在清明前也会专程返乡参与。","diff":"平原宗族扫墓规模最大，人数可达数百人；山区宗族因地形崎岖，步行路程较远，通常分小组完成；沿海渔村宗族部分祖坟位于山顶，有独特的「扫山顶坟」景观。"},
{"n":"做寿礼","py":"做寿 (Tsuè-siū)","c":"👶 人生礼仪","sc":"寿庆礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"生日（重要整寿：50、60、70、80岁等）","src":"[书A] 第四章·人生礼仪；[书B] 第三章·人生礼俗","intro":"「做寿」是为年长者庆贺整数大寿的传统仪式。海丰习俗中，50岁以上方可「做寿」，寿宴规模随年龄增长而盛大，80大寿往往是最隆重的庆典。","items":"寿桃（面粉制红色桃形糕点）、寿面（长面线）、寿糕、三牲、香烛、「百寿图」挂轴、红色灯笼、寿联","steps":"整寿前数日，子女筹备寿宴并发请帖；寿日上午，寿星先拜祖先，感谢祖德庇佑；主寿仪式由子女奉上寿桃、寿面，向父母行跪拜礼；亲友依次道贺，赠送红包、礼品或寿联；午间举行寿宴，宴请亲属邻里，菜肴须有整鱼（余）、长面线（寿）；宴毕，将寿桃分发给所有宾客带回，分享长寿之喜。","taboo":"寿宴不可出现哀乐或黑色装饰；寿桃不可说「坏掉了」；宾客不可送钟（「送终」谐音）或鞋（「谢」谐音，寓送行）；菜肴不可出现苦瓜。","story":"海丰有俗语「七十不留宿，八十不留饭」，意思是对高龄老人外出走访要体贴其精力，含有对老人的体贴之意，是民间礼数中珍贵的人文关怀体现。","diff":"城区寿宴多在酒楼举行，规模可达十数桌；农村寿宴在家中搭棚，邻里共同帮厨，更具社区性；渔村老人做寿会额外在庙前进行谢神仪式，感谢海神多年庇佑。"},
{"n":"迎亲仪式","py":"迎亲 (Ngîng-tshin)","c":"👶 人生礼仪","sc":"婚礼习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"婚礼正日（黄道吉日，多在农历偶月）","src":"[志A] 第十一章·民俗风情·礼仪习俗；[书A] 第四章·婚嫁习俗","intro":"迎亲是海丰传统婚礼的核心仪式，即新郎前往女方家「迎娶」新娘的过程。仪式包含一系列象征性动作，体现对双方家族的尊重与对新人的祝福。","items":"礼饼（聘饼）、红头绳、米筛（遮日用）、红伞、礼炮（鞭炮）、聘金礼盒、糖果花生等伴手礼","steps":"迎亲日清晨，新郎率亲属携聘礼前往女方家；女方父母「拦门」，新郎须说吉祥话方可入内；新郎入门后拜见女方父母并奉茶；新娘由「好命妇人」梳头、覆盖红头巾；新娘出门时，由兄弟抱出门或走红毡，脚不着地象征不带走娘家土；迎亲队伍出发，一路鞭炮开道；新娘进门须跨越火盆（驱邪）；婚礼仪式于男方家举行，拜堂成亲。","taboo":"迎亲队伍途中不可与另一支迎亲队相遇；新娘出门不可回头；若途中遇到丧事须绕路；新娘不可穿绿色；迎亲当日，新娘的鞋须由别人帮穿，自己不可弯腰。","story":"海丰迎亲中「米筛盖头」的习俗颇为特别：新娘出门时，须有人持米筛（筛面朝下）覆于其头上，一路遮挡至上车，以避邪气。米筛眼多而密，象征可滤去一切不洁之物，护送新娘平安进入新家。","diff":"城区现代婚礼多简化传统程序，以婚车取代花轿，但跨火盆、红伞遮日等核心仪式仍保留；农村婚礼程序更为完整；渔村婚礼在出海当日及归港期间有特别的祈福仪式。"},
{"n":"男丁上灯礼","py":"上灯 (Siōnn-tinn)","c":"👶 人生礼仪","sc":"添丁礼俗","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"农历正月初十至十六（元宵节前后）","src":"[志A] 第十一章·民俗风情·礼仪习俗；[书A] 第四章·人生礼仪","intro":"凡上年生有男丁的家庭，须在当年正月元宵节前后在祠堂「上灯」，即悬挂花灯，向宗族公告添丁之喜，并举行宴席宴请族人，是海丰宗族文化中最重要的仪式之一。","items":"大红花灯（「添丁灯」）、酒席、鞭炮、红包（发给祠堂管理者）、猪肉（分发族人）","steps":"上灯日，家主携婴儿前往祠堂，由族长或长老主持；将花灯悬挂于祠堂内指定位置；燃放鞭炮，宣告喜讯；于祠堂或附近设宴，宴请宗族成员；向与宴族人发放红包或猪肉；宴席上由族长宣布新丁正式入族籍，赋予其宗族成员身份。","taboo":"若婴儿生病，须待康复后方可举行；花灯悬挂期间不可随意摘取；宴席上不可谈论不吉之事；无男丁的家庭不参与悬灯仪式。","story":"「上灯」是「添丁」的谐音仪式（灯=丁），象征家族香火延续。海丰某些宗族规定，未完成上灯仪式的男丁，其名字无法正式录入族谱，因此即便家境困难，多数家庭也会尽力完成这一仪式。","diff":"上灯习俗在海丰福佬区最为盛行；城区祠堂空间有限，多于节日期间集中举行；部分宗族已简化流程，将上灯与元宵节活动合并；客家聚居区虽也有添丁庆典，但形式有所不同。"},
{"n":"周岁抓周","py":"抓周 (Jia-tsiu)","c":"👶 人生礼仪","sc":"幼年礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生后一周年","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"周岁生日，海丰人举行「抓周」仪式，将多种物品摆于婴儿面前，以其第一个抓取的物品预测未来志向与命运，是融娱乐与期许于一体的传统礼俗。","items":"圆形托盘、书本（文才）、算盘（商才）、印章（官途）、食物、玩具、针线（女红）","steps":"周岁当天，家中设宴庆祝；仪式时，将婴儿置于铺有红布的方桌中央；在孩子面前摆放书、算盘、印章、食物等各种物品；家长示意后，任由婴儿自由抓取；最先抓到的物品被认为预示其将来志向；长辈当场解读含义并给予祝福。","taboo":"不可在托盘中放入刀剪等锋利危险物品；仪式时不得催促或引导婴儿伸手；若婴儿哭闹不抓，则视为当日状态不好，可改日补办。","story":"海丰抓周仪式中，算盘是历史上最受重视的「吉物」——商业文化在海陆丰根深蒂固，抓到算盘意味着将来善于经营，往往引来长辈最热烈的欢呼。近年也有人在托盘中放入手机、画笔等现代物品，以适应时代变迁。","diff":"城区抓周多融入现代元素，物品种类更多样；农村保留传统物品组合；客家区抓周仪式与宴席绑定更紧密，常作为周岁宴的高潮环节。"},
{"n":"满月礼","py":"满月 (Muánn-ghueh)","c":"👶 人生礼仪","sc":"出生礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生后第三十天","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"满月是婴儿出生一个月的重要里程碑。海丰民间在满月日举行「满月酒」，宴请亲友，为婴儿正式命名，象征母婴平安度过最危险的产后期，婴儿正式被家族和社区接纳。","items":"满月酒菜肴（姜醋猪脚为必备）、红蛋（染红鸡蛋）、红色汤圆、桂圆、荔枝干、剃刀（仪式性）","steps":"满月当天上午，为婴儿剃胎发，象征去旧迎新；剃下的胎发用红纸包裹保存；下午举行满月酒，宴请双方亲属、邻里；外婆家须送「满月礼」，包括衣物、金银饰品、红蛋、糕点；客人回礼通常为红包；红蛋须分发给所有到场客人及邻里。","taboo":"剃胎发须在日出后、日落前进行；剃刀须由有福气的长辈（子女多者）主持；不可剪去眉毛和睫毛；满月酒菜肴中不可出现苦味食材。","story":"满月剃头保留胎发的习俗，在海丰有保存至孩子成年的传统。胎发用红布包好，置于家中神龛或祖先牌位旁边，民间认为胎发是孩子「命根」，妥善保存可保孩子平安健康。","diff":"海丰城区满月酒多在酒楼举行，规模较大；农村则多在家中摆桌；客家区满月礼俗保留了更多「洗三朝」的元素，满月与三朝有时合并庆祝。"},
{"n":"出生报喜与三朝礼","py":"三朝 (Sam-tsiau)","c":"👶 人生礼仪","sc":"出生礼俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生当天及出生后第三天","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"婴儿出生后，家人立即通知亲属并祭告祖先，称「报喜」；出生后第三天举行「三朝礼」，为婴儿首次正式沐浴，标志其正式融入家族与社区。","items":"红色染色鸡蛋（报喜蛋）、姜醋（米醋加生姜）、米酒、艾草（沐浴用）、红糖、桂圆","steps":"婴儿出生后，父亲通知外婆家——送「报喜蛋」：生男丁送单数鸡蛋，生女婴送双数；祠堂祭告祖先，男丁家庭须告知族长；第三天，家人用艾草水为婴儿沐浴；外婆家携姜醋猪脚、鸡蛋等礼品前来探视；长辈为婴儿挂上长命锁；煮红糖鸡蛋分发邻里，告知喜讯。","taboo":"产房满月前不让外人随意进入；探视者不可说负面话语；带有煞气之人（如刚参加丧事者）须隔三日后方可探视。","story":"报喜鸡蛋的数量在海丰有着明确的性别信号功能：单数表示生了男孩，双数表示生了女孩。外婆家收到报喜后，依此数量准备相应的回礼，无需开口询问，是民间信息传递的智慧体现。","diff":"海丰福佬区三朝礼较为隆重，会正式宴请亲友；客家区三朝礼相对简约，但姜醋猪脚制作更为讲究；沿海渔村在三朝礼时须额外拜妈祖或送子观音。"},
{"n":"送灶君仪式","py":"送灶 (Sàng-tsàu)","c":"🎉 岁时节庆","sc":"春节前置习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十二月廿三或廿四","src":"[书A] 第三章·春节习俗；[书B] 第二章·岁时节俗","intro":"农历十二月廿三（部分地区廿四），是民间传说灶王爷上天向玉皇大帝汇报一年情况的日子。海丰人以甜食「贿赂」灶君，祈求他多言好事，是春节前最重要的准备仪式之一。","items":"灶糖（麦芽糖、糖瓜）或甜粿、茶水、灶君神像（纸印）、纸钱、香烛","steps":"是日黄昏，在灶头前摆设供品，以糖瓜、甜品为主；上香祭拜，户主诵祝词，请灶君上天多言吉祥；将旧的灶君神像连同纸钱一起焚化，象征送灶君上天；除夕夜再贴上新的灶君神像，迎灶君归位。","taboo":"供品须以甜食为主，不可供奉酸辣之物；焚化时不可说不吉利的话；灶头须保持整洁，不可在祭拜前就餐。","story":"民间流传「灶君有天眼，一年行事见」，认为灶君全年居于厨房，将家中善恶一一记录。因此用麦芽糖祭祀，一是希望甜其口，使其言好事；二是糖质粘口，使其「粘住嘴巴」不乱讲坏话。","diff":"多数地区为廿四，少数地区廿三；客家聚居区送灶仪式较为简约，福佬区则较为隆重，且灶糖品种更为丰富。"},
{"n":"拜天公（正月初九）","py":"拜天公 (Pài thinn-kong)","c":"🎉 岁时节庆","sc":"神诞节庆","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历正月初九","src":"[书A] 第五章·民间信仰；[书B] 第二章·岁时节俗","intro":"正月初九是玉皇大帝（天公）的诞辰，闽南文化圈将此日视为仅次于除夕的重要节日，又称「天公生」。海丰闽语区在此日举行盛大祭祀，供品之丰厚、香烛之多，往往超过过年。","items":"两层天公桌、五果（橘、苹果、香蕉、菠萝、甘蔗）、三牲、面线（寿面）、发糕、甜粿、大红香、天公金（特殊纸钱）、鞭炮","steps":"初八深夜起，各家开始准备供桌，须搭建至少两层的「天公桌」放于厅堂外天井或门口正对天空；初九子时准时开始祭拜，燃烛上香，供奉五果、三牲、面线；全家跪拜，户主带领诵祝词；烧化天公金；仪式结束后，家人分食供品中的面线，取长寿之意。","taboo":"天公桌须对天空（屋外或天井），不可设于室内封闭空间；祭拜期间不可口出秽语；女性例假期间不可主持祭拜；供品中不可有龟鳖。","story":"拜天公习俗在福建南部至今盛行，经闽人移民传入海陆丰。有一说法认为，初九祭天与闽南人历史上的「躲初九」传说相关：相传宋末明初闽南人曾遭兵乱，躲入甘蔗园得免，故以甘蔗为重要供品，以谢天公庇佑。","diff":"海丰福佬话区拜天公最为隆重，场面不亚于除夕；客家聚居地区则不特别重视此日，清晰体现了海丰境内福佬与客家两大文化传统的分野。"},
{"n":"除夕守岁与开正","py":"除夕守岁 (Tî-sî siú-sì)","c":"🎉 岁时节庆","sc":"春节习俗","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"农历十二月三十日至正月初一子时","src":"[志A] 第十一章·民俗风情·岁时节庆；[书A] 第三章·春节习俗","intro":"除夕是海丰人一年中最隆重的团聚节日。全家聚齐共享「团圆饭」，饭后守岁至午夜，零时「开正」迎接新年，以鞭炮驱邪迎福，是春节仪式的核心环节。","items":"团圆饭食材（整鱼、整鸡、猪肉等）、红包（利是）、鞭炮、香烛、年糕、发糕、柑橘","steps":"除夕下午，家中准备团圆饭；黄昏前备香烛祭拜祖先及门神，告知旧年已尽；全家围坐共享团圆饭，菜肴须有整鱼（年年有余）、鸡（吉祥）、猪肉（富足）；饭后小辈向长辈拜年，领取红包；子夜前后，户主点燃「开正炮」，全家焚香拜神，在厅堂摆出年糕、发糕、柑橘供神；正月初一日出后方才开门出行。","taboo":"除夕当晚不可说不吉利的话；不可打破碗碟；扫帚须在除夕前收起，初一不扫地；鱼不可吃完，须留至初一（寓意有余）。","story":"海丰的「开正」仪式在子时举行，各家燃放鞭炮争先，声势浩大。民间相信最先放炮的人家来年运势最旺，因此往往提前准备好鞭炮，一到时辰立即点燃，整个县城震天动地。","diff":"海丰客家聚居地区除夕有「围炉」习俗；沿海渔村除夕须先到码头「拜海神」再回家吃饭；城区与农村在开正鞭炮的规模上有明显差异。"},
{"n":"中元普渡","py":"中元普渡 (Tiong-guan phóo-tōo)","c":"🎉 岁时节庆","sc":"祭祀节日","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"农历七月十五（各社区按轮值日期举行）","src":"[书A] 第三章·祭祀习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"中元节（七月半）是海丰民间祭祀孤魂野鬼的重要节日，俗称「普渡」。海丰各地按宗族或地缘轮流在不同日期举行普渡，施食孤魂并祭祀祖先，整个七月热闹如月节。","items":"三牲、饭食、纸钱、元宝（纸扎）、普渡公旗帜、香烛、「魂轿」（纸扎灵屋）","steps":"各社区在轮值日期前设坛，摆放供品于街头或庙前空地；傍晚开始「开普渡」，法师或道士诵经超度亡魂；乡民依次上香，供奉饭菜、水果、糕点；入夜后焚烧纸钱、元宝及纸扎祭品；法师念经「送孤」，仪式结束；部分村落会请戏班演出七月戏（专为孤魂演的戏）。","taboo":"普渡期间不可践踏地上的灰烬；供桌上的食物须待仪式结束后方可撤收；夜间不宜在外久留；小孩、孕妇不宜参与夜间仪式；不可嘲笑或讽刺普渡活动。","story":"海丰普渡的「轮普」制度十分特别：各村各姓按农历七月不同日期轮流举行，使整个七月月月有普渡。相传这一制度源于古代避免各地普渡日期集中、造成拥挤而设，沿用至今已有数百年历史。","diff":"城区普渡以街区为单位举行，规模较大；沿海渔村则加入「海上祭」环节，为海上亡灵专设水上供桌；山区客家村落普渡规模相对较小。"},
{"n":"妈祖诞辰祭典（三月廿三）","py":"妈祖诞 (Má-tsó tuann)","c":"🎉 岁时节庆","sc":"神诞节庆","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★★ 联合国非遗登录","tm":"农历三月廿三","src":"[遗A] 联合国非遗·妈祖信俗（2009）；[书A] 第五章·民间信仰；[志A] 第十一章·民俗风情·民间神祀","intro":"农历三月廿三是海上女神妈祖的诞辰，海丰沿海各镇（鲘门、捷胜、小漠、马宫等）均有隆重庆典。是日渔民停港，沿海各妈祖庙张灯结彩，举行进香、绕境游行、演戏酬神等活动，是海丰沿海最重要的民间信仰节日之一。","items":"香烛、三牲（猪、鸡、鱼）或素果、纸钱、鞭炮、妈祖神像銮驾、仪仗旗帜","steps":"是日清晨，各渔村妈祖庙开庙门，乡民备三牲或鲜花水果前往进香；午后，庙会组织妈祖神像出巡绕境，銮驾队伍随行，锣鼓喧天；沿途各家各户设香案迎接；庙内聘请剧团演出白字戏，一般演三至五晚；入夜燃放烟花，送妈祖回庙。","taboo":"出巡期间，妇女月事期间不可触碰神像銮驾；进香时不得说不洁之语；鱼类祭品须用整条鱼，不可用切块鱼。","story":"海丰捷胜天后宫有传说：清代某年台风大作，渔船遇险，船夫向妈祖祈祷，忽见海面红光闪现，帆船得以安然入港。此后当地渔民将这一奇迹刻入庙碑，每逢台风后均会到天后宫还愿致谢。","diff":"鲘门以盛大绕境出巡著称；捷胜以戏台演出天数最多；马宫渔港则有独特的「海祭」仪式，由渔民代表驾船出海致祭。"},
{"n":"元宵节闹花灯","py":"元宵 (ghuân-siâu)","c":"🎉 岁时节庆","sc":"农历节日","lv":"L2 粤东闽语区","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"农历正月十五","src":"[志A] 第十一章·民俗风情·岁时节庆；[书A] 第三章·节日习俗","intro":"元宵节又称「上元节」，是春节后首个重要节日。海丰民间在正月十五举行各种庆典活动，以闹花灯、猜灯谜、舞龙舞狮为核心，热闹程度不亚于除夕。海丰的元宵活动多以祠堂或社区为单位组织，带有浓厚的宗族共同体色彩。","items":"花灯（各式纸灯笼）、蜡烛、鞭炮、元宵（汤圆）、糯米、糖馅","steps":"正月十五傍晚，各家悬挂花灯于门前及厅堂；入夜后，各宗族社区组织花灯游行，沿街巡游并燃放鞭炮；家中长辈煮元宵供全家食用，象征团圆；部分社区设有猜灯谜活动；子时前后燃放「收灯炮」，标志节日结束。","taboo":"灯笼不能中途熄灭，熄灭被视为不吉利；出嫁女儿当晚不宜回娘家；元宵不可剩余，须全家吃完。","story":"海丰元宵节与「上灯」习俗相关联。凡上年生有男丁的家庭，须在祠堂悬挂花灯（上灯），并摆酒席宴请亲友，向宗族报告新丁之喜。因此海丰元宵节兼具岁时庆典与宗族人丁传承的双重意义。","diff":"城区侧重花灯游行与社区文艺；渔村则在码头或庙前举行特别的「拜灯神」仪式，祈求海上平安。"},
{"n":"海陆丰童谣与谚语","py":"Hǎilùfēng tóngyáo yǔ yànyǔ","c":"🎭 戏曲与口传文艺","sc":"童谣谚语","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"日常，童谣多在儿童游戏时传唱","src":"[书A] 第八章·民间艺术；[书E] 第五章·渔民口传文艺","intro":"海陆丰地区流传大量以闽南方言（福佬话）演唱或吟诵的童谣与谚语，内容涵盖自然常识、节令习俗、道德教化、生产经验等，是口传文化的重要载体。","items":"无（口头传承）","steps":"（传承方式）：1. 由家中老人、邻里长辈在日常劳作或儿童游戏时口口相传；2. 学校教育与社区活动中有意识地保存与传授；3. 部分童谣由地方文史工作者整理出版。\n\n（常见童谣举例）：\n「月娘月光光，照我去担水；水清出好鱼，鱼肥出好子。」\n「正月正，泡灯笼；二月二，风筝满天飞……」","taboo":"无特别禁忌，但部分谚语在现代被视为带有封建观念，传授时应加以甄别。","story":"海陆丰童谣使用本地闽南方言（福佬话），保留了许多在普通话和标准闽南语中已消失的古汉语词汇和音调，具有重要的语言学研究价值。随着普通话教育的普及，方言童谣传承面临压力，地方文化部门已着手整理保护。","diff":"海丰与陆丰童谣大体相通，但部分发音与词汇因地而异；客家聚居区流传另一套客家山歌体系，与福佬童谣并行存在。"},
{"n":"海丰剪纸","py":"Hǎifēng jiǎnzhǐ","c":"🏡 传统建筑与工艺","sc":"民间工艺","lv":"L3 汕尾市专属","rg":["海丰"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节、婚庆、节日装饰","src":"[书A] 第八章·民间艺术；[志A] 第十一章·民俗风情·民间工艺","intro":"海丰剪纸是流行于海丰地区的传统民间工艺，以红纸为主料，剪出吉祥图案（如龙凤、花卉、文字）用于节日窗花、礼品装饰与民俗活动装点。已列入汕尾市级非物质文化遗产名录。","items":"红纸（或彩纸）、剪刀、刻刀、蜡光纸（底纸）","steps":"1. 在纸上打草稿或按传统图案折叠红纸；2. 用剪刀沿图案线条裁剪；3. 精细部分用刻刀在垫板上刻制；4. 展开后修整，得到镂空图案；5. 贴于窗户（窗花）、礼盒、粿品表面（粿花）或喜字贴纸；6. 婚庆场合的剪纸多为双喜、龙凤图案；春节窗花多为鱼、花、福字。","taboo":"剪纸须一气呵成，忌剪到一半停手；送人的剪纸忌剪刀图案（刀器不宜送人）。","story":"海丰剪纸与中国北方剪纸同源，但图案风格受闽南与海洋文化影响，常见渔船、鱼类、珊瑚等海洋元素，是全国剪纸艺术中的独特支脉。","diff":"海丰剪纸在汕尾地区最为活跃；陆丰、汕尾市区虽有相似习俗，但海丰剪纸工艺师最集中，传承最完整。"},
{"n":"贝灰工艺","py":"Bèihuī gōngyì","c":"🏡 传统建筑与工艺","sc":"传统建筑工艺","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"传统民居建造期间","src":"[志A] 第八章·传统工艺·建筑工艺；[书A] 第七章·居住礼俗","intro":"贝灰工艺是以牡蛎壳或蛤蜊壳经高温煅烧后制成石灰（贝灰），再用于建筑墙体抹面、加固的传统工艺。汕尾沿海民居大量使用贝灰，使墙面光洁坚硬且具防潮性，是汕尾建筑区别于内陆民居的重要特征。","items":"贝壳（牡蛎壳为主）、砖瓦、木材、土粉","steps":"1. 从海滩或养殖场收集大量牡蛎壳；2. 在专用窑炉中以高温煅烧，使贝壳分解为氧化钙（石灰）；3. 熟化：将煅烧后的贝灰加水消解，静置数日；4. 与沙子、糯米汁（部分高档建筑）混合调制成灰浆；5. 用于民居外墙抹面、砌砖填缝；6. 干燥后表面光滑洁白，防潮效果优异。","taboo":"贝灰窑烧制期间须控制温度，过高或过低均影响质量；调制灰浆时比例须准确。","story":"贝灰工艺是汕尾海洋文化与建筑工艺结合的典型产物，利用本地丰富的贝壳资源解决建材问题。海丰、陆丰现存的清代民居大量使用贝灰砌筑，至今墙体仍坚固完好。","diff":"沿海地区贝壳资源丰富，贝灰工艺保留较完整；内陆地区则以石灰（石灰岩煅烧）代替。"},
{"n":"生熟粿","py":"Shēng shú guǒ","c":"🍜 饮食民俗","sc":"传统粿食","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婚宴、满月、节庆，尤以冬节（冬至）最为集中","src":"[书A] 第六章·饮食民俗；[书C] 第六章·潮汕粿品","intro":"生熟粿是汕尾地区特有的粿食，一半用生糯米粉、一半用熟糯米粉混合制成，口感外韧内软，有特殊的米香。常见于喜庆场合与神明祭典，是汕尾饮食文化独特性的标志之一。","items":"糯米粉（生）、糯米粉（熟，即炒过的）、糖、水、馅料（可选：花生糖、芝麻糖）","steps":"1. 将一半生糯米粉与一半熟糯米粉混合；2. 加入糖与适量温水揉合成团；3. 取小份搓圆，包入馅料（如花生糖、椰蓉等）；4. 稍压扁；5. 蒸约15分钟或直接煎至两面微黄；6. 摆盘供用或分发亲友。","taboo":"制作时生、熟粉比例须均衡，否则口感不对；供神时粿须完整，不得有破损。","story":"生熟粿的制法体现了闽南人对米食加工的精细追求，生熟混合的特殊工艺使口感别具一格。在汕尾民间，生熟粿常与红桃粿、发粿配套作为喜庆「三色粿」，缺一不可。","diff":"海丰生熟粿多包花生糖馅；陆丰部分地区加入椰蓉或豆沙；市区现代化家庭制作频率已有所降低，多从专门粿店购买。"},
{"n":"甜粿（年糕）","py":"Tiánguǒ (niángāo)","c":"🍜 饮食民俗","sc":"传统粿食","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节（腊月制作，春节供奉与食用）","src":"[书A] 第六章·饮食民俗；[书C] 第六章·潮汕粿品","intro":"甜粿即年糕，以糯米粉和糖为主料蒸制而成，质地软韧，味道甜香。汕尾地区年糕称「甜粿」，是春节期间最重要的粿食之一，既作供品祭祖，又作走亲访友的礼品。","items":"糯米粉、红糖（或白糖）、水、香油（表面涂抹防黏）、芭蕉叶（垫底）","steps":"1. 将红糖溶于热水，待凉后与糯米粉混合揉成糊状；2. 倒入铺有芭蕉叶的方形模具；3. 大火蒸约1-2小时至凝固；4. 取出晾凉定形，可切块食用（冷食或煎热均可）；5. 作供品时摆于供桌；6. 走亲戚时以甜粿（搭配其他粿食）装盒相赠。","taboo":"年糕蒸制期间不得有人在旁哭泣（影响「发」）；切年糕忌逆刀（从下往上切），须顺刀。","story":"年糕谐音「年年高」，寓意生活水平年年提升。汕尾甜粿多以红糖制作，颜色红棕，与北方白色年糕有所不同，折射出南方饮食对糖的偏爱。","diff":"汕尾各地甜粿味道基本一致；部分家庭在糯米中加入芝麻或花生碎增香；惠东客家家庭年糕习惯以白糖制作，颜色偏白。"},
{"n":"发粿（huat-kué）","py":"Fāguǒ / huat-kué","c":"🍜 饮食民俗","sc":"传统粿食","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节、重大祭典、开业、乔迁","src":"[书A] 第六章·饮食民俗；[书C] 第六章·潮汕粿品","intro":"发粿（闽南语「huat」意为「发」，兼有发财、发酵之意）是以大米粉加糖、发酵蒸制而成的圆形粿食，表面开裂成花状，寓意「发」（发财、吉祥）。是汕尾祭典与喜庆场合必备的吉祥粿食。","items":"大米粉（粘米粉）、红糖或白糖、发酵粉或老面、水","steps":"1. 将粘米粉与糖混合，加水调成粉浆；2. 加入适量发酵粉，静置发酵数小时（或过夜）；3. 倒入碗形或杯形模具至八九分满；4. 大火蒸约20-30分钟至表面开裂成花状；5. 取出晾凉后可作供品或食用。","taboo":"蒸发粿时不得随意开盖（会导致「发不起」，不吉利）；开裂的花形越多瓣越吉利（「开花」象征繁荣）。","story":"发粿是闽南、潮汕及汕尾共有的粿食文化，在祭典场合中发粿与红桃粿相配，一「发」一「红」，代表财运亨通、喜庆吉祥。","diff":"各地发粿配方大同小异；汕尾部分家庭用红糖制作，颜色偏棕红，风味略有不同。"},
{"n":"汕尾粽子","py":"Shànwěi zòngzi","c":"🍜 饮食民俗","sc":"节令食品","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"端午节（农历五月初五）为制作高峰，日常亦有售卖","src":"[书A] 第六章·饮食民俗；[书C] 第六章·节令食品","intro":"汕尾粽子以糯米为主料，馅料丰富，包括咸蛋黄、猪肉、花生、香菇等，用竹叶或芦苇叶包裹后蒸煮而成。汕尾粽子偏咸鲜，体积较大，是端午节的核心食品。","items":"糯米、猪五花肉（腌制）、咸蛋黄、花生、香菇、虾米、粽叶（竹叶或芦苇叶）、棉绳","steps":"1. 提前一天将糯米浸泡、猪肉腌制；2. 粽叶提前用热水浸软；3. 将两张粽叶交叉卷成漏斗形，填入糯米，加入馅料（猪肉、咸蛋黄、花生等），再盖上糯米；4. 折叠粽叶包裹，用棉绳扎紧；5. 入锅大火蒸煮2-3小时；6. 取出晾凉后即可食用，或继续保存（冷藏可保存数日）。","taboo":"粽叶须清洗干净；煮粽过程中不得中途开盖（影响熟透均匀）。","story":"汕尾粽子融合闽南风味，猪肉、咸蛋黄为标配馅料，与北方粽子（以甜枣为主）截然不同。端午节前，家家户户包粽子，邻里互赠，是体现社区凝聚力的重要习俗。","diff":"海丰、陆丰粽子大小相近，馅料基本一致；部分家庭加入栗子或鱿鱼干增味；沿海家庭有时以海鲜（虾干、蚝干）入馅。"},
{"n":"汕尾咸茶（擂茶）","py":"Shànwěi xiánchá (léichá)","c":"🍜 饮食民俗","sc":"饮茶习俗","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"日常，尤以午后待客为主","src":"[书A] 第六章·饮食民俗；[书F] 第二章·岭南茶文化","intro":"汕尾咸茶（当地也称擂茶）是以大米、花生、茶叶、芝麻及多种蔬菜为原料，用擂钵研磨后加水煮成的咸香饮食，是汕尾最具代表性的饮食名片之一。","items":"大米（炒熟）、花生（炒熟）、茶叶（苦丁茶或绿茶）、芝麻、九层塔（罗勒）、薄荷叶、蒜、炒米、花生米、豆角粒、萝卜粒（配菜）、擂钵与擂棍","steps":"1. 将茶叶、花生、芝麻、香草放入擂钵，用擂棍顺一个方向研磨至膏状；2. 加入适量温水稀释，调成茶汤底；3. 煮沸后舀入碗中；4. 碗中加入炒米、花生米等配料；5. 客人自行加入豆角、萝卜等时蔬；6. 边擂边招待客人为最佳。","taboo":"擂茶制作时擂棍须顺同一方向旋转；供客人的配料须新鲜洁净。","story":"汕尾咸茶源自闽南移民带来的擂茶习惯，与客家擂茶同宗但配料不同。海丰、陆丰街头至今仍有专卖咸茶的摊档，是当地人日常下午的社交饮食场合。","diff":"海丰咸茶较清淡，配料以炒米花生为主；陆丰部分地区加入更多蔬菜，口感更厚重；与客家擂茶相比，汕尾咸茶米茶比例更高，口感偏咸鲜。"},
{"n":"观音信仰","py":"Guānyīn xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"全年，观音诞（农历二月十九、六月十九、九月十九）","src":"[书A] 第五章·民间信仰；[书D] 第五章·观音信仰","intro":"观音菩萨是汕尾地区崇拜最广的佛教神明，几乎家家户户皆供奉观音像（玉器或瓷器）。其三个诞辰日为重要祭祀时节，寺庙与家庭均举行祭拜活动。","items":"素供（蔬果、斋食）、香烛、花卉、功德金","steps":"1. 观音诞前日，信众在家设斋（吃素）；2. 诞辰当日清晨，携供品赴寺庙（如海丰观音堂）参拜；3. 斋食供奉，不得用荤腥；4. 祈求慈悲庇佑、化解灾厄；5. 部分信众全日持戒吃素。","taboo":"观音供桌不得摆荤食；祭拜时不得口出恶言；供花须为新鲜洁净。","story":"观音信仰融合了佛教与民间信仰，在汕尾兼具宗教与世俗双重功能。沿海渔民尤信观音保平安，部分渔船供有观音像与妈祖像，「双保险」出海平安。","diff":"汕尾各族群（闽南、客家）均信奉观音，是跨族群、跨阶层的共同信仰。城区寺庙（如汕尾市区观音庙）香火旺盛，农村多于家中设小神龛。"},
{"n":"龙王／水仙爷信仰","py":"Lóngwáng / Shuǐxiānyé xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"渔船出海前、归港后，及每年海祭","src":"[书A] 第五章·民间信仰；[书D] 第六章·龙神信仰","intro":"汕尾沿海渔民崇信海洋神明，除妈祖外，龙王（掌管海洋风浪）与水仙爷（溺海亡魂的神化，保护渔民）也是重要信仰对象。两者常合祀于海边庙宇，渔民出海前必祭。","items":"三牲、海产（鱼、虾）、香烛、金纸、炮竹、纸船（年祭时焚化）","steps":"1. 渔民出海前在庙中祭拜龙王与水仙爷，祈求风平浪静；2. 平安归港后再次致谢；3. 每年特定日期举行海祭，全村出动，鱼船在海上联列，向海神投放供品；4. 有人溺海时，请道士做「水陆法会」超度亡魂，安抚水仙爷。","taboo":"在海上不得大声呼喊同伴的名字（会引来不好的东西）；不得在海上说不吉利的话；渔船上不得翻鱼（翻船之兆）。","story":"水仙爷信仰是汕尾特有的海洋文化产物，将历史上溺海的勇士或无辜者神化，以慰藉其魂灵并祈求保护后人。龙王信仰则源自中原，经过海洋化改造后成为渔民核心信仰之一。","diff":"海丰沿海渔村（如鮜门、捷胜）龙王、水仙爷信仰极为盛行；陆丰东海镇（海滨城市）亦有类似崇拜；内陆农业区此信仰较淡薄。"},
{"n":"灶君信仰","py":"Zàojūn xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"全年驻守，送灶（农历十二月廿三）、迎灶（除夕夜）为高峰","src":"[书A] 第五章·民间信仰；[书D] 第六章·灶君信仰","intro":"灶君是家家户户供奉在厨房的神明，被视为监察家庭成员行为的「家庭神」，每年上天向玉皇大帝汇报家事。汕尾家庭在灶台旁设小神龛供奉灶君神像（纸印）。","items":"糖瓜、甜品、香烛、灶君神像（纸印）","steps":"1. 日常在灶台旁神龛供奉灶君神像，定期上香；2. 初一、十五在灶前添香；3. 十二月廿三送灶君上天（见「送灶君」条目）；4. 除夕夜迎灶君回归，贴新灶君神像。","taboo":"厨房须保持清洁，对灶君不敬；不可在灶前骂人或说脏话（灶君会记录在案上报天庭）。","story":"灶君信仰在中国有悠久历史，汕尾的灶君供奉习俗保留了完整的送灶、迎灶仪式，是中国家庭神信仰的活态传承。","diff":"汕尾各地灶君信仰基本一致；客家家庭同样供奉灶君，但神像样式与闽南系略有差异。"},
{"n":"关帝爷信仰","py":"Guāndì yé xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"全年，关帝诞（农历六月廿四）为重","src":"[书A] 第五章·民间信仰；[书D] 第六章·关帝信仰","intro":"关帝爷（关羽、关公）是汕尾商界与民间普遍崇祀的神明，象征忠义、财富与正气。商家多在店内供奉关帝，商人与社会各界均参与其诞辰祭拜。","items":"三牲（尤重猪头）、香烛、金纸、炮竹、豆腐（部分地区）","steps":"1. 关帝诞日，商家及家庭在关帝神龛前备供品祭拜；2. 点香行礼，祈求生意兴隆、义气相扶；3. 部分庙宇举行关帝出巡，信众随行护驾；4. 焚化金纸，燃放炮竹。","taboo":"关帝爷忌供奉狗肉（传说关帝不喜）；祭拜时须着装整洁，不得嬉戏。","story":"关帝信仰横跨华人世界，是商界与兄弟情义的象征。汕尾地区宗族势力与商业团体历史上与关帝信仰密切相连，部分会馆以关帝庙为集会场所。","diff":"汕尾各地关帝庙分布广泛，大小皆有；客家、闽南背景信众均参与，是跨族群共同崇祀的神明之一。"},
{"n":"玄天上帝信仰","py":"Xuántiān Shàngdì xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"全年，玄天上帝诞（农历三月初三）尤为隆重","src":"[书A] 第五章·民间信仰；[书D] 第六章·玄天上帝","intro":"玄天上帝（北帝、真武大帝）是汕尾地区重要的地方守护神之一，多处乡村建有玄天上帝庙（北帝庙）。其形象为披甲仗剑、脚踩龟蛇，被视为驱邪、镇水、护航之神，渔民尤为崇信。","items":"三牲五果、香烛、金纸、炮竹、神诞时的醮会物品","steps":"1. 农历三月初三玄天上帝诞，庙宇举行隆重祭典；2. 信众携香烛供品至庙参拜；3. 道士主持醮仪，演出白字戏或正字戏酬神；4. 渔船出海前，渔民至庙祈求航行平安；5. 部分村落每年举行玄天上帝出巡活动。","taboo":"玄天上帝庙内不得带入不洁之物；庙门前不得随意争吵；女性生理期部分庙宇有限制。","story":"玄天上帝信仰在闽南沿海地区根深蒂固。汕尾作为海洋城市，渔民出海风险高，对能镇水护航的玄天上帝格外虔诚，部分渔船船头会供奉其神像。","diff":"海丰、陆丰沿海渔村的玄天上帝庙香火最旺；内陆地区香火较淡。"},
{"n":"土地公信仰","py":"Tǔdìgōng xìnyǎng","c":"🙏 民间信仰","sc":"神明信仰","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"全年，尤以初二、十六（做牙）为重","src":"[书A] 第五章·民间信仰；[书D] 第六章·土地神信仰","intro":"土地公（福德正神）是汕尾分布最广的地方神明，几乎每个村落、街道、店铺皆有土地公神位。其职责为守护地方土地、保佑农业丰收与商业顺遂。","items":"三牲、果品、香烛、金纸、炮竹","steps":"1. 每月初二、十六在土地公神龛前摆设供品；2. 点香祭拜，祈求生意兴旺或五谷丰登；3. 焚化金纸；4. 部分家庭每日晨起在神龛前上一炷香；5. 逢土地公诞（农历二月初二）举行较大规模祭典。","taboo":"土地公神龛不得置于污秽之处；香火不得断绝（须定期更换香烛）。","story":"土地公信仰在中国南方极为普遍，汕尾土地公庙数量众多，大者为独立庙宇，小者仅为路边小石龛。渔民出海前亦会拜土地公，请其与海神共同庇护。","diff":"闽南系家庭土地公与灶君并重；客家背景家庭也供奉土地公，但通常称「伯公」，形制略有差异。"},
{"n":"元宵乞龟","py":"Yuánxiāo qǐ guī","c":"🎉 岁时节庆","sc":"节庆习俗","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历正月十五（元宵节）","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"元宵节庙会期间，汕尾部分地区有「乞龟」习俗，即向神明借取龟形供品（米龟、糖龟或发粿龟），以求子嗣、健康、财运，来年须加倍归还，以示诚信与感恩。","items":"米龟（糯米制成的龟形糕点）、糖龟或发粿龟、香烛、炮竹","steps":"1. 元宵节庙会时，庙方将大型米龟或糖龟摆于供桌供信众乞求；2. 信众向神明许愿，同时「借」走龟形供品；3. 次年元宵节，信众须将原物加倍归还（即归还两只），表示许愿已灵验；4. 乞到的龟可食用，食之寓意得神赐福寿。","taboo":"借龟须诚心许愿，不可戏弄神明；借了须还，不还视为失信于神。","story":"乞龟习俗在台湾、澎湖、闽南及汕尾闽南系社区广泛流行，龟象征长寿与福气。汕尾的乞龟活动规模较台湾小，但闽南色彩鲜明，体现了海洋移民文化的传承。","diff":"汕尾城区元宵乞龟活动集中在主要庙宇（如城隍庙、妈祖庙）；农村小庙则视庙方财力决定是否举办。"},
{"n":"尾牙","py":"Wěiyá","c":"🎉 岁时节庆","sc":"节庆祭拜","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十二月十六（土地公诞，一年最后一次「做牙」）","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"汕尾闽南系商家每月初二、十六须祭拜土地公，称「做牙」。十二月十六为全年最后一次做牙，称「尾牙」，商家须设宴款待员工，寓意感谢一年辛劳。","items":"三牲（鸡、猪肉、鱼）、果品、香烛、金纸、酒席（宴请员工用）","steps":"1. 商家于店门口或公司设供桌，祭拜土地公；2. 焚香烧纸，祈求来年生意兴隆；3. 当日晚间设「尾牙宴」，老板宴请全体员工；4. 席间老板感谢员工一年付出，员工领取年终奖（红包）；5. 部分商家会在宴席上暗示辞退员工（传统上以鸡头朝向暗示，现已不常见）。","taboo":"尾牙宴不得席间争吵；员工须出席以示尊重；供桌上的鸡不得缺席（鸡为土地公必备供品）。","story":"做牙习俗源自闽南地区对土地公的崇拜，土地公（福德正神）是汕尾地区最普遍的地方神之一。尾牙宴在台湾、闽南商业文化中极为盛行，汕尾受闽南移民影响亦保留此俗。","diff":"汕尾本地商家尾牙宴规模参差不齐，大企业宴会丰盛，小商户或仅祭拜土地公而不设大型宴席。"},
{"n":"重阳节登高","py":"Chóngyáng jié dēnggāo","c":"🎉 岁时节庆","sc":"传统节庆","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历九月初九","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"重阳节（农历九九）汕尾民间有登高、扫墓、食重阳糕（九层糕）的习俗。登高望远寓意辟邪避祸、健康长寿，同时有部分宗族在重阳进行扫墓祭祖。","items":"重阳糕（九层糕）、菊花酒或茶、野外食品（如有登山野餐）","steps":"1. 清晨家庭食重阳糕；2. 相约亲友登附近山丘（海丰黄羌林场、陆丰大安山等）；3. 山顶眺望，插茱萸（或菊花）；4. 部分家庭在重阳扫墓，清理祖坟；5. 傍晚团聚共食，长辈为主角。","taboo":"重阳扫墓须选上午进行；忌在墓地喧闹嬉戏。","story":"重阳登高习俗源自东汉桓景登山避瘟疫的传说。汕尾地区背山面海，登高传统历来盛行，近年来已结合现代户外运动文化，成为亲子活动的重要时节。","diff":"惠东山区地势较高，登高活动尤为普遍；汕尾市区家庭则多以公园游览代替真正登山。"},
{"n":"中秋节","py":"Zhōngqiū jié","c":"🎉 岁时节庆","sc":"传统节庆","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历八月十五","src":"[书A] 第三章·节日习俗；[书C] 第二章·岁时民俗","intro":"汕尾中秋节以赏月、拜月、提灯笼、食月饼与芋头为主要习俗，其中海丰地区的中秋「烧塔」（烧瓦塔）活动尤具地方特色。","items":"月饼、芋头（蒸熟）、柚子、水果、香烛（拜月用）、灯笼（竹制或纸扎）、瓦片（烧塔用）、木柴","steps":"1. 白天家庭购置月饼、芋头、柚子等节品；2. 傍晚在庭院或屋顶摆供桌，向月亮祭拜（拜月），祈求家庭圆满；3. 孩子提灯笼游街；4. 夜间家人聚在庭院赏月，分食月饼与芋头；5. 青少年在空旷处用砖瓦搭成高塔，在塔内燃烧木柴，烧至通红，称「烧瓦塔」，塔烧得越旺越吉利。","taboo":"供品中的月饼须待拜月完毕方可食用；孕妇传统上不参与「烧塔」。","story":"烧塔习俗据说源自元末反元起义，以烧塔为信号，后演变为中秋民俗活动。汕尾烧塔在海丰乡村尤为盛行，已列入地方非物质文化遗产。","diff":"海丰农村烧塔活动最为热烈；汕尾城区已逐渐以放孔明灯代替；惠东客家聚居区中秋以吃月饼、赏月为主，无烧塔习惯。"},
{"n":"七夕拜七娘妈","py":"Qīxī bài Qīniángmā","c":"🎉 岁时节庆","sc":"节庆祭拜","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历七月初七","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"七夕节，汕尾闽南系家庭祭拜七娘妈（七仙女，儿童保护神）。家中有未满十六岁子女的家庭尤为重视，家长为孩子向七娘妈祈求健康与庇佑。","items":"七色花、针线（女孩）、胭脂水粉、糖果饼食、水果、香烛","steps":"1. 傍晚在庭院或门前摆设供桌，面朝天空（七娘妈在天上）；2. 摆放七盅茶、七双筷（供七位仙女）；3. 点香烛，家主或母亲带孩子向七娘妈行礼祷告；4. 家中已满十六岁的孩子须参拜辞谢（出花园礼的延伸）；5. 焚化纸扎七娘妈亭（纸制轿辇）；6. 孩子穿针乞巧（女孩为主）。","taboo":"祭拜七娘妈须在户外或朝天处，不得在室内向神像拜（七娘妈居天上）；不得以荤腥供奉（部分地区）。","story":"七娘妈信仰是闽南文化的特色节俗，汕尾保留了完整的七夕祭拜传统。与北方七夕主要强调牛郎织女故事不同，汕尾七夕以儿童保护神祭拜为核心，与出花园成年礼密切相连。","diff":"汕尾沿海地区七夕祭拜保留较完整；城区年轻家庭多已转为现代情人节庆祝方式。"},
{"n":"贴春联","py":"Tiē chūnlián","c":"🎉 岁时节庆","sc":"春节习俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"除夕当日（午后至傍晚）","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"除夕下午，汕尾各家在大门、房门、窗户贴春联、门神画与横批，辞旧迎新，祈福纳祥。汕尾春联兼用汉字书写，内容多为祈求平安、丰收、发财之吉语。","items":"红纸春联（书法或印刷）、门神画、福字、浆糊或胶带","steps":"1. 除夕上午购买或书写春联；2. 先将旧春联揭除（若有）；3. 大门正门贴门神（两幅武将画像），中间贴横批；4. 两侧贴对联（上联在右，下联在左）；5. 门内侧、窗户贴「福」字（可倒贴，寓意「福到」）；6. 牛栏、猪圈、灶台等亦各贴专用小春联。","taboo":"春联颜色须为红色；家有丧事者当年不贴红色春联（改贴绿色或黄色，服丧第二年贴黄色，第三年起恢复红色）；贴歪了不吉利。","story":"春联起源于古代「桃符」，辟邪祈福。汕尾闽南系家庭历来重视春联，大户人家多请当地书法名家书写，是展示文化品位的时机。","diff":"汕尾城区春联多为印刷品；农村老宅仍有手写春联传统；客家背景家庭对联内容有时融入客家吉语。"},
{"n":"除夕围炉","py":"Chúxī wéilú","c":"🎉 岁时节庆","sc":"春节习俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十二月最后一天（除夕）晚上","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"除夕夜，全家不论离家多远必须赶回，围坐一桌共食年夜饭，称「围炉」。此为汕尾家庭一年中最重要的团聚时刻，菜肴种类有严格讲究，各道菜均有吉祥寓意。","items":"全鸡（寓意全家福）、鱼（年年有余）、猪肉、丸子（团圆）、长寿面、发粿、甜粿、蔬菜、酒、红包（压岁钱）","steps":"1. 下午家人共同备菜；2. 傍晚先祭祖（摆供桌上香），请祖先共享除夕；3. 入夜全家围坐，按长幼入席；4. 家主先向长辈敬酒祝辞；5. 共食年夜饭，饭桌上鱼不翻（寓意「年年有余不断」）；6. 饭后长辈给晚辈发压岁钱（红包）；7. 守岁至午夜，燃放鞭炮迎新年；8. 除夕夜灯火不熄，象征年年红火。","taboo":"除夕夜不得催债；饭桌上鱼不得翻转；不得打破器物；不得说不吉利话。","story":"围炉之名源自古代冬夜围火取暖进食，后演变为家族团聚的象征。汕尾地处海边，年夜饭少不了海鲜，与内地习俗形成鲜明对比。","diff":"沿海家庭年夜饭以海鲜为主菜；山区农村以猪肉、鸡为核心；城区家庭逐渐加入广式菜肴。"},
{"n":"送灶君（谢灶）","py":"Sòng Zàojūn","c":"🎉 岁时节庆","sc":"节庆祭拜","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历十二月廿三（小年夜）","src":"[书A] 第三章·节日习俗；[书D] 第六章·灶君信仰","intro":"农历十二月廿三，汕尾各家祭拜灶君，为其送行上天庭向玉皇大帝汇报家事，称「送灶君」或「谢灶」。希望灶君「上天言好事，下界保平安」。","items":"糖瓜（麦芽糖）、甜品、茶水、香烛、灶君神像（纸印）、金纸、马料（象征给灶君坐骑的饲料，用纸折成）","steps":"1. 下午在灶旁摆设供桌；2. 供奉糖瓜与甜品（意在粘住或甜化灶君嘴巴，使其上天只说好话）；3. 点香烛，家主向灶君祷告，请其上天多言好事；4. 焚烧灶君神像与马料，象征灶君乘马上天；5. 除夕时再迎接灶君归来，贴新灶君像。","taboo":"祭灶时须在厨房灶旁进行；忌用荤腥（部分地区灶君为素食神）；妇女主持祭灶在部分家庭为禁忌（传统认为灶君为男性）。","story":"灶君信仰在中国各地广泛存在，汕尾的送灶习俗具有鲜明闽南特色，用甜食「贿赂」灶君的做法体现了民间宗教的实用主义色彩。","diff":"汕尾闽南系家庭送灶规模较大；部分客家背景家庭在廿四日送灶（与广府地区同日）。"},
{"n":"正月初九拜天公","py":"Zhēngyuè chūjiǔ bài Tiāngōng","c":"🎉 岁时节庆","sc":"节庆祭拜","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历正月初九子时（午夜12点）起","src":"[书A] 第三章·节日习俗；[书B] 第二章·岁时节俗","intro":"正月初九是玉皇大帝（天公）圣诞，汕尾闽南系家庭于初八夜子时前后举行隆重祭拜仪式，称「拜天公」。这是春节期间最重要的祭祀活动之一，规模盛大，彻夜进行。","items":"五牲（全鸡、全鱼、猪肉、猪肝、鸡蛋）、甜粿、发粿、红龟粿、寿面、清茶、甘蔗（须带叶两根竖立桌旁）、鲜花、香烛、金纸、炮竹","steps":"1. 初八傍晚开始准备供桌，桌上垫甘蔗，象征节节高升；2. 子时一到，全家燃放鞭炮，点香烛，主祭者（通常为家主）带领全家向天公行跪拜礼；3. 斟茶三巡，焚化金纸；4. 祈求一年平安顺遂；5. 仪式完毕，供品留至天明，家人方可分食；6. 初九白天仍保持敬肃，不可打骂争吵。","taboo":"初九不得晾晒内衣裤（对天公不敬）；忌说脏话；甘蔗须选有头有尾的完整节。","story":"拜天公习俗在闽南与台湾极为盛行，据说因历史上某次福建人在初九躲入甘蔗园中得以躲避兵祸，事后感谢天公庇佑，故以甘蔗为贡品并沿袭至今。","diff":"汕尾闽南系家庭拜天公形式与闽南、台湾基本一致；客家背景家庭此日祭拜规模相对较小。"},
{"n":"做生日","py":"Zuò shēngrì","c":"🏠 宗族与日常礼节","sc":"日常礼仪","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"本人农历生日当天","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"汕尾民间以农历生日为准，称过生日为「做生日」。逢十岁大寿（六十、七十、八十岁）须隆重庆贺，称「做大寿」，子女须提前送寿面、寿桃粿、寿屏等礼品。","items":"寿面（长寿面）、寿桃粿（桃形粿）、猪脚炖蛋、寿糕、红蛋、酒席","steps":"1. 家人为寿星准备寿面，须整根不断；2. 寿星早餐食寿面与红蛋；3. 子女、亲族送礼祝寿；4. 大寿时设宴，亲族携寿礼来贺；5. 寿星向祖先上香禀告；6. 宴席末上寿糕，众人唱寿（或现代生日歌）；7. 分发寿糕给亲邻。","taboo":"寿面不得折断；忌提「老」字（改称「寿」）；忌在生日当天争吵。","story":"汕尾做生日习俗体现「寿」文化核心，长寿面象征长寿连绵，桃形寿粿源自王母蟠桃典故。逢大寿，儿女回乡省亲，是加强家族联系的重要时机。","diff":"城市家庭逐渐转为西式蛋糕庆生，但老一辈仍坚持寿面、寿粿等传统；农村家庭大寿仍多设流水席。"},
{"n":"正月初一诸禁忌","py":"Zhēngyuè chūyī zhū jìnjì","c":"🏠 宗族与日常礼节","sc":"岁时禁忌","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历正月初一全天","src":"[书A] 第三章·节日习俗；[志A] 第十一章·民俗风情·岁时节庆","intro":"汕尾民间正月初一有大量禁忌，涉及言语、饮食、行为各方面，目的在于以好兆头开启新年，避免引来厄运。","items":"无","steps":"禁忌清单（须严格遵守）：\n1. 忌扫地（会扫走财气），须提前将垃圾扫至屋角，初二再出门倒；\n2. 忌洗头（洗去福气）、忌洗衣；\n3. 忌说不吉利话（死、病、破、穷等）；\n4. 忌哭泣；\n5. 忌催债或还债；\n6. 忌打骂孩子；\n7. 忌吃药（非急症）；\n8. 忌动刀剪（部分家庭）；\n9. 忌打破器物（若碎须说「碎碎平安」或「落地开花」）；\n10. 忌午睡（懒惰一整年）。","taboo":"以上皆为禁忌本身。","story":"这些禁忌大多可追溯至古代阴阳五行观念，认为岁首日的行为具有预兆性，会影响全年运势。汕尾地区自清代以来持续保留这些习俗，并口耳相传至今。","diff":"各家执行程度不一，老一辈遵守较严格，年轻一代城市家庭多已放宽，仅保留不扫地、说吉祥话等核心禁忌。"},
{"n":"开口吉（开嘴吉）","py":"Kāikǒu jí","c":"🏠 宗族与日常礼节","sc":"日常礼仪","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"新年第一天（正月初一）、开工、开业、乔迁等重要起始日","src":"[书A] 第三章·节日习俗；[书C] 第二章·岁时民俗","intro":"汕尾民间重视「开口吉」，即在重要时刻或日子的第一句话、第一件事须为吉利内容，以求全年顺遂。正月初一尤为讲究，起床第一句话须说吉祥话，忌讲不吉利的词语。","items":"无特别物品，主要为语言行为规范","steps":"1. 正月初一起床后，家中长辈率先说吉祥话（如「新年大吉」、「恭喜发财」）；2. 晚辈向长辈拜年，长辈回以吉言并给红包；3. 当日忌说「死」、「病」、「穷」等不吉利词语；4. 开工、开业第一天，老板须先说开工顺利之语，员工齐声应和。","taboo":"初一不得说负面词语；不得哭泣；不得催债；忌打破器物（若碎则须说「碎碎平安」化解）。","story":"开口吉折射出汕尾民间相信言语具有预兆功能的信仰观念，认为起始时刻的语言会影响此后走势。这一观念与闽南「起头」文化一脉相承。","diff":"各地大同小异，部分海丰老城区家庭习惯在初一清晨先拜神，说完祝神之语再与家人互道吉祥。"},
{"n":"族谱修撰","py":"Zúpǔ xiūzuǎn","c":"🏠 宗族与日常礼节","sc":"宗族文化","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"每隔数十年修一次，通常于宗族兴旺或重大纪念时启动","src":"[书A] 第二章·宗族礼俗；[书G] 第四章·宗族文献与族谱","intro":"汕尾各宗族定期修撰族谱（家谱），记录家族世系、迁徙历史、功名人物和族规家训。修谱被视为宗族大事，须全族捐资参与。","items":"旧族谱（参考底本）、文房四宝、族人名单、历史资料","steps":"1. 族长召集族中文人，成立修谱委员会；2. 收集各支系户口与世系资料；3. 寻访年长族人核实口述历史；4. 编写入谱，包括世系图、人物传记、迁徙记录；5. 印刷或抄写成册；6. 举行「谱成」仪式，祭告祖先，宴请族人；7. 将族谱存于宗祠，部分分发各支系珍藏。","taboo":"族谱不得随意丢弃或出卖；外姓人不得借阅（部分宗族规定）；入谱须经核实，不得伪造世系。","story":"汕尾地区族谱修撰风气盛行，尤以陈、林、叶诸大姓为甚。改革开放后，各宗族掀起修谱热潮，不少族谱详细记录了从闽南迁入汕尾的路线与年代。","diff":"客家宗族（如惠东部分地区）族谱格式与闽南系略有差异，客家谱更强调远祖溯源至中原。"},
{"n":"宗祠年祭","py":"Zōngcí niánjì","c":"🏠 宗族与日常礼节","sc":"祭祖礼俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"冬至或正月初（各族不同）","src":"[书A] 第二章·宗族礼俗；[书G] 第三章·华南宗族制度","intro":"各姓氏宗族于每年特定日期在宗祠举行大规模祭祖仪式，称「宗祠年祭」或「祠堂祭祖」。全族男丁须到场，共同向列祖列宗行礼，议定族务，分享祭品。","items":"三牲五果、金银纸、香烛、全猪（整头祭猪）、酒","steps":"1. 族长或理事提前通知各家；2. 宗祠打扫清洁，重新上香；3. 全体男丁集合，按辈分排列；4. 族长主祭，带领众人三拜九叩；5. 宣读祭文，追念先祖；6. 焚烧纸钱；7. 祭品（猪肉等）按户均分，称「分胙」；8. 族长主持族务会议（商议公产、婚事、纠纷等）。","taboo":"女性传统上不进宗祠参与主祭（部分宗族已改变）；外姓人不得入主祭列；衣着须整洁，忌穿破烂衣物。","story":"汕尾各大姓氏（陈、林、叶、彭等）均有历史悠久的宗祠，部分建于明清，是地方权力与文化认同的象征。宗祠年祭是维系族群凝聚力的核心机制。","diff":"海丰城区宗祠祭祀已融入现代形式，部分加入普通话发言；陆丰农村保留较传统形式。"},
{"n":"公妈厅祭祖","py":"Gōngmā tīng jìzǔ","c":"🏠 宗族与日常礼节","sc":"祭祖礼俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"春节、清明、冬至、忌日（祭日）","src":"[书A] 第二章·宗族礼俗；[书G] 第三章·华南宗族制度","intro":"汕尾闽南系民众将供奉祖先牌位的厅堂称为「公妈厅」（祖先厅）。每逢重大节日或祖先忌日，家族成员聚集公妈厅，焚香祭拜，供奉饭菜，以维系家族纽带。","items":"香烛、三牲（鸡、猪肉、鱼）或五牲、果品、粿品（红桃粿、甜粿）、酒茶、金银纸","steps":"1. 由主妇或长子备办供品；2. 在祖先牌位前摆设供桌；3. 点香烛，烧香三炷，向祖先禀告节令或请安；4. 斟茶斟酒三巡；5. 焚烧金纸银纸（纸钱），象征向祖先输送财富；6. 撤供后家人共食，称「食祖」。","taboo":"供品须用奇数（三样或五样）；祭祖前家中不得大声喧哗；月经期妇女部分地区习俗不参与上香。","story":"公妈厅是闽南移民文化的核心标志，汕尾闽南系村落几乎家家皆有，是区别于客家「神主堂」和广府「祖宗香炉」的独特空间。清代海禁解除后，大批闽南人定居汕尾，将此习俗完整带入。","diff":"惠东客家聚居村落以「香火堂」代替公妈厅，供奉形式略有差异。"},
{"n":"汕尾丧葬礼俗","py":"Shànwěi sānggzàng lǐsú","c":"👶 人生礼仪","sc":"丧葬礼俗","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"人去世后，依传统流程进行","src":"[书A] 第四章·丧葬礼俗；[志A] 第十一章·民俗风情·礼仪习俗","intro":"汕尾地区传统丧葬礼俗融合闽南与客家元素，程序繁复，体现对先人的敬重与对生死的传统观念。主要包括：初终、报丧、入殓、守灵、出殡、下葬等环节。","items":"寿衣、棺木、香烛纸钱、孝服（麻布或白布）、供品、哭丧鼓乐、白字戏或正字戏（大户人家）","steps":"1. 初终：弥留时家人守候，断气后停止钟表（部分习俗），烧「落气纸」；2. 报丧：派人通知亲族，亲族须尽快赶来；3. 沐浴更衣：为亡者净身着寿衣；4. 入殓：择吉时将遗体移入棺木；5. 守灵：子女轮流守夜，设供案燃香烛，请道士或僧尼做法事；6. 出殡：择日发丧，沿途放鞭炮，白字戏班或锣鼓队随行；7. 下葬或火化：择风水宝地安葬；8. 祭七：每七天祭一次，共七七四十九天；9. 做百日、周年祭。","taboo":"孝子服丧期间不得参加喜庆活动；探视灵堂须带香；孕妇不宜进入灵堂；不可在棺前照镜。","story":"汕尾丧葬礼俗深受闽南文化影响，同时融入本地海洋文化特色。渔民家庭若有人葬身海中，则需请道士做「招魂」仪式，以纸船替代遗体下葬。","diff":"海丰、陆丰城区已普遍转向火葬；农村及老一代家庭仍保留土葬与全套礼俗。惠东客家聚居区在白事音乐上偏用客家山歌，与闽南系不同。"},
{"n":"过大礼（订婚礼）","py":"Guò dàlǐ","c":"👶 人生礼仪","sc":"婚嫁礼俗","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"婚前数月，择吉日","src":"[志A] 第十一章·民俗风情·礼仪习俗；[书A] 第四章·婚嫁习俗","intro":"汕尾传统婚俗中，正式婚礼前男方需向女方家送聘礼，称「过大礼」（也称「担礼」）。这是婚约最重要的确认仪式，礼品种类与数量反映男家诚意与经济实力。","items":"聘金（礼金）、猪肉（成对）、海味干货（鱿鱼、虾米等）、饼食（汕尾大饼）、布匹或成衣、槟榔（部分地区）、红蛋、喜糖、红烛、香","steps":"1. 双方家长择吉日；2. 男方备齐礼品，以红纸封包，用担箩或礼箱送往女家；3. 女家设茶款待来客；4. 女家收礼后回赠部分礼品（称「回礼」），通常为饼食、新郎衣物等；5. 双方确认婚期；6. 女家将收到的饼食分发亲族，告知婚事已定。","taboo":"礼品数量须成双；忌用单数；忌在对方家中谈及不吉利事。","story":"过大礼是古代「六礼」中「纳征」礼的遗存。汕尾地区因靠近潮汕，聘礼习俗与潮汕相近，但海丰、陆丰山区家庭聘礼相对简化，沿海富裕渔村则更为隆重。","diff":"海丰城区聘礼以现金为主，辅以饼食；陆丰农村保留较完整的实物礼品传统。"},
{"n":"出花园（做十六岁）","py":"Chū huāyuán","c":"👶 人生礼仪","sc":"成年礼","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"农历七月初七（七夕）","src":"[书A] 第四章·人生礼仪；[书B] 第三章·人生礼俗","intro":"汕尾地区将青少年的成年礼称为「出花园」，于虚岁满十五岁（或实岁十六岁）的七夕日举行。仪式标志着孩子从「花园」（童年保护期）中走出，正式成人。信奉七娘妈（织女）为儿童守护神，出花园即向七娘妈辞谢保护。","items":"五色花（鸡冠花、秋葵花等）、新衣新鞋、猪脚炖鸡蛋、甜品汤圆、供品（香烛果品）","steps":"1. 当日清晨，主角（做十六岁的孩子）沐浴，用五色花水洗澡以示净化；2. 换上新衣新鞋，男穿长裤，女穿裙；3. 家人在厅堂摆设供桌，祭拜七娘妈，感谢其多年庇护；4. 主角向父母及长辈行礼；5. 全家吃猪脚炖鸡蛋（猪脚象征踏实前行），晚间设宴庆贺；6. 从此主角可参与成人事务，不再戴护身符童锁。","taboo":"仪式当日主角不宜哭泣；不得让外人踩踏供品摆设区域。","story":"出花园习俗在潮汕、汕尾地区普遍存在，七娘妈信仰源自七夕牛郎织女传说，相信七娘妈在孩子十五岁前一直在「花园」中保护他们，十六岁出园意味着独立。","diff":"汕尾与潮汕核心区习俗高度相似，但汕尾闽南系家庭会额外备「春饭」（盛满的米饭碗）象征富足。"},
{"n":"做四月日（百日礼）","py":"Zuò sì yuèrì","c":"👶 人生礼仪","sc":"诞生礼","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生后第100天前后","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"部分汕尾家庭在婴儿出生约四个月（农历）或100天时设小宴，称「做四月日」，规模小于满月礼，主要为娘家再次探视婴儿，带来补品与新衣。","items":"新衣、补品、红蛋或粿品","steps":"1. 娘家在婴儿百日前后携礼探视；2. 父家备简单饭食款待；3. 长辈为婴儿佩戴长命锁或银手镯。","taboo":"百日以内婴儿不宜久处人多嘈杂之地。","story":"百日礼在汕尾部分地区保留，部分家庭视经济条件酌情举行，近年来城市家庭逐渐简化或与满月合并。","diff":"陆丰部分乡村保留此习俗较完整；汕尾市区城镇家庭多已简化。"},
{"n":"做满月","py":"Zuò mǎnyuè","c":"👶 人生礼仪","sc":"诞生礼","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东","深汕合作区"],"st":"🟡 部分完成","cr":"★★★ 学术专著与期刊","tm":"婴儿出生满一个月","src":"[书A] 第四章·人生礼仪；[志A] 第十一章·民俗风情·礼仪习俗","intro":"婴儿出生满一个月时，家族设宴庆贺，称「做满月」。娘家须送来红蛋、红桃粿、满月衣等礼品，父家则设酒席答谢亲族，并向邻里分发红蛋。","items":"红蛋（染红的熟鸡蛋）、红桃粿、满月衣（新衣）、银锁、酒席食材","steps":"1. 婴儿满月前，娘家准备礼品送来；2. 父家设酒席，邀请亲族长辈；3. 长辈为婴儿取乳名或大名；4. 家人为婴儿剃满月头（留胎毛），胎毛可制成毛笔留念；5. 向邻里分发红蛋，告知喜讯；6. 设宴款待宾客。","taboo":"未满月的婴儿不宜随意抱出门；送礼忌送单数。","story":"满月礼源自古代「弥月」之礼，象征婴儿已度过最脆弱的阶段，正式被家族认可接纳。汕尾沿海家庭尤重此礼，视为家族添丁的重要节点。","diff":"内陆与沿海差异不大，但渔民家庭会额外祭拜海神，祈愿孩子长大后出海平安。"},
{"n":"正字戏","py":"Jìngzì xì","c":"🎭 戏曲与口传文艺","sc":"传统戏曲","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★★★ 国家省级非遗与方志","tm":"年节、庙会、红白喜事","src":"[遗A] 国家级非遗名录·正字戏；[志A] 第十章·文化艺术·戏曲","intro":"正字戏是流行于海丰、陆丰一带的传统戏曲，以中州官话（正音）演唱，故称「正字」。是现存最古老的南戏剧种之一，与白字戏共称「海陆丰双璧」，2006年列入国家级非物质文化遗产名录。","items":"戏服、脸谱、文武场乐器（锣、鼓、弦索）","steps":"1. 正字戏演出前须祭台（祭戏神田元帅）；2. 按剧目排场，文戏以唱功为主，武戏以打功见长；3. 演出多与庙会、宗族祭典同期举行；4. 演出后谢神落台。","taboo":"开台前不得随意踩踏戏台；演员化妆后不得以真名相呼。","story":"正字戏渊源于宋元南戏，随中原移民南迁带入海陆丰。明清时期在当地繁盛，至今仍保留大量古老曲牌与排场，被戏曲学者誉为「南戏活化石」。","diff":"海丰与陆丰正字戏在腔调和武打风格上略有差异，海丰偏文、陆丰偏武。"},
{"n":"汕尾侨乡习俗传播","py":"Suann-bí Kiâu-hiong sip-siok tsuân-pò","c":"🌏 侨乡与海外传播","sc":"海外华人 / 闽南俗海外保存","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟡 部分完成","cr":"★★ 地方志与田野调查","tm":"全年；重要节点为春节、清明（海外侨亲回乡祭祖季）","src":"[书A] 第一章·概论；[书G] 第五章·海外华侨与地方宗族","intro":"汕尾（海陆丰）是著名侨乡，历史上大批居民移居东南亚（马来西亚、泰国、印尼、新加坡）及香港、台湾。海外海陆丰华人建立同乡会、妈祖庙、三山国王庙，并在海外保留了白字戏班、海陆丰方言歌谣等传统。每年清明前后，大批海外侨亲回乡祭祖，带动故乡民俗的活化与经济发展。","items":"（海外保留）妈祖神像、三山国王神像、白字戏道具、海陆丰传统食谱（红桃粿、鱼丸等食材）","steps":"海外习俗保留机制：\n1. 同乡会组织：海外各地海陆丰华人成立同乡会（如马来西亚「海陆丰同乡会」），定期举办同乡聚会，维系乡音乡俗。\n2. 庙宇移植：在海外重建妈祖庙、三山国王庙，将故乡神明香火带出，于海外神诞日举行游神，保留原乡仪式形式。\n3. 白字戏传承：马来西亚、泰国等地华人社区保留白字戏班，于节庆演出，但因缺乏新血，多数已停演或转为录像播放。\n4. 食俗保留：红桃粿、鱼丸等传统食品在海外华人聚居区得以保留，部分已发展为商业品牌。\n5. 回乡祭祖：清明节前后，海外侨亲大批回乡，参与宗族扫墓，将海外带来的供品（洋酒、进口烟、海外糖果）与本地三牲并列供奉，形成「中外合璧」的祭祖供品格局。","taboo":"海外侨亲回乡参与祭祀须遵守本地仪式规矩，不可将海外「改良」做法随意引入；捐款修缮庙宇须经宗族同意，不可单方面改变神像或庙宇格局；不可将供奉海外神明的香灰随意带离（须得庙祝允许）。","story":"汕尾侨乡史始于明清时期，海陆丰人因战乱、饥荒和经济压力大批下南洋。彭湃（海丰人，中国共产党早期领导人）的革命活动使海丰在20世纪留下特殊历史印记，也因此导致部分家庭在政治压力下移居海外。海外海陆丰华人对故乡文化的坚守，往往比本地更为执着——一些已在马来西亚失传的白字戏剧目，反而在海外华人录像资料中得以保存。","diff":"马来西亚槟城、吉隆坡海陆丰华人聚集区保留最完整的三山国王信仰和妈祖信仰，部分庙宇有百年历史；泰国曼谷海陆丰华人以商贸为主，民俗保留程度次之；香港新界围村有部分海丰移民后裔，将下山虎建筑风格带入香港传统村落；台湾亦有少量陆丰移民，集中于屏东、高雄一带，多已融入闽南主流文化。"},
{"n":"下山虎民居","py":"Hā-suann-hóo（海陆丰话）","c":"🏡 传统建筑与工艺","sc":"民居建筑 / 合院式布局","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区","惠东"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"常年可见；传统建造多在冬季农闲时期动工","src":"[书A] 第七章·居住礼俗；[志A] 第八章·传统建筑","intro":"「下山虎」是汕尾（海陆丰）地区最具代表性的传统民居格局，平面形如下山老虎而得名。建筑以两侧「虎耳」（厢房）和中央「虎口」（天井-正厅）为核心，形成三合院格局，通风采光良好，适应岭南湿热气候。现存大量清代至民国时期的下山虎古宅，是汕尾重要的文化遗产。","items":"（建造用）青砖或红砖、杉木梁架、贝灰（蚝壳烧成，替代石灰）、琉璃瓦、卵石（铺地用）、彩绘颜料（用于门楼彩绘）","steps":"格局说明（非建造步骤）：\n1. 下山虎标准格局为「一厅二房」：中央为正厅（供奉祖先神位）；两侧为「虎耳」（厢房，供家人居住）；正厅前方为天井（内院），天井两侧有耳房（厨房、杂物间）。\n2. 入口「门楼」位于天井前方，多有精美石雕或灰塑装饰，门联多书吉祥词语。\n3. 正厅（虎口）设祖先牌位和神位，是全宅精神核心，所有家庭仪式均于此举行。\n4. 天井为采光和通风关键，雨水从天井流入地下「排水暗沟」，象征「财水留宅」。\n5. 建造须先请风水师「点穴」（确定朝向），通常坐北朝南或依山势调整，以「纳气聚财」为原则。","taboo":"下山虎朝向须经风水师确认，不可随意面朝不吉方位；正厅中轴线不可被阻断（不可放置大型家具遮挡天井与神位之间的通道）；大门不可正对胡同或巷子口（「冲煞」）；天井不可加盖顶棚（封天井被认为「堵财气」）；神位须高于地面，不可与卧室同室。","story":"「下山虎」之名源于风水意象——虎下山象征「势不可挡，旺气下行」，两侧虎耳（厢房）护卫中央，如老虎张开前肢。这一格局与闽南传统「三合院」一脉相承，在汕尾因地制宜加入贝灰（沿海特有材料）、琉璃瓦（耐热排水）等适应性元素。许多下山虎古宅门楼上的灰塑（贝灰雕刻）保留了精美的民间工艺，描绘戏曲故事和吉祥图案。","diff":"海丰县城保留最多完整下山虎古宅，部分已列为文物保护单位；陆丰大安镇、河田镇下山虎群落保存完好，形成古村落群；汕尾市区旧城区仍有零散下山虎，但因城市改造多遭拆除；陆丰博美镇因同时有客家居民，出现「下山虎与围龙屋结合」的混合型民居，全国罕见。"},
{"n":"渔歌对唱","py":"Hî-kua tuì-tshiùnn（海陆丰话）","c":"🎭 戏曲与口传文艺","sc":"口传文艺 / 渔业民歌","lv":"L3 汕尾市专属","rg":["汕尾市区","海丰","陆丰"],"st":"🟡 部分完成","cr":"★ 口述与民间流传","tm":"传统上于捕鱼归来、晒网休息时即兴对唱；节庆场合亦有组织对唱","src":"[书E] 第五章·渔民口传文艺；[书A] 第八章·民间艺术","intro":"汕尾渔歌是沿海渔民在长期海上劳作中形成的口头民歌传统，以海陆丰话演唱，曲调自由奔放，歌词即兴创作，内容涵盖海上生活、爱情、神明崇拜和生活感悟。渔歌对唱（男女对唱或多人轮唱）曾是渔村最重要的娱乐形式，现因渔业转型和电子媒体普及而趋于式微。","items":"无需乐器（清唱为主）；现代演出场合有时配以二弦或横笛伴奏","steps":"传统对唱形式：\n1. 渔船归港、渔民晒网整理时，由一人起唱（通常以「哎哟」开头），叙述当日捕鱼经历或感叹天气。\n2. 对方渔船或岸上渔民接唱，以同曲调即兴回应，内容可呼应、可反驳、可调侃。\n3. 对唱以曲调一致、歌词押韵为基本要求，以机智幽默、出口成章为高下之分。\n4. 节庆场合正式对唱：分男女两队，轮流出人，以「接龙」方式持续对唱，直至一方词穷认负。","taboo":"对唱时不可唱丧事相关词语（「死」「鬼」等）；对唱若涉及对方家人须以尊称，不可辱骂；渔船出海前不可演唱送别或哀愁曲调，须唱吉祥词语；对唱中不可提及「沉船」「翻船」等不祥字眼。","story":"汕尾渔歌是闽南「歌仔」传统与粤东海洋文化结合的产物，曾是海陆丰渔民传递信息、调解矛盾、娱乐休闲的重要手段。渔歌中保存了大量海洋地名、鱼类名称和捕鱼技术，是研究当地渔业史的活化石。1950-70年代，民间文艺工作者记录了大量传统渔歌歌词，但现在会唱者多为六十岁以上老一辈渔民。","diff":"汕尾市区（马宫、东洲岛）渔歌保存最为完整；海丰小漠镇渔歌曲调较为低沉，多反映艰辛的深海捕鱼生活；陆丰甲子、碣石渔歌因临近潮汕，部分曲调受潮汕歌谣影响；现代渔歌传承人多尝试将渔歌曲调与现代流行音乐结合，以吸引年轻一代。"},
{"n":"白字戏","py":"Pe̍h-jī-hì（海陆丰话）","c":"🎭 戏曲与口传文艺","sc":"地方戏曲 / 海陆丰方言剧种","lv":"L3 汕尾市专属","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★★ 学术专著与期刊","tm":"全年皆有演出，以神诞、节庆为主要演出场合","src":"[遗A] 国家级非遗名录·白字戏；[志A] 第十章·文化艺术·戏曲","intro":"白字戏是汕尾（海陆丰地区）独有的地方剧种，以海陆丰话（学佬话）为演唱语言，融合南音、潮调等音乐元素，曲调悠扬婉转，题材多为民间故事和忠孝节义传说。2008年被列为国家级非物质文化遗产，是汕尾最具代表性的文化符号之一。","items":"传统戏台（或临时搭建野台）、南音乐器（二弦、横笛、椰胡、月琴、唢呐）、打击乐（大锣、小锣、钹、板鼓）、传统服装（戏服、盔头）、脸谱颜料、布景画片","steps":"演出程序：\n1. 演出前，乐师于台侧「起乐」——奏开场音乐15-30分钟，预告演出即将开始，吸引观众聚集。\n2. 「报幕」：台口报出演出剧目名称。\n3. 正式演出：角色分为生（文生、武生）、旦（正旦、花旦）、净（花脸）、末（老生）、丑（三花）五大行当，演员依唱念做打分工演出。\n4. 白字戏以「曲牌联套」结构组织音乐，唱词用海陆丰话，念白亦用方言，非方言区观众需借助字幕。\n5. 重要剧目如《陈三五娘》《苏六娘》等须演出整本（可历时4-6小时）；酬神演出多选折子戏（单折，约1-2小时）。\n6. 酬神演出结束，主办方须向戏班「结算戏酬」，并备酒饭款待演员。","taboo":"演出前演员须拜「田都元帅」（戏神），不拜不可登台；饰演反派（坏人）的演员下台后须「洗脸」（卸去脸谱）才可正常与人交谈；酬神演出不可演出「悲剧结局」（须选喜剧或大团圆剧目）；演出期间台上不可出现真刀真枪；演员不可坐于道具箱上（被认为会压台运）。","story":"白字戏形成于明末清初，起源说法不一：一说源于闽南正字戏的分支，因用海陆丰「白话」（方言）演唱而称「白字戏」；另一说源于流入粤东的泉州南音乐系。「白字」并非「白话字」罗马拼音，而是相对「正字」（官话音）而言——用本地方言演唱的戏曲即为「白字戏」。20世纪后期濒临失传，当地政府设立海丰县白字戏传承剧团，保护传承。","diff":"海丰县白字戏剧团是最重要的保存机构，剧目最为丰富；陆丰地区白字戏与正字戏并行，观众群体有所区分；汕尾市区现代演出场所逐渐增加，但传统野台（露天演出）形式仍是主流；部分年轻团体尝试将白字戏与现代剧场结合，创作新题材剧目，引起较大争议。"},
{"n":"中元节普渡","py":"Tiong-guân-tseh phóo-tōo（海陆丰话）","c":"🎉 岁时节庆","sc":"鬼节 / 普渡超幽","lv":"L2 粤东闽语区","rg":["海丰","陆丰","汕尾市区"],"st":"🟢 已验证","cr":"★★ 地方志与田野调查","tm":"农历七月十五（中元节正日）；各村轮流于农历七月不同日期举行","src":"[书A] 第三章·节日习俗；[书D] 第三章·鬼神信仰与祭祀","intro":"中元节（俗称「鬼节」）是汕尾规模仅次于春节的重大节日。农历七月「鬼门开」，无主孤魂进入人间，各家各户须于门口摆设「路祭」，并参与村庙主办的「普渡」法事，超度无主亡灵，兼顾祭拜自家祖先。整个农历七月，各村庄轮流举行普渡，形成「流水普渡」格局。","items":"三牲五果、白饭（每碗需插一枝香）、纸钱（金银纸）、纸扎衣物食品、香烛、水果、面条（象征长寿）、糖果饼干（给孤魂野鬼）、道士（主持普渡法事）","steps":"1. 农历七月初一，城隍庙举行「开鬼门」仪式，宣告亡灵进入人间。\n2. 各村按惯例确定本村普渡日期（各村错开，避免同日争抢神明注意）。\n3. 普渡前日，各家购备祭品，并于门口清扫出一片空地，置香炉备用。\n4. 普渡日傍晚，各家于门口摆设「路祭」：桌上放三牲五果、白饭、糖果，朝向街道方向，意为招待街上游荡的孤魂野鬼。\n5. 点香上供，焚烧大量纸钱（为孤魂提供「冥间用资」），及纸扎衣物、日用品。\n6. 村庙同时举行大规模普渡法事，由道士主持，诵经超度，并于庙前摆设巨大供桌（「孤棚」），陈列众多祭品，供无主孤魂领取。\n7. 仪式结束，将供品分发给在场村民（特别是老人小孩），称为「抢孤」（或「食福」）。","taboo":"农历七月不宜搬家、结婚、开业（鬼月不吉）；夜间不可单独在河边、海边行走；「路祭」摆好后须将家门关闭（以免孤魂进屋）；不可用手指月亮（会被月亮割耳）；七月间不可拍打他人肩膀（会「拍走三魂」）；普渡供品食用前须先「退供」，不可直接食用。","story":"中元普渡融合了道教「中元地官赦罪」、佛教「盂兰盆节」与民间鬼神信仰三重传统。汕尾地区因历史上多次瘟疫、海难和战乱，留有大量无主孤魂，普渡信仰尤为深厚。「流水普渡」制度——各村错开日期——源于资源分配的实际需要，同时使整个农历七月都处于祭祀氛围之中，强化了地区共同体意识。","diff":"海丰县城普渡以「大孤棚」著称，供桌高达数层，陈列祭品数百件；陆丰甲子镇普渡有「放水灯」传统——于夜间将点燃的莲花形纸灯放入海中，为水中亡灵引路；汕尾市区因城市管理，普渡规模受限，焚烧纸钱须在指定地点；渔村普渡特别强调「海中亡灵」的超度，祭品中须包含鱼类，并向海面撒米。"},
